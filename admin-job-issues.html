<!DOCTYPE html>
<html>
<head>
  <title>Admin Job Issues - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f2f7f4;
      --surface2: #e6f4eb;
      --border: #e2ebe5;
      --accent: #0b7a28;
      --text: #111111;
      --muted: #6b7870;
      --danger: #b00020;
      --warn-bg: #fffbeb;
      --warn-border: #f0c040;
      --warn-text: #7a4f00;
      --green: #0b7a28;
      --yellow: #f0b400;
      --red: #b00020;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 20px;
    }

    .container {
      max-width: 1180px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .back {
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }

    .refresh {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--accent);
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
    }

    .hero {
      background: var(--accent);
      color: white;
      border-radius: 24px;
      padding: 26px;
      margin-bottom: 16px;
      box-shadow: 0 8px 24px rgba(11,122,40,0.18);
    }

    .hero h1 {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .hero p {
      color: rgba(255,255,255,0.82);
      font-size: 14px;
      line-height: 1.5;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .summary-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .summary-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .summary-value {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
    }

    .filters {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 16px;
    }

    select,
    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 13px;
      outline: none;
      background: white;
      color: var(--text);
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .issue-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    }

    .issue-top {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .issue-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .issue-sub {
      color: var(--muted);
      font-size: 12.5px;
      font-weight: 700;
      line-height: 1.4;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 11px;
      font-weight: 800;
      text-transform: capitalize;
      white-space: nowrap;
    }

    .pill.open {
      background: #fff2f2;
      color: var(--danger);
      border: 1px solid #ffb7b7;
    }

    .pill.review {
      background: var(--warn-bg);
      color: var(--warn-text);
      border: 1px solid var(--warn-border);
    }

    .pill.resolved {
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid #bde8ca;
    }

    .people-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .person-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }

    .person-header {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .person-title {
      font-size: 12px;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .standing {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 800;
      border-radius: 999px;
      padding: 5px 8px;
      background: white;
      border: 1px solid var(--border);
    }

    .standing-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      display: inline-block;
    }

    .standing.green .standing-dot {
      background: var(--green);
    }

    .standing.yellow .standing-dot {
      background: var(--yellow);
    }

    .standing.red .standing-dot {
      background: var(--red);
    }

    .person-name {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .person-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      line-height: 1.45;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .info-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px;
    }

    .info-label {
      color: var(--accent);
      font-size: 10.5px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .info-value {
      font-size: 12.5px;
      font-weight: 700;
      line-height: 1.35;
    }

    .details {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 13px;
      margin-top: 10px;
    }

    .details.open {
      display: block;
    }

    .details-title {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .details-text {
      font-size: 13px;
      line-height: 1.45;
      white-space: pre-wrap;
      font-weight: 650;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 11px 12px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }

    button.secondary {
      background: white;
      color: var(--accent);
      border: 1px solid var(--border);
    }

    button.warning {
      background: var(--warn-bg);
      color: var(--warn-text);
      border: 1px solid var(--warn-border);
    }

    button.danger {
      background: var(--danger);
      color: white;
    }

    .empty {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
    }

    #status {
      color: var(--danger);
      font-size: 13px;
      font-weight: 800;
      margin: 10px 0;
      text-align: center;
    }

    @media (max-width: 820px) {
      .summary-grid,
      .filters,
      .people-grid,
      .info-grid,
      .actions {
        grid-template-columns: 1fr;
      }

      .issue-top {
        display: block;
      }

      .pill {
        margin-top: 10px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <a class="back" href="admin-dashboard.html">← Back</a>
    <button class="refresh" onclick="loadJobIssues()">Refresh</button>
  </div>

  <div class="hero">
    <h1>Job Issues</h1>
    <p>Review no-shows, incomplete work reports, worker help requests, repeat offenders, and account standing for both customers and workers.</p>
  </div>

  <div class="summary-grid">
    <div class="summary-box">
      <div class="summary-label">Open Issues</div>
      <div class="summary-value" id="openCount">0</div>
    </div>

    <div class="summary-box">
      <div class="summary-label">Under Review</div>
      <div class="summary-value" id="reviewCount">0</div>
    </div>

    <div class="summary-box">
      <div class="summary-label">Resolved</div>
      <div class="summary-value" id="resolvedCount">0</div>
    </div>

    <div class="summary-box">
      <div class="summary-label">Repeat Offenders</div>
      <div class="summary-value" id="repeatCount">0</div>
    </div>
  </div>

  <div class="filters">
    <select id="statusFilter" onchange="renderIssues()">
      <option value="">All Statuses</option>
      <option value="open">Open</option>
      <option value="under_review">Under Review</option>
      <option value="resolved">Resolved</option>
    </select>

    <select id="issueFilter" onchange="renderIssues()">
      <option value="">All Issue Types</option>
      <option value="worker_no_show">Worker No-Show</option>
      <option value="customer_no_show">Customer No-Show</option>
      <option value="incomplete_work">Incomplete Work</option>
      <option value="worker_needs_help">Worker Needs Help</option>
    </select>

    <select id="standingFilter" onchange="renderIssues()">
      <option value="">All Standing Levels</option>
      <option value="green">Good Standing</option>
      <option value="yellow">Near Suspension</option>
      <option value="red">Repeat Offender</option>
    </select>

    <input
      id="searchFilter"
      type="text"
      placeholder="Search task, worker, customer"
      oninput="renderIssues()"
    >
  </div>

  <p id="status"></p>

  <div id="issuesList" class="empty">
    Loading job issues...
  </div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

let loadedIssues = [];

function escapeHTML(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function cleanText(value, fallback = "Not listed") {
  if (value === null || value === undefined) {
    return fallback;
  }

  const text =
    String(value).trim();

  return text ? text : fallback;
}

function formatDate(value) {
  if (!value) {
    return "Not listed";
  }

  const date =
    new Date(value);

  if (Number.isNaN(date.getTime())) {
    return value;
  }

  return date.toLocaleString();
}

function formatIssueType(value) {
  const type =
    String(value || "").toLowerCase();

  if (type === "worker_no_show") {
    return "Worker No-Show";
  }

  if (type === "customer_no_show") {
    return "Customer No-Show";
  }

  if (type === "incomplete_work") {
    return "Incomplete Work";
  }

  if (type === "worker_needs_help") {
    return "Worker Needs Help";
  }

  return cleanText(value, "Issue");
}

function normalizeIssueStatus(value) {
  const status =
    String(value || "").toLowerCase().trim();

  if (
    status === "under_review" ||
    status === "reviewing" ||
    status === "in_review"
  ) {
    return "under_review";
  }

  if (status === "resolved" || status === "closed") {
    return "resolved";
  }

  return "open";
}

function getStatusClass(status) {
  const normalized =
    normalizeIssueStatus(status);

  if (normalized === "resolved") {
    return "resolved";
  }

  if (normalized === "under_review") {
    return "review";
  }

  return "open";
}

function getFullName(profile, fallback = "Not listed") {
  if (!profile) {
    return fallback;
  }

  const fullName =
    profile.full_name ||
    profile.display_name ||
    profile.name ||
    `${profile.first_name || ""} ${profile.last_name || ""}`.trim();

  return cleanText(fullName, fallback);
}

function getPersonEmail(profile) {
  return cleanText(profile?.email, "Email not listed");
}

function getStandingColor(issueCount) {
  const count =
    Number(issueCount || 0);

  if (count >= 5) {
    return "red";
  }

  if (count >= 3) {
    return "yellow";
  }

  return "green";
}

function getStandingLabel(issueCount) {
  const color =
    getStandingColor(issueCount);

  if (color === "red") {
    return "Repeat offender";
  }

  if (color === "yellow") {
    return "Near suspension";
  }

  return "Good standing";
}

function renderStandingBadge(issueCount) {
  const color =
    getStandingColor(issueCount);

  return `
    <div class="standing ${color}">
      <span class="standing-dot"></span>
      ${escapeHTML(getStandingLabel(issueCount))}
    </div>
  `;
}

function getTaskTitle(task) {
  return cleanText(
    task?.title ||
    task?.task_title ||
    task?.category ||
    task?.service_type,
    "Task"
  );
}

function getTaskNumber(task) {
  return cleanText(
    task?.order_number ||
    task?.task_order_number ||
    `TM-${String(task?.id || "").slice(0, 8).toUpperCase()}`,
    "Not listed"
  );
}

function getTaskDate(task) {
  return cleanText(
    task?.task_date ||
    task?.date_needed ||
    task?.scheduled_date ||
    task?.scheduled_start ||
    task?.needed_by,
    "Not listed"
  );
}

function getTaskLocation(task) {
  const city =
    task?.city ||
    task?.task_city ||
    "";

  const state =
    task?.state ||
    task?.task_state ||
    "";

  return cleanText(
    `${city}${state ? ", " + state : ""}`,
    "Location not listed"
  );
}

function getIssueReporter(issue) {
  if (issue.no_show_reported_by) {
    return issue.no_show_reported_by;
  }

  if (issue.incomplete_work_reported_by) {
    return issue.incomplete_work_reported_by;
  }

  return "Not listed";
}

function getIssueReportedAt(issue) {
  return (
    issue.no_show_reported_at ||
    issue.incomplete_work_reported_at ||
    issue.updated_at ||
    issue.created_at ||
    ""
  );
}

async function fetchProfilesByIds(ids) {
  const cleanIds =
    [...new Set((ids || []).filter(Boolean).map(String))];

  if (cleanIds.length === 0) {
    return {};
  }

  const profileMap = {};

  const addToMap = rows => {
    (rows || []).forEach(row => {
      [
        row.id,
        row.user_id,
        row.auth_user_id,
        row.profile_id,
        row.customer_id
      ]
        .filter(Boolean)
        .map(String)
        .forEach(id => {
          profileMap[id] = row;
        });
    });
  };

  const { data: profilesById } =
    await supabaseClient
      .from("profiles")
      .select("*")
      .in("id", cleanIds);

  addToMap(profilesById);

  const { data: profilesByUserId } =
    await supabaseClient
      .from("profiles")
      .select("*")
      .in("user_id", cleanIds);

  addToMap(profilesByUserId);

  return profileMap;
}

async function fetchWorkerProfilesByIds(ids) {
  const cleanIds =
    [...new Set((ids || []).filter(Boolean).map(String))];

  if (cleanIds.length === 0) {
    return {};
  }

  const workerMap = {};

  const addToMap = rows => {
    (rows || []).forEach(row => {
      [
        row.id,
        row.user_id,
        row.auth_user_id,
        row.worker_id,
        row.profile_id
      ]
        .filter(Boolean)
        .map(String)
        .forEach(id => {
          workerMap[id] = row;
        });
    });
  };

  const { data: workersById } =
    await supabaseClient
      .from("worker_profiles")
      .select("*")
      .in("id", cleanIds);

  addToMap(workersById);

  const { data: workersByAuthId } =
    await supabaseClient
      .from("worker_profiles")
      .select("*")
      .in("auth_user_id", cleanIds);

  addToMap(workersByAuthId);

  return workerMap;
}

async function countTaskIssuesByColumn(tableName, columnName, ids) {
  const cleanIds =
    [...new Set((ids || []).filter(Boolean).map(String))];

  const countMap = {};

  cleanIds.forEach(id => {
    countMap[id] = 0;
  });

  if (cleanIds.length === 0) {
    return countMap;
  }

  const { data } =
    await supabaseClient
      .from(tableName)
      .select(`id, ${columnName}, issue_status`)
      .in(columnName, cleanIds)
      .not("issue_status", "is", null)
      .neq("issue_status", "none");

  (data || []).forEach(row => {
    const id =
      String(row[columnName] || "");

    if (id) {
      countMap[id] =
        Number(countMap[id] || 0) + 1;
    }
  });

  return countMap;
}

async function fetchIssueRows() {
  const { data: taskIssues, error: taskError } =
    await supabaseClient
      .from("tasks")
      .select("*")
      .not("issue_status", "is", null)
      .neq("issue_status", "none")
      .order("updated_at", { ascending: false });

  if (taskError) {
    throw taskError;
  }

  let directIssues = [];

  const directResult =
    await supabaseClient
      .from("direct_task_requests")
      .select("*")
      .not("issue_status", "is", null)
      .neq("issue_status", "none")
      .order("updated_at", { ascending: false });

  if (!directResult.error) {
    directIssues =
      directResult.data || [];
  }

  return [
    ...(taskIssues || []).map(issue => ({
      ...issue,
      source_type: "task"
    })),
    ...(directIssues || []).map(issue => ({
      ...issue,
      source_type: "direct_task_request"
    }))
  ];
}

async function loadJobIssues() {
  const list =
    document.getElementById("issuesList");

  const status =
    document.getElementById("status");

  status.innerText = "";
  list.className = "empty";
  list.innerHTML = "Loading job issues...";

  try {
    const issueRows =
      await fetchIssueRows();

    const customerIds =
      issueRows.map(issue => (
        issue.customer_id ||
        issue.customer_user_id ||
        issue.client_id ||
        issue.user_id ||
        issue.profile_id ||
        ""
      ));

    const workerIds =
      issueRows.map(issue => (
        issue.assigned_worker_id ||
        issue.accepted_worker_id ||
        issue.worker_id ||
        issue.completed_by_worker_id ||
        ""
      ));

    const [customerProfiles, workerProfiles, workerMainProfiles, customerIssueCounts, workerIssueCounts] =
      await Promise.all([
        fetchProfilesByIds(customerIds),
        fetchWorkerProfilesByIds(workerIds),
        fetchProfilesByIds(workerIds),
        countTaskIssuesByColumn("tasks", "customer_id", customerIds),
        countTaskIssuesByColumn("tasks", "worker_id", workerIds)
      ]);

    loadedIssues =
      issueRows.map(issue => {
        const customerId =
          String(
            issue.customer_id ||
            issue.customer_user_id ||
            issue.client_id ||
            issue.user_id ||
            issue.profile_id ||
            ""
          );

        const workerId =
          String(
            issue.assigned_worker_id ||
            issue.accepted_worker_id ||
            issue.worker_id ||
            issue.completed_by_worker_id ||
            ""
          );

        const workerProfile =
          workerProfiles[workerId] || {};

        const workerMainProfile =
          workerMainProfiles[workerProfile.auth_user_id || workerId] ||
          workerMainProfiles[workerId] ||
          {};

        return {
          issue,
          customerId,
          workerId,
          customerProfile: customerProfiles[customerId] || {},
          workerProfile: {
            ...workerProfile,
            ...workerMainProfile
          },
          customerIssueCount: customerIssueCounts[customerId] || 0,
          workerIssueCount: workerIssueCounts[workerId] || 0
        };
      });

    updateSummary();
    renderIssues();
  } catch (error) {
    status.innerText =
      error.message || "Unable to load job issues.";

    list.className = "empty";
    list.innerHTML = "Unable to load job issues.";
  }
}

function updateSummary() {
  const openCount =
    loadedIssues.filter(item => normalizeIssueStatus(item.issue.issue_status) === "open").length;

  const reviewCount =
    loadedIssues.filter(item => normalizeIssueStatus(item.issue.issue_status) === "under_review").length;

  const resolvedCount =
    loadedIssues.filter(item => normalizeIssueStatus(item.issue.issue_status) === "resolved").length;

  const repeatCount =
    loadedIssues.filter(item => {
      return (
        getStandingColor(item.workerIssueCount) === "red" ||
        getStandingColor(item.customerIssueCount) === "red"
      );
    }).length;

  document.getElementById("openCount").innerText =
    String(openCount);

  document.getElementById("reviewCount").innerText =
    String(reviewCount);

  document.getElementById("resolvedCount").innerText =
    String(resolvedCount);

  document.getElementById("repeatCount").innerText =
    String(repeatCount);
}

function matchesFilters(item) {
  const statusFilter =
    document.getElementById("statusFilter").value;

  const issueFilter =
    document.getElementById("issueFilter").value;

  const standingFilter =
    document.getElementById("standingFilter").value;

  const searchFilter =
    document.getElementById("searchFilter").value.trim().toLowerCase();

  const issue =
    item.issue;

  if (
    statusFilter &&
    normalizeIssueStatus(issue.issue_status) !== statusFilter
  ) {
    return false;
  }

  if (
    issueFilter &&
    String(issue.issue_status || "").toLowerCase() !== issueFilter
  ) {
    return false;
  }

  if (standingFilter) {
    const workerColor =
      getStandingColor(item.workerIssueCount);

    const customerColor =
      getStandingColor(item.customerIssueCount);

    if (
      workerColor !== standingFilter &&
      customerColor !== standingFilter
    ) {
      return false;
    }
  }

  if (searchFilter) {
    const searchable =
      [
        getTaskNumber(issue),
        getTaskTitle(issue),
        getFullName(item.customerProfile, "Customer"),
        getFullName(item.workerProfile, "Worker"),
        getPersonEmail(item.customerProfile),
        getPersonEmail(item.workerProfile),
        issue.issue_notes
      ]
        .join(" ")
        .toLowerCase();

    if (!searchable.includes(searchFilter)) {
      return false;
    }
  }

  return true;
}

function renderIssues() {
  const list =
    document.getElementById("issuesList");

  const filteredIssues =
    loadedIssues.filter(matchesFilters);

  if (filteredIssues.length === 0) {
    list.className = "empty";
    list.innerHTML = "No job issues match the selected filters.";
    return;
  }

  list.className = "";
  list.innerHTML = "";

  filteredIssues.forEach(item => {
    const issue =
      item.issue;

    const detailsId =
      `details-${issue.source_type}-${issue.id}`;

    const div =
      document.createElement("div");

    div.className =
      "issue-card";

    div.innerHTML = `
      <div class="issue-top">
        <div>
          <div class="issue-title">
            ${escapeHTML(formatIssueType(issue.issue_status))} • ${escapeHTML(getTaskNumber(issue))}
          </div>

          <div class="issue-sub">
            ${escapeHTML(getTaskTitle(issue))} • Reported by ${escapeHTML(getIssueReporter(issue))} • ${escapeHTML(formatDate(getIssueReportedAt(issue)))}
          </div>
        </div>

        <div class="pill ${getStatusClass(issue.review_status || issue.admin_issue_status || issue.issue_review_status || issue.issue_state || issue.issue_status)}">
          ${escapeHTML(formatIssueType(issue.review_status || issue.admin_issue_status || issue.issue_review_status || issue.issue_state || issue.issue_status))}
        </div>
      </div>

      <div class="people-grid">
        <div class="person-box">
          <div class="person-header">
            <div class="person-title">Customer</div>
            ${renderStandingBadge(item.customerIssueCount)}
          </div>

          <div class="person-name">
            ${escapeHTML(getFullName(item.customerProfile, "Customer"))}
          </div>

          <div class="person-meta">
            ${escapeHTML(getPersonEmail(item.customerProfile))}<br>
            Customer ID: ${escapeHTML(item.customerId || "Not listed")}<br>
            Issue count: ${escapeHTML(item.customerIssueCount)}
          </div>
        </div>

        <div class="person-box">
          <div class="person-header">
            <div class="person-title">Worker</div>
            ${renderStandingBadge(item.workerIssueCount)}
          </div>

          <div class="person-name">
            ${escapeHTML(getFullName(item.workerProfile, "Worker"))}
          </div>

          <div class="person-meta">
            ${escapeHTML(getPersonEmail(item.workerProfile))}<br>
            Worker ID: ${escapeHTML(item.workerId || "Not listed")}<br>
            Issue count: ${escapeHTML(item.workerIssueCount)}
          </div>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-label">Task Date</div>
          <div class="info-value">${escapeHTML(formatDate(getTaskDate(issue)))}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Location</div>
          <div class="info-value">${escapeHTML(getTaskLocation(issue))}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Task Status</div>
          <div class="info-value">${escapeHTML(cleanText(issue.status, "Not listed"))}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Source</div>
          <div class="info-value">${escapeHTML(issue.source_type === "direct_task_request" ? "Direct Request" : "Marketplace Task")}</div>
        </div>
      </div>

      <div class="actions">
        <button class="secondary" onclick="toggleDetails('${detailsId}')">
          View Details
        </button>

        <button class="warning" onclick="updateIssueReviewStatus('${issue.source_type}', '${issue.id}', 'under_review')">
          Mark Under Review
        </button>

        <button onclick="openDispute('${issue.id}', '${item.workerId}', '${getTaskNumber(issue)}')">
          Open Dispute
        </button>

        <button class="danger" onclick="updateIssueReviewStatus('${issue.source_type}', '${issue.id}', 'resolved')">
          Mark Resolved
        </button>
      </div>

      <div class="details" id="${detailsId}">
        <div class="details-title">Issue Notes</div>
        <div class="details-text">${escapeHTML(issue.issue_notes || "No notes provided.")}</div>

        <br>

        <div class="details-title">Raw Issue Details</div>
        <div class="details-text">
Issue Type: ${escapeHTML(issue.issue_status || "Not listed")}
No-Show Reported By: ${escapeHTML(issue.no_show_reported_by || "Not listed")}
No-Show Reported At: ${escapeHTML(formatDate(issue.no_show_reported_at))}
Incomplete Work Reported By: ${escapeHTML(issue.incomplete_work_reported_by || "Not listed")}
Incomplete Work Reported At: ${escapeHTML(formatDate(issue.incomplete_work_reported_at))}
        </div>
      </div>
    `;

    list.appendChild(div);
  });
}

function toggleDetails(id) {
  const box =
    document.getElementById(id);

  if (!box) {
    return;
  }

  box.classList.toggle("open");
}

async function updateIssueReviewStatus(sourceType, issueId, reviewStatus) {
  const tableName =
    sourceType === "direct_task_request"
      ? "direct_task_requests"
      : "tasks";

  const updatePayload = {
    updated_at: new Date().toISOString()
  };

  if (reviewStatus === "resolved") {
    updatePayload.issue_status = "resolved";
  } else {
    updatePayload.issue_status = "under_review";
  }

  const { error } =
    await supabaseClient
      .from(tableName)
      .update(updatePayload)
      .eq("id", issueId);

  if (error) {
    alert(error.message);
    return;
  }

  await loadJobIssues();
}

function openDispute(taskId, workerId, orderNumber) {
  const params =
    new URLSearchParams();

  params.set("task_id", taskId || "");
  params.set("worker_id", workerId || "");
  params.set("order_number", orderNumber || "");

  window.location.href =
    `dispute-center.html?${params.toString()}`;
}

loadJobIssues();
</script>

</body>
</html>
