<!DOCTYPE html>
<html>
<head>
  <title>Admin Worker Approvals - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #e9f7ee 0%, #f5f5f5 100%);
      color: #111;
      padding-bottom: 80px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px;
    }

    .back {
      color: #0b7a28;
      font-weight: 800;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .hero {
      background: linear-gradient(135deg, #0b7a28, #19a447);
      color: white;
      border-radius: 26px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 10px 28px rgba(11,122,40,0.22);
    }

    .hero-title {
      font-size: 26px;
      font-weight: 900;
      margin-bottom: 8px;
      letter-spacing: -0.4px;
    }

    .hero-sub {
      font-size: 14px;
      line-height: 1.45;
      opacity: 0.95;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
      border: 1px solid #eee;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 18px;
      font-weight: 900;
      color: #111;
    }

    .filter-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    select,
    textarea,
    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 14px;
      font-family: Arial, sans-serif;
      background: #fbfbfb;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
      margin-top: 10px;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 14px;
      background: #0b7a28;
      color: white;
      font-size: 14px;
      font-weight: 900;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button.secondary {
      background: white;
      color: #111;
      border: 1px solid #ddd;
    }

    button.danger {
      background: #b00020;
      color: white;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .worker-card {
      background: #f7faf8;
      border: 1px solid #e3eee6;
      border-radius: 18px;
      padding: 14px;
      margin-top: 12px;
    }

    .worker-top {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 10px;
    }

    .worker-photo {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      object-fit: cover;
      background: #e7f7ec;
      border: 2px solid #0b7a28;
      flex-shrink: 0;
    }

    .worker-name {
      font-size: 16px;
      font-weight: 900;
      color: #111;
    }

    .worker-email {
      font-size: 12px;
      color: #666;
      margin-top: 3px;
      word-break: break-word;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      text-transform: capitalize;
      margin-top: 6px;
    }

    .badge.pending {
      background: #fff4e5;
      color: #a15c00;
    }

    .badge.approved {
      background: #e7f7ec;
      color: #0b7a28;
    }

    .badge.denied {
      background: #ffe5e5;
      color: #b00020;
    }

    .details {
      margin-top: 10px;
      display: grid;
      gap: 8px;
      font-size: 13px;
      color: #555;
      line-height: 1.4;
    }

    .detail-box {
      background: white;
      border: 1px solid #e5e5e5;
      border-radius: 14px;
      padding: 10px;
    }

    .detail-box strong {
      color: #111;
    }

    .doc-links {
      display: grid;
      gap: 8px;
      margin-top: 8px;
    }

    .doc-links a {
      color: #0b7a28;
      font-size: 13px;
      font-weight: 900;
      text-decoration: none;
      background: white;
      border: 1px solid #dfece3;
      padding: 10px;
      border-radius: 12px;
      display: block;
    }

    .government-id-image {
      width: 100%;
      max-height: 260px;
      object-fit: contain;
      background: white;
      border: 1px solid #dfece3;
      border-radius: 14px;
      margin-top: 8px;
      display: block;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .message {
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      margin-top: 10px;
      min-height: 18px;
    }

    .empty {
      text-align: center;
      color: #666;
      font-size: 14px;
      line-height: 1.4;
      padding: 18px 4px;
    }

    .small-note {
      font-size: 12px;
      color: #666;
      line-height: 1.4;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <a class="back" onclick="window.location.href='worker-dashboard.html'">
    ← Back
  </a>

  <div class="hero">
    <div class="hero-title">Worker Approvals</div>
    <div class="hero-sub">
      Review pending worker profiles. Approving a worker unlocks quote access and direct quote eligibility.
    </div>
  </div>

  <div class="card">
    <div class="section-header">
      <div class="section-title">Review Queue</div>
      <button class="secondary" onclick="loadWorkers()">
        Refresh
      </button>
    </div>

    <div class="filter-row">
      <select id="statusFilter" onchange="loadWorkers()">
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="denied">Denied</option>
        <option value="all">All</option>
      </select>

      <select id="sortFilter" onchange="loadWorkers()">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
      </select>
    </div>

    <div class="small-note">
      This page updates the worker’s profile approval fields. Send Quote and Worker Verification must read from the profiles table.
    </div>

    <div class="message" id="pageMessage"></div>
  </div>

  <div id="workerList"></div>

</div>

<script>
const SUPABASE_URL =
  "https://dbcthtjmtlumidpbucrc.supabase.co";

const SUPABASE_ANON_KEY =
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ";

const supabaseClient =
  window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

function hasValue(value) {
  return value !== null &&
    value !== undefined &&
    String(value).trim() !== "";
}

function setPageMessage(message, color) {
  const box =
    document.getElementById("pageMessage");

  box.style.color =
    color;

  box.innerText =
    message;
}

function getWorkerName(profile) {
  return (
    profile.full_name ||
    profile.display_name ||
    `${profile.first_name || ""} ${profile.last_name || ""}`.trim() ||
    profile.email ||
    "Worker"
  );
}

function getStatus(profile) {
  const raw =
    profile.worker_approval_status ||
    profile.worker_verification_status ||
    profile.approval_status ||
    profile.worker_status ||
    "";

  const status =
    String(raw).toLowerCase().trim();

  if (
    profile.is_worker_approved === true ||
    status === "approved"
  ) {
    return "approved";
  }

  if (
    status === "denied" ||
    status === "rejected" ||
    hasValue(profile.worker_denial_reason) ||
    hasValue(profile.denial_reason) ||
    hasValue(profile.taskmint_denial_note)
  ) {
    return "denied";
  }

  if (
    profile.submitted_for_verification === true ||
    status === "pending" ||
    status === "under_review" ||
    status === "reviewing"
  ) {
    return "pending";
  }

  return "not_submitted";
}

function getStatusBadge(status) {
  if (status === "approved") {
    return `<span class="badge approved">Approved</span>`;
  }

  if (status === "denied") {
    return `<span class="badge denied">Denied</span>`;
  }

  return `<span class="badge pending">${status.replaceAll("_", " ")}</span>`;
}

async function getVerificationDocs(workerId) {
  const { data, error } =
    await supabaseClient
      .from("worker_verification_documents")
      .select("*")
      .eq("worker_id", workerId)
      .order("uploaded_at", { ascending: false });

  if (error || !data) {
    return [];
  }

  return data;
}

function renderDocs(docs) {
  if (!docs || docs.length === 0) {
    return `<div class="small-note">No ID documents found.</div>`;
  }

  let html = `<div class="doc-links">`;

  docs.forEach((doc, index) => {
    if (doc.front_document_url) {
      html += `
        <a href="${doc.front_document_url}" target="_blank">
          Open Front ID ${index + 1}
        </a>
      `;
    }

    if (doc.back_document_url) {
      html += `
        <a href="${doc.back_document_url}" target="_blank">
          Open Back ID ${index + 1}
        </a>
      `;
    }

    if (doc.document_url) {
      html += `
        <a href="${doc.document_url}" target="_blank">
          Open Document ${index + 1}
        </a>
      `;
    }
  });

  html += `</div>`;

  return html;
}

function getWorkerAddress(profile) {
  const street =
    profile.worker_address ||
    profile.address ||
    profile.street_address ||
    "";

  const city =
    profile.worker_city ||
    profile.city ||
    "";

  const state =
    profile.worker_state ||
    profile.state ||
    "";

  const zip =
    profile.worker_zip ||
    profile.zip_code ||
    profile.zipcode ||
    profile.zip ||
    "";

  const lineOne =
    String(street || "").trim();

  const lineTwo =
    [city, state, zip]
      .filter(hasValue)
      .join(" ")
      .trim();

  if (lineOne && lineTwo) {
    return `${lineOne}<br>${lineTwo}`;
  }

  return lineOne || lineTwo || "Not listed";
}

function formatAdminDate(value) {
  if (!value) {
    return "Not listed";
  }

  const date =
    new Date(value);

  if (Number.isNaN(date.getTime())) {
    return value;
  }

  return date.toLocaleDateString();
}

function renderGovernmentIdUrl(url, label) {
  if (!url) {
    return "";
  }

  const lower =
    String(url).toLowerCase();

  if (lower.includes(".pdf")) {
    return `
      <div class="doc-links">
        <a href="${url}" target="_blank">
          ${label}
        </a>
      </div>
    `;
  }

  return `
    <a href="${url}" target="_blank">
      <img
        src="${url}"
        class="government-id-image"
        alt="${label}"
        onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=&quot;small-note&quot;>Image preview unavailable. Open the document link below.</div><div class=&quot;doc-links&quot;><a href=&quot;${url}&quot; target=&quot;_blank&quot;>${label}</a></div>';"
      >
    </a>
  `;
}

function getGovernmentIdPreview(profile, docs) {
  let html = "";

  const profileUrl =
    profile.government_id_url ||
    profile.government_id_photo_url ||
    profile.id_document_url ||
    "";

  if (profileUrl) {
    html +=
      renderGovernmentIdUrl(
        profileUrl,
        "Open Government ID"
      );
  }

  (docs || []).forEach((doc, index) => {
    if (doc.front_document_url) {
      html +=
        renderGovernmentIdUrl(
          doc.front_document_url,
          `Open Front ID ${index + 1}`
        );
    }

    if (doc.back_document_url) {
      html +=
        renderGovernmentIdUrl(
          doc.back_document_url,
          `Open Back ID ${index + 1}`
        );
    }

    if (doc.document_url) {
      html +=
        renderGovernmentIdUrl(
          doc.document_url,
          `Open Document ${index + 1}`
        );
    }
  });

  return html || "Not uploaded";
}

async function loadWorkers() {
  setPageMessage("Loading workers...", "#0b7a28");

  const list =
    document.getElementById("workerList");

  list.innerHTML = "";

  const statusFilter =
    document.getElementById("statusFilter").value;

  const sortFilter =
    document.getElementById("sortFilter").value;

  let query =
    supabaseClient
      .from("profiles")
      .select("*")
      .eq("account_type", "worker");

  if (statusFilter === "pending") {
    query =
      query
        .eq("submitted_for_verification", true)
        .or("worker_approval_status.eq.pending,worker_verification_status.eq.pending");
  }

  if (statusFilter === "approved") {
    query =
      query.eq("is_worker_approved", true);
  }

  if (statusFilter === "denied") {
    query =
      query.or("worker_approval_status.eq.denied,worker_verification_status.eq.denied,worker_verification_status.eq.rejected");
  }

  query =
    query.order("verification_submitted_at", {
      ascending: sortFilter === "oldest",
      nullsFirst: false
    });

  const { data: workers, error } =
    await query;

  if (error) {
    setPageMessage(error.message, "red");
    return;
  }

  if (!workers || workers.length === 0) {
    setPageMessage("", "#111");
    list.innerHTML = `
      <div class="card">
        <div class="empty">
          No workers found for this filter.
        </div>
      </div>
    `;
    return;
  }

  setPageMessage("", "#111");

  for (const worker of workers) {
    const docs =
      await getVerificationDocs(worker.id);

    const status =
      getStatus(worker);

    const denialReason =
      worker.worker_denial_reason ||
      worker.denial_reason ||
      worker.taskmint_denial_note ||
      "";

    const card =
      document.createElement("div");

    card.className =
      "card";

    card.innerHTML = `
      <div class="worker-card">
        <div class="worker-top">
          <img
            class="worker-photo"
            src="${worker.profile_photo_url || 'Taskmintlogo.png'}"
            alt="Worker Photo"
          >

          <div>
            <div class="worker-name">
              ${getWorkerName(worker)}
            </div>

            <div class="worker-email">
              ${worker.email || ""}
            </div>

            ${getStatusBadge(status)}
          </div>
        </div>

        <div class="details">
          <div class="detail-box">
            <strong>Address:</strong><br>
            ${getWorkerAddress(worker)}
          </div>

          <div class="detail-box">
            <strong>Birthday:</strong><br>
            ${formatAdminDate(worker.birthday)}
          </div>

          <div class="detail-box">
            <strong>Sign Up Date:</strong><br>
            ${formatAdminDate(worker.created_at)}
          </div>

          <div class="detail-box">
            <strong>Government ID Upload:</strong><br>
            ${getGovernmentIdPreview(worker, docs)}
          </div>

          <div class="detail-box">
            <strong>Experience:</strong><br>
            ${worker.experience || "Not listed"}
          </div>

          <div class="detail-box">
            <strong>Services:</strong><br>
            ${worker.skills || worker.services_offered || worker.services || "Not listed"}
          </div>

          <div class="detail-box">
            <strong>Service Area:</strong><br>
            ${worker.service_area || "Not listed"}<br>
            ${worker.worker_city || worker.city || ""} ${worker.worker_state || worker.state || ""} ${worker.worker_zip || worker.zip || ""}
          </div>

          <div class="detail-box">
            <strong>Tax Setup:</strong>
            ${
              worker.tax_setup_complete === true ||
              worker.tax_status === "completed" ||
              worker.tax_status === "verified"
                ? "Complete"
                : "Not complete"
            }
            <br>

            <strong>Payout Setup:</strong>
            ${
              worker.payout_setup_complete === true ||
              worker.payout_status === "completed" ||
              worker.payout_status === "verified" ||
              hasValue(worker.stripe_account_id) ||
              hasValue(worker.bank_account_last4) ||
              hasValue(worker.debit_card_last4)
                ? "Complete"
                : "Not complete"
            }
          </div>

          <div class="detail-box">
            <strong>ID Documents:</strong>
            ${renderDocs(docs)}
          </div>

          ${
            denialReason
              ? `<div class="detail-box"><strong>Denial Note:</strong><br>${denialReason}</div>`
              : ""
          }
        </div>

        <textarea
          id="denyNote-${worker.id}"
          placeholder="Optional denial note for the worker..."
        >${denialReason}</textarea>

        <div class="action-grid">
          <button onclick="approveWorker('${worker.id}')">
            Approve
          </button>

          <button class="danger" onclick="denyWorker('${worker.id}')">
            Deny
          </button>
        </div>
      </div>
    `;

    list.appendChild(card);
  }
}

async function getWorkerEmailInfo(workerId) {
  const { data, error } =
    await supabaseClient
      .from("profiles")
      .select("email, first_name, full_name, worker_denial_reason, denial_reason, taskmint_denial_note")
      .eq("id", workerId)
      .maybeSingle();

  if (error || !data) {
    return null;
  }

  return data;
}

function getFirstNameForEmail(worker) {
  if (!worker) {
    return "";
  }

  if (worker.first_name) {
    return worker.first_name;
  }

  if (worker.full_name) {
    return String(worker.full_name).trim().split(" ")[0] || "";
  }

  return "";
}

async function sendWorkerApprovedEmail(workerId) {
  const worker =
    await getWorkerEmailInfo(workerId);

  if (!worker || !worker.email) {
    return;
  }

  await fetch("https://dbcthtjmtlumidpbucrc.supabase.co/functions/v1/send-worker-approved-email", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: worker.email,
      first_name: getFirstNameForEmail(worker)
    })
  });
}

async function sendWorkerDeniedEmail(workerId, note) {
  const worker =
    await getWorkerEmailInfo(workerId);

  if (!worker || !worker.email) {
    return;
  }

  await fetch("https://dbcthtjmtlumidpbucrc.supabase.co/functions/v1/send-worker-denied-email", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: worker.email,
      first_name: getFirstNameForEmail(worker),
      reason: note
    })
  });
}

async function approveWorker(workerId) {
  if (!workerId) {
    return;
  }

  setPageMessage("Approving worker...", "#0b7a28");

  const { error } =
    await supabaseClient
      .from("profiles")
      .update({
        is_worker_approved: true,
        can_send_quotes: true,
        submitted_for_verification: true,
        worker_verification_status: "approved",
        worker_approval_status: "approved",
        identity_verified: true,
        worker_denial_reason: null,
        denial_reason: null,
        taskmint_denial_note: null,
        verification_approved_at: new Date().toISOString()
      })
      .eq("id", workerId);

  if (error) {
    setPageMessage(error.message, "red");
    return;
  }

  await supabaseClient
    .from("worker_verification_documents")
    .update({
      verification_status: "approved",
      reviewed_at: new Date().toISOString()
    })
    .eq("worker_id", workerId);

  await sendWorkerApprovedEmail(workerId);

  setPageMessage("Worker approved. Quote access is unlocked.", "green");

  await loadWorkers();
}

async function denyWorker(workerId) {
  if (!workerId) {
    return;
  }

  const noteBox =
    document.getElementById(`denyNote-${workerId}`);

  const note =
    noteBox
      ? noteBox.value.trim()
      : "";

  if (!note) {
    setPageMessage("Add a denial note before denying this worker.", "red");
    return;
  }

  setPageMessage("Denying worker...", "#0b7a28");

  const { error } =
    await supabaseClient
      .from("profiles")
      .update({
        is_worker_approved: false,
        can_send_quotes: false,
        submitted_for_verification: true,
        worker_verification_status: "denied",
        worker_approval_status: "denied",
        identity_verified: false,
        worker_denial_reason: note,
        denial_reason: note,
        taskmint_denial_note: note
      })
      .eq("id", workerId);

  if (error) {
    setPageMessage(error.message, "red");
    return;
  }

  await supabaseClient
    .from("worker_verification_documents")
    .update({
      verification_status: "denied",
      rejection_reason: note,
      reviewed_at: new Date().toISOString()
    })
    .eq("worker_id", workerId);

  await sendWorkerDeniedEmail(workerId, note);

  setPageMessage("Worker denied. The denial note is saved for the worker.", "green");

  await loadWorkers();
}

loadWorkers();
</script>

</body>
</html>
