<!DOCTYPE html>
<html>
<head>
  <title>Edit Quote - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f2f7f4;
      --surface2: #e6f4eb;
      --border: #e2ebe5;
      --accent: #0b7a28;
      --text: #111111;
      --muted: #6b7870;
      --danger: #b00020;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 470px;
      min-height: 100vh;
      padding: 20px 16px 30px;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 40;
      width: 100%;
      max-width: 470px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      margin: -20px -16px 20px;
    }

    .back {
      color: var(--accent);
      font-size: 14px;
      cursor: pointer;
      font-weight: 800;
      text-decoration: none;
      display: inline-block;
    }

    .hero {
      background: var(--accent);
      color: white;
      border-radius: 22px;
      padding: 24px 20px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(11,122,40,0.22);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: riseIn 0.35s 0.05s forwards;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 155px;
      height: 155px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      top: -65px;
      right: -55px;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      bottom: -45px;
      left: -35px;
    }

    .hero h1 {
      margin: 0 0 7px;
      font-size: 29px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 2;
    }

    .hero p {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
      position: relative;
      z-index: 2;
    }

    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      opacity: 0;
      animation: riseIn 0.35s 0.12s forwards;
    }

    .field-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-weight: 800;
      margin-bottom: 7px;
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input,
    textarea {
      width: 100%;
      padding: 13px;
      border-radius: 13px;
      border: 1px solid var(--border);
      font-size: 14px;
      box-sizing: border-box;
      background: white;
      color: var(--text);
      outline: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.45;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 13px;
      background: var(--accent);
      color: white;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(11,122,40,0.10);
    }

    .danger {
      background: var(--danger);
    }

    .small-text {
      color: var(--muted);
      font-size: 12px;
      margin-top: 7px;
      line-height: 1.4;
      font-weight: 700;
      text-align: right;
    }

    .helper-text {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      margin-top: 7px;
    }

    .error {
      color: var(--danger);
      font-weight: 800;
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.4;
    }

    #status {
      margin-top: 10px;
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.4;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 360px) {
      .hero h1 {
        font-size: 25px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <a class="back" href="worker-dashboard.html">
      ← Back
    </a>
  </div>

  <div class="hero">
    <h1>Edit Quote</h1>
    <p>Update the quote amount or message while the quote is still pending.</p>
  </div>

  <div class="card">

    <div class="field-card">
      <label>Quote Amount</label>
      <input
        type="number"
        id="quoteAmount"
        min="1"
        step="0.01"
      >
      <div class="helper-text">
        Enter the updated total amount you want to quote the customer.
      </div>
    </div>

    <div class="field-card">
      <label>Message to Customer</label>
      <textarea
        id="quoteMessage"
        maxlength="500"
      ></textarea>

      <div class="small-text" id="characterCount">
        0 / 500
      </div>
    </div>

    <button onclick="saveQuoteChanges()">
      Save Quote Changes
    </button>

    <button class="danger"
      onclick="window.location.href='worker-dashboard.html'">
      Cancel Editing
    </button>

    <div id="status"></div>

  </div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

const selectedQuoteId =
  localStorage.getItem("selectedQuoteId");

loadQuote();

async function loadQuote() {

  const status =
    document.getElementById("status");

  if (!selectedQuoteId) {
    status.innerHTML =
      `<div class="error">No quote selected.</div>`;
    return;
  }

  const { data: quote, error } =
    await supabaseClient
      .from("worker_quotes")
      .select("*")
      .eq("id", selectedQuoteId)
      .maybeSingle();

  if (error || !quote) {
    status.innerHTML =
      `<div class="error">Quote not found.</div>`;
    return;
  }

  if (quote.status !== "pending") {
    status.innerHTML =
      `<div class="error">Only pending quotes can be edited.</div>`;
    return;
  }

  document.getElementById("quoteAmount").value =
    quote.quote_amount || "";

  document.getElementById("quoteMessage").value =
    quote.message || "";

  document.getElementById("characterCount").innerText =
    `${(quote.message || "").length} / 500`;

}

async function saveQuoteChanges() {

  const amount =
    document.getElementById("quoteAmount").value;

  const message =
    document.getElementById("quoteMessage").value.trim();

  if (Number(amount) <= 0) {
    alert("Quote amount must be greater than $0.");
    return;
  }

  if (message.length < 10) {
    alert("Please enter more quote details.");
    return;
  }

  const { error } =
    await supabaseClient
      .from("worker_quotes")
      .update({
        quote_amount: amount,
        message: message
      })
      .eq("id", selectedQuoteId)
      .eq("status", "pending");

  if (error) {
    alert(error.message);
    return;
  }

  alert("Quote updated.");

  window.location.href =
    "worker-dashboard.html";

}

const quoteMessage =
  document.getElementById("quoteMessage");

quoteMessage.addEventListener("input", () => {
  document.getElementById("characterCount").innerText =
    `${quoteMessage.value.length} / 500`;
});
</script>

</body>
</html>
