<!DOCTYPE html>
<html>
<head>
  <title>Admin Worker Support - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --surface: #f2f7f4;
      --surface2: #e6f4eb;
      --border: #e2ebe5;
      --accent: #0b7a28;
      --text: #111111;
      --muted: #6b7870;
      --danger: #b00020;
      --warning-bg: #fffbeb;
      --warning-border: #f0c040;
      --warning-text: #7a4f00;
      --blue-bg: #eef5ff;
      --blue-text: #0b4d91;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top-bar,
    .container {
      width: 100%;
      max-width: 980px;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 20px;
    }

    .back,
    .refresh {
      color: var(--accent);
      font-weight: 800;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
    }

    .container {
      padding: 20px 16px 30px;
    }

    .hero {
      background: var(--accent);
      border-radius: 22px;
      padding: 24px 22px;
      margin-bottom: 16px;
      color: white;
      box-shadow: 0 8px 24px rgba(11,122,40,0.22);
    }

    .hero h1 {
      font-size: 30px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .hero p {
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
    }

    .layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 15px;
      margin-bottom: 12px;
    }

    .section-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .small {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      font-weight: 600;
      white-space: pre-wrap;
    }

    label {
      display: block;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: 800;
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      background: white;
      color: var(--text);
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }

    textarea {
      min-height: 95px;
      resize: vertical;
      line-height: 1.45;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: white;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.18s, transform 0.18s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    button.secondary {
      background: white;
      color: var(--accent);
      border: 1px solid var(--border);
    }

    button.danger {
      background: var(--danger);
      color: white;
    }

    button.warn {
      background: var(--warning-bg);
      color: var(--warning-text);
      border: 1px solid var(--warning-border);
    }

    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }

    .chat-list {
      max-height: 680px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .chat-item {
      background: white;
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
      border-radius: 15px;
      padding: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      position: relative;
    }

    .chat-item.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }

    .chat-item.urgent {
      border-left-color: var(--danger);
    }

    .chat-item.closed,
    .chat-item.resolved {
      border-left-color: #999999;
    }

    .chat-title {
      font-size: 13.5px;
      font-weight: 800;
      margin-bottom: 4px;
      padding-right: 18px;
    }

    .chat-sub {
      font-size: 11.5px;
      color: var(--muted);
      line-height: 1.4;
      font-weight: 600;
    }

    .unread-dot {
      position: absolute;
      top: 13px;
      right: 13px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--danger);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 10.5px;
      font-weight: 800;
      margin-top: 8px;
      text-transform: capitalize;
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid #cfead7;
    }

    .status-pill.open,
    .status-pill.urgent {
      background: var(--warning-bg);
      color: var(--warning-text);
      border-color: var(--warning-border);
    }

    .status-pill.closed,
    .status-pill.resolved {
      background: #eeeeee;
      color: #333333;
      border-color: #d7d7d7;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
      margin-top: 10px;
    }

    .info-box {
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px;
      min-height: 65px;
    }

    .info-label {
      color: var(--accent);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 12.5px;
      font-weight: 700;
      line-height: 1.35;
      word-break: break-word;
    }

    .thread-box {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      min-height: 330px;
    }

    .thread-messages {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      min-height: 230px;
      max-height: 390px;
      overflow-y: auto;
      margin-bottom: 10px;
    }

    .message {
      background: white;
      border: 1px solid var(--border);
      border-radius: 13px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 12.5px;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .message.admin {
      border-left: 4px solid var(--accent);
    }

    .message.worker {
      border-left: 4px solid #7a4f00;
    }

    .message-meta {
      font-size: 10px;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 700;
      line-height: 1.35;
    }

    img.evidence-img {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: white;
      display: block;
      margin-top: 8px;
    }

    .empty {
      background: white;
      border: 1px dashed #bfd1c6;
      padding: 18px;
      border-radius: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
      font-weight: 600;
    }

    .status-message {
      text-align: center;
      font-weight: 800;
      margin-top: 10px;
      font-size: 12.5px;
      line-height: 1.4;
    }

    .success {
      color: var(--accent);
    }

    .error {
      color: var(--danger);
    }

    .typing-line,
    .read-line {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-top: 8px;
      line-height: 1.4;
      text-align: center;
    }

    @media (max-width: 820px) {
      .layout,
      .detail-grid,
      .filters {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<div class="top-bar">
  <a class="back" href="index.html">← Back</a>
  <div class="refresh" onclick="loadChats()">Refresh</div>
</div>

<div class="container">

  <div class="hero">
    <h1>Admin Worker Support</h1>
    <p>Review urgent worker support chats, see linked task details, respond as TaskMint, track read status, and close or resolve support issues.</p>
  </div>

  <div class="layout">

    <div>
      <div class="card">
        <div class="section-title">Search & Filter</div>

        <label for="searchInput">Search</label>
        <input id="searchInput" placeholder="Worker, task, order number, issue, phone" oninput="renderChatList()">

        <div class="filters">
          <div>
            <label for="statusFilter">Status</label>
            <select id="statusFilter" onchange="renderChatList()">
              <option value="">All</option>
              <option value="open">Open</option>
              <option value="closed">Closed</option>
              <option value="resolved">Resolved</option>
              <option value="reopened">Reopened</option>
            </select>
          </div>

          <div>
            <label for="priorityFilter">Priority</label>
            <select id="priorityFilter" onchange="renderChatList()">
              <option value="">All</option>
              <option value="urgent">Urgent</option>
              <option value="normal">Normal</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="section-title">Worker Support Chats</div>
        <div id="chatList" class="chat-list">
          <div class="empty">Loading chats...</div>
        </div>
      </div>
    </div>

    <div>
      <div id="detailsBox" class="card">
        <div class="empty">Select a support chat to review.</div>
      </div>
    </div>

  </div>

</div>

<script>
const supabaseClient =
  window.supabase.createClient(
    "https://dbcthtjmtlumidpbucrc.supabase.co",
    "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
  );

let allChats = [];
let selectedChat = null;
let selectedMessages = [];
let currentAdminUser = null;
let typingTimeout = null;
let refreshTimer = null;

const blockedWords = [
  "fuck",
  "shit",
  "bitch",
  "asshole",
  "nigga",
  "nigger",
  "cunt",
  "motherfucker",
  "pussy"
];

function escapeHTML(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function containsBlockedWords(text) {
  const lower =
    String(text || "").toLowerCase();

  return blockedWords.some(word => lower.includes(word));
}

function formatDate(value) {
  if (!value) {
    return "Not listed";
  }

  const date =
    new Date(value);

  if (Number.isNaN(date.getTime())) {
    return value;
  }

  return date.toLocaleString([], {
    year: "numeric",
    month: "short",
    day: "numeric",
    hour: "numeric",
    minute: "2-digit"
  });
}

function cleanText(value, fallback = "Not listed") {
  if (value === null || value === undefined) {
    return fallback;
  }

  const text =
    String(value).trim();

  return text === "" ? fallback : text;
}

function isUnreadForTaskMint(chat) {
  if (!chat) {
    return false;
  }

  const updatedAt =
    chat.updated_at ? new Date(chat.updated_at).getTime() : 0;

  const taskmintReadAt =
    chat.taskmint_last_read_at ? new Date(chat.taskmint_last_read_at).getTime() : 0;

  return updatedAt > taskmintReadAt;
}

async function getCurrentAdminUser() {
  const { data } =
    await supabaseClient.auth.getUser();

  currentAdminUser =
    data?.user || null;

  return currentAdminUser;
}

async function loadChats() {
  const list =
    document.getElementById("chatList");

  const detailsBox =
    document.getElementById("detailsBox");

  list.innerHTML =
    `<div class="empty">Loading chats...</div>`;

  await getCurrentAdminUser();

  const { data, error } =
    await supabaseClient
      .from("worker_support_chats")
      .select("*")
      .order("updated_at", { ascending: false });

  if (error) {
    list.innerHTML =
      `<div class="empty">${escapeHTML(error.message)}</div>`;
    return;
  }

  allChats =
    data || [];

  if (selectedChat) {
    selectedChat =
      allChats.find(item => item.id === selectedChat.id) || null;
  }

  renderChatList();

  if (selectedChat) {
    await openChat(selectedChat.id);
  } else {
    detailsBox.innerHTML =
      `<div class="empty">Select a support chat to review.</div>`;
  }
}

function renderChatList() {
  const list =
    document.getElementById("chatList");

  const search =
    document.getElementById("searchInput").value.toLowerCase().trim();

  const statusFilter =
    document.getElementById("statusFilter").value;

  const priorityFilter =
    document.getElementById("priorityFilter").value;

  let filtered =
    allChats.slice();

  if (statusFilter) {
    filtered =
      filtered.filter(chat => String(chat.status || "").toLowerCase() === statusFilter);
  }

  if (priorityFilter) {
    filtered =
      filtered.filter(chat => String(chat.priority || "").toLowerCase() === priorityFilter);
  }

  if (search) {
    filtered =
      filtered.filter(chat => [
        chat.id,
        chat.worker_id,
        chat.worker_name,
        chat.worker_email,
        chat.worker_phone,
        chat.task_id,
        chat.task_title,
        chat.task_order_number,
        chat.issue_type,
        chat.status,
        chat.priority,
        chat.task_details
      ].join(" ").toLowerCase().includes(search));
  }

  filtered.sort((a, b) => {
    const unreadA =
      isUnreadForTaskMint(a) ? 1 : 0;

    const unreadB =
      isUnreadForTaskMint(b) ? 1 : 0;

    if (unreadA !== unreadB) {
      return unreadB - unreadA;
    }

    const urgentA =
      String(a.priority || "").toLowerCase() === "urgent" ? 1 : 0;

    const urgentB =
      String(b.priority || "").toLowerCase() === "urgent" ? 1 : 0;

    if (urgentA !== urgentB) {
      return urgentB - urgentA;
    }

    return new Date(b.updated_at || 0) - new Date(a.updated_at || 0);
  });

  if (filtered.length === 0) {
    list.innerHTML =
      `<div class="empty">No support chats found.</div>`;
    return;
  }

  list.innerHTML = "";

  filtered.forEach(chat => {
    const item =
      document.createElement("div");

    const unread =
      isUnreadForTaskMint(chat);

    const priority =
      String(chat.priority || "").toLowerCase();

    const status =
      String(chat.status || "open").toLowerCase();

    item.className =
      `chat-item ${selectedChat && selectedChat.id === chat.id ? "active" : ""} ${priority} ${status}`;

    item.onclick =
      () => openChat(chat.id);

    item.innerHTML = `
      ${unread ? `<span class="unread-dot"></span>` : ""}
      <div class="chat-title">
        ${escapeHTML(chat.issue_type || "Worker Support")}
      </div>

      <div class="chat-sub">
        Worker: ${escapeHTML(chat.worker_name || chat.worker_email || chat.worker_id || "Not listed")}<br>
        Order: ${escapeHTML(chat.task_order_number || "Not linked")}<br>
        Updated: ${escapeHTML(formatDate(chat.updated_at || chat.created_at))}
      </div>

      <span class="status-pill ${escapeHTML(status)}">
        ${escapeHTML(status)}
      </span>

      <span class="status-pill ${escapeHTML(priority || "normal")}" style="margin-left:5px;">
        ${escapeHTML(priority || "normal")}
      </span>
    `;

    list.appendChild(item);
  });
}

async function openChat(chatId) {
  selectedChat =
    allChats.find(item => item.id === chatId) || null;

  if (!selectedChat) {
    return;
  }

  renderChatList();

  await loadMessages(chatId);
  await markTaskMintRead();
  renderDetails();
}

async function loadMessages(chatId) {
  const { data, error } =
    await supabaseClient
      .from("worker_support_chat_messages")
      .select("*")
      .eq("chat_id", chatId)
      .order("created_at", { ascending: true });

  selectedMessages =
    error ? [] : (data || []);
}

async function markTaskMintRead() {
  if (!selectedChat) {
    return;
  }

  const now =
    new Date().toISOString();

  await supabaseClient
    .from("worker_support_chats")
    .update({
      taskmint_last_read_at: now
    })
    .eq("id", selectedChat.id);

  await supabaseClient
    .from("worker_support_chat_messages")
    .update({
      is_read_by_taskmint: true
    })
    .eq("chat_id", selectedChat.id)
    .neq("sender_role", "admin");

  selectedChat.taskmint_last_read_at =
    now;
}

function renderMessageList() {
  if (!selectedMessages || selectedMessages.length === 0) {
    return `<div class="small">No messages yet.</div>`;
  }

  return selectedMessages.map(message => {
    const sender =
      String(message.sender_role || "worker").toLowerCase();

    return `
      <div class="message ${escapeHTML(sender === "admin" ? "admin" : "worker")}">
        <strong>${escapeHTML(sender === "admin" ? "TaskMint" : "Worker")}</strong><br>
        ${escapeHTML(message.message || "")}
        ${
          message.attachment_url
            ? `<a href="${escapeHTML(message.attachment_url)}" target="_blank"><img class="evidence-img" src="${escapeHTML(message.attachment_url)}" alt="Support upload"></a>`
            : ""
        }
        <div class="message-meta">
          ${escapeHTML(formatDate(message.created_at))}
          ${
            sender === "admin"
              ? `<br>${message.is_read_by_worker ? "Read by worker" : "Sent to worker"}`
              : `<br>${message.is_read_by_taskmint ? "Read by TaskMint" : "Unread by TaskMint"}`
          }
        </div>
      </div>
    `;
  }).join("");
}

function renderDetails() {
  const box =
    document.getElementById("detailsBox");

  if (!selectedChat) {
    box.innerHTML =
      `<div class="empty">Select a support chat to review.</div>`;
    return;
  }

  const status =
    String(selectedChat.status || "open").toLowerCase();

  const priority =
    String(selectedChat.priority || "normal").toLowerCase();

  box.innerHTML = `
    <div class="section-title">Support Chat Details</div>

    <div class="detail-grid">
      <div class="info-box">
        <div class="info-label">Status</div>
        <div class="info-value">
          <span class="status-pill ${escapeHTML(status)}">${escapeHTML(status)}</span>
        </div>
      </div>

      <div class="info-box">
        <div class="info-label">Priority</div>
        <div class="info-value">
          <span class="status-pill ${escapeHTML(priority)}">${escapeHTML(priority)}</span>
        </div>
      </div>

      <div class="info-box">
        <div class="info-label">Worker</div>
        <div class="info-value">${escapeHTML(selectedChat.worker_name || selectedChat.worker_email || selectedChat.worker_id || "Not listed")}</div>
      </div>

      <div class="info-box">
        <div class="info-label">Worker Phone</div>
        <div class="info-value">${escapeHTML(selectedChat.worker_phone || "Not listed")}</div>
      </div>

      <div class="info-box">
        <div class="info-label">Task</div>
        <div class="info-value">${escapeHTML(selectedChat.task_title || "Not linked")}</div>
      </div>

      <div class="info-box">
        <div class="info-label">Order</div>
        <div class="info-value">${escapeHTML(selectedChat.task_order_number || "Not listed")}</div>
      </div>

      <div class="info-box">
        <div class="info-label">Task ID</div>
        <div class="info-value">${escapeHTML(selectedChat.task_id || "Not linked")}</div>
      </div>

      <div class="info-box">
        <div class="info-label">Location</div>
        <div class="info-value">${escapeHTML(selectedChat.task_location || "Not listed")}</div>
      </div>

      <div class="info-box">
        <div class="info-label">Worker Read</div>
        <div class="info-value">${escapeHTML(formatDate(selectedChat.worker_last_read_at))}</div>
      </div>

      <div class="info-box">
        <div class="info-label">TaskMint Read</div>
        <div class="info-value">${escapeHTML(formatDate(selectedChat.taskmint_last_read_at))}</div>
      </div>
    </div>

    ${
      selectedChat.task_details
        ? `
          <div class="card" style="margin-top:12px;background:white;">
            <div class="section-title">Task Details</div>
            <p class="small">${escapeHTML(selectedChat.task_details)}</p>
          </div>
        `
        : ""
    }

    <div class="card" style="margin-top:12px;background:white;">
      <div class="section-title">Admin Actions</div>

      <div class="detail-grid">
        <button onclick="updateChatStatus('open')">Mark Open</button>
        <button class="secondary" onclick="updateChatStatus('resolved')">Resolve Chat</button>
        <button class="warn" onclick="updateChatStatus('reopened')">Reopen Chat</button>
        <button class="danger" onclick="updateChatStatus('closed')">Close Chat</button>
      </div>

      <label for="closeReason">Closed / Resolution Reason</label>
      <select id="closeReason">
        <option value="">Select reason</option>
        <option value="resolved">Resolved</option>
        <option value="worker_stopped_responding">Worker stopped responding</option>
        <option value="escalated_to_dispute">Escalated to dispute</option>
        <option value="safety_issue">Safety issue</option>
        <option value="duplicate_chat">Duplicate chat</option>
        <option value="other">Other</option>
      </select>

      <label for="internalNote">Internal Admin Notes</label>
      <textarea id="internalNote" placeholder="Internal TaskMint notes only">${escapeHTML(selectedChat.internal_notes || "")}</textarea>

      <button class="secondary" onclick="saveInternalNote()">Save Internal Note</button>
      <button class="secondary" onclick="convertToDispute()">Convert to Dispute Review</button>

      <div id="adminActionStatus" class="status-message"></div>
    </div>

    <div class="thread-box">
      <div class="section-title">Worker ↔ TaskMint</div>
      <p class="small">Worker typing status, read receipts, and uploaded photos are shown in this thread.</p>

      <div class="thread-messages" id="threadMessages">
        ${renderMessageList()}
      </div>

      <div class="typing-line">
        ${selectedChat.worker_typing ? "Worker is typing..." : ""}
      </div>

      <div class="read-line">
        Worker last read: ${escapeHTML(formatDate(selectedChat.worker_last_read_at))} • TaskMint last read: ${escapeHTML(formatDate(selectedChat.taskmint_last_read_at))}
      </div>

      <label for="adminReply">Reply as TaskMint</label>
      <textarea id="adminReply" placeholder="Type TaskMint support response..." oninput="setTaskMintTyping()"></textarea>

      <button onclick="sendAdminReply()">Send Reply</button>

      <div id="replyStatus" class="status-message"></div>
    </div>
  `;

  const thread =
    document.getElementById("threadMessages");

  if (thread) {
    thread.scrollTop =
      thread.scrollHeight;
  }
}

async function setTaskMintTyping() {
  if (!selectedChat) {
    return;
  }

  await supabaseClient
    .from("worker_support_chats")
    .update({
      taskmint_typing: true
    })
    .eq("id", selectedChat.id);

  clearTimeout(typingTimeout);

  typingTimeout =
    setTimeout(async () => {
      await supabaseClient
        .from("worker_support_chats")
        .update({
          taskmint_typing: false
        })
        .eq("id", selectedChat.id);
    }, 1800);
}

async function sendAdminReply() {
  if (!selectedChat) {
    return;
  }

  const input =
    document.getElementById("adminReply");

  const statusBox =
    document.getElementById("replyStatus");

  const message =
    input.value.trim();

  statusBox.className =
    "status-message";

  statusBox.innerText =
    "";

  if (!message) {
    statusBox.className =
      "status-message error";

    statusBox.innerText =
      "Enter a reply.";

    return;
  }

  if (containsBlockedWords(message)) {
    statusBox.className =
      "status-message error";

    statusBox.innerText =
      "Remove inappropriate language.";

    return;
  }

  const now =
    new Date().toISOString();

  const { error } =
    await supabaseClient
      .from("worker_support_chat_messages")
      .insert({
        chat_id: selectedChat.id,
        task_id: selectedChat.task_id || null,
        worker_id: selectedChat.worker_id || null,
        sender_id: currentAdminUser?.id || null,
        sender_role: "admin",
        message: message,
        is_read_by_worker: false,
        is_read_by_taskmint: true,
        created_at: now
      });

  if (error) {
    statusBox.className =
      "status-message error";

    statusBox.innerText =
      error.message;

    return;
  }

  await supabaseClient
    .from("worker_support_chats")
    .update({
      status: "open",
      taskmint_typing: false,
      taskmint_last_read_at: now,
      updated_at: now
    })
    .eq("id", selectedChat.id);

  input.value = "";

  statusBox.className =
    "status-message success";

  statusBox.innerText =
    "Reply sent.";

  await loadChats();
}

async function updateChatStatus(newStatus) {
  if (!selectedChat) {
    return;
  }

  const statusBox =
    document.getElementById("adminActionStatus");

  const closeReasonInput =
    document.getElementById("closeReason");

  const closedReason =
    closeReasonInput ? closeReasonInput.value : "";

  const now =
    new Date().toISOString();

  const updateData = {
    status: newStatus,
    updated_at: now
  };

  if (["closed", "resolved"].includes(newStatus)) {
    updateData.closed_by = "taskmint";
    updateData.closed_reason = closedReason || newStatus;
    updateData.closed_at = now;
  }

  if (newStatus === "reopened") {
    updateData.closed_by = null;
    updateData.closed_reason = null;
    updateData.closed_at = null;
  }

  statusBox.className =
    "status-message";

  statusBox.innerText =
    "Updating...";

  const { error } =
    await supabaseClient
      .from("worker_support_chats")
      .update(updateData)
      .eq("id", selectedChat.id);

  if (error) {
    statusBox.className =
      "status-message error";

    statusBox.innerText =
      error.message;

    return;
  }

  statusBox.className =
    "status-message success";

  statusBox.innerText =
    "Chat status updated.";

  await loadChats();
}

async function saveInternalNote() {
  if (!selectedChat) {
    return;
  }

  const statusBox =
    document.getElementById("adminActionStatus");

  const note =
    document.getElementById("internalNote").value.trim();

  statusBox.className =
    "status-message";

  statusBox.innerText =
    "Saving...";

  const { error } =
    await supabaseClient
      .from("worker_support_chats")
      .update({
        internal_notes: note || null,
        updated_at: new Date().toISOString()
      })
      .eq("id", selectedChat.id);

  if (error) {
    statusBox.className =
      "status-message error";

    statusBox.innerText =
      error.message;

    return;
  }

  statusBox.className =
    "status-message success";

  statusBox.innerText =
    "Internal note saved.";

  await loadChats();
}

async function convertToDispute() {
  if (!selectedChat || !selectedChat.task_id) {
    return;
  }

  const confirmed =
    confirm("Convert this support chat into a dispute review and lock the task payment?");

  if (!confirmed) {
    return;
  }

  const statusBox =
    document.getElementById("adminActionStatus");

  statusBox.className =
    "status-message";

  statusBox.innerText =
    "Converting to dispute review...";

  const now =
    new Date().toISOString();

  await supabaseClient
    .from("tasks")
    .update({
      status: "dispute_open",
      dispute_status: "open",
      escrow_status: "disputed",
      updated_at: now
    })
    .eq("id", selectedChat.task_id);

  const { error } =
    await supabaseClient
      .from("worker_support_chats")
      .update({
        status: "resolved",
        closed_by: "taskmint",
        closed_reason: "escalated_to_dispute",
        closed_at: now,
        updated_at: now
      })
      .eq("id", selectedChat.id);

  if (error) {
    statusBox.className =
      "status-message error";

    statusBox.innerText =
      error.message;

    return;
  }

  statusBox.className =
    "status-message success";

  statusBox.innerText =
    "Support chat converted to dispute review.";

  await loadChats();
}

async function refreshSelectedChat() {
  if (!selectedChat) {
    return;
  }

  const { data } =
    await supabaseClient
      .from("worker_support_chats")
      .select("*")
      .eq("id", selectedChat.id)
      .maybeSingle();

  if (!data) {
    return;
  }

  selectedChat =
    data;

  await loadMessages(selectedChat.id);
  await markTaskMintRead();
  renderDetails();
  renderChatList();
}

async function init() {
  await getCurrentAdminUser();
  await loadChats();

  if (refreshTimer) {
    clearInterval(refreshTimer);
  }

  refreshTimer =
    setInterval(async () => {
      if (selectedChat) {
        await refreshSelectedChat();
      }

      await loadChats();
    }, 7000);
}

init();
</script>

</body>
</html>
