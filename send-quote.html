<!DOCTYPE html>
<html>
<head>
  <title>Send Quote - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f2f7f4;
      --surface2: #e6f4eb;
      --border: #e2ebe5;
      --accent: #0b7a28;
      --text: #111111;
      --muted: #6b7870;
      --danger: #b00020;
      --warning-bg: #fffbeb;
      --warning-border: #f0c040;
      --warning-text: #7a4f00;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 470px;
      min-height: 100vh;
      padding: 20px 16px 30px;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 40;
      width: 100%;
      max-width: 470px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      margin: -20px -16px 20px;
    }

    .back {
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
      display: inline-block;
      cursor: pointer;
      font-size: 14px;
    }

    .hero {
      background: var(--accent);
      color: white;
      border-radius: 22px;
      padding: 24px 20px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(11,122,40,0.22);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: riseIn 0.35s 0.05s forwards;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 155px;
      height: 155px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      top: -65px;
      right: -55px;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      bottom: -45px;
      left: -35px;
    }

    .hero h1 {
      margin: 0 0 7px;
      font-size: 29px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 2;
    }

    .hero p {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
      position: relative;
      z-index: 2;
    }

    .card,
    .notice,
    .error {
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      opacity: 0;
      animation: riseIn 0.35s 0.12s forwards;
    }

    .card {
      background: var(--surface);
    }

    .notice {
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      color: var(--warning-text);
      font-size: 12.5px;
      line-height: 1.5;
      font-weight: 700;
    }

    .error {
      background: #fff2f2;
      border: 1px solid #ffb7b7;
      color: #8b0018;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 800;
      display: none;
    }

    .task-title {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 10px;
      line-height: 1.2;
      letter-spacing: -0.2px;
    }

    .task-info {
      font-size: 13px;
      color: var(--text);
      margin: 9px 0;
      line-height: 1.5;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px;
    }

    .task-info strong {
      color: var(--accent);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 800;
      display: block;
      margin-bottom: 4px;
    }

    .quote-panel {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .panel-label {
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }

    input,
    textarea {
      width: 100%;
      padding: 13px;
      border-radius: 13px;
      border: 1px solid var(--border);
      font-size: 14px;
      box-sizing: border-box;
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      background: white;
      color: var(--text);
    }

    input:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.45;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 13px;
      background: var(--accent);
      color: white;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(11,122,40,0.10);
    }

    button:disabled {
      background: #b9b9b9;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .money-field {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: white;
      overflow: hidden;
    }

    .money-field span {
      padding: 0 16px;
      font-size: 18px;
      font-weight: 800;
      color: var(--accent);
      background: var(--surface2);
      align-self: stretch;
      display: flex;
      align-items: center;
      border-right: 1px solid var(--border);
    }

    .money-field input {
      border: none;
      margin: 0;
      flex: 1;
      padding: 14px;
      font-size: 15px;
      outline: none;
      box-shadow: none;
    }

    .character-count {
      font-size: 12px;
      color: var(--muted);
      margin-top: 7px;
      text-align: right;
      font-weight: 700;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 360px) {
      .hero h1 {
        font-size: 25px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <a class="back" onclick="window.location.href='worker-open-task.html'">
      ← Back
    </a>
  </div>

  <div class="hero">
    <h1>Send Quote</h1>
    <p>Review the task details, enter your quote, and send the customer a clear message.</p>
  </div>

  <div class="notice">
    Workers must complete their profile and be approved before quotes can be submitted.
  </div>

  <div class="error" id="errorBox"></div>

  <div class="card">

    <div class="task-title" id="taskTitle">
      Loading Task...
    </div>

    <div class="task-info" id="taskDescription"></div>

    <div class="task-info">
      <strong>Location</strong>
      <span id="taskLocation"></span>
    </div>

    <div class="task-info">
      <strong>Date Needed</strong>
      <span id="taskDate"></span>
    </div>

  </div>

  <div class="card">

    <div class="quote-panel">
      <div class="panel-label">Quote Amount</div>

      <div class="money-field">
        <span>$</span>
        <input
          type="number"
          id="quoteAmount"
          placeholder="0.00"
          step="0.01"
          min="1"
          oninput="preventNegative(this)"
        >
      </div>
    </div>

    <div class="quote-panel">
      <div class="panel-label">Message to Customer</div>

      <textarea
        id="quoteMessage"
        maxlength="500"
        placeholder="Describe your experience, timeline, or anything the customer should know..."
      ></textarea>

      <div id="characterCount" class="character-count">
        0 / 500
      </div>
    </div>

    <button id="submitQuoteBtn" onclick="submitQuote()">
      Submit Quote
    </button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

const selectedTaskId =
  localStorage.getItem("selectedQuoteTaskId");

const selectedQuoteFlexibleDate =
  localStorage.getItem("selectedQuoteFlexibleDate") || "";

let selectedTaskCustomerId = null;
let currentWorkerUser = null;
let currentWorkerProfile = null;
let currentMainProfile = null;

function showError(message) {
  const errorBox =
    document.getElementById("errorBox");

  errorBox.style.display = "block";
  errorBox.innerText = message;
}

function clearError() {
  const errorBox =
    document.getElementById("errorBox");

  errorBox.style.display = "none";
  errorBox.innerText = "";
}

function formatDate(value) {
  if (!value) {
    return "Not specified";
  }

  const date =
    new Date(value);

  if (isNaN(date.getTime())) {
    return value;
  }

  return date.toLocaleDateString();
}

function preventNegative(input) {
  if (Number(input.value) < 0) {
    input.value = "";
  }
}

function removeHiddenAddressDetails(textValue) {
  const text =
    String(textValue || "");

  if (!text) {
    return "";
  }

  return text
    .split("\n")
    .filter(line => {
      const lowered =
        String(line || "").toLowerCase().trim();

      return !(
        lowered.startsWith("task address:") ||
        lowered.startsWith("address:") ||
        lowered.startsWith("street address:") ||
        lowered.startsWith("full address:") ||
        lowered.startsWith("unit:") ||
        lowered.startsWith("apt:") ||
        lowered.startsWith("apartment:") ||
        lowered.startsWith("suite:") ||
        lowered.startsWith("drop-off address:") ||
        lowered.startsWith("dropoff address:") ||
        lowered.startsWith("drop off address:") ||
        lowered.startsWith("drop-off unit:") ||
        lowered.startsWith("dropoff unit:") ||
        lowered.startsWith("drop off unit:") ||
        lowered.startsWith("drop-off city:") ||
        lowered.startsWith("dropoff city:") ||
        lowered.startsWith("drop off city:") ||
        lowered.startsWith("drop-off state:") ||
        lowered.startsWith("dropoff state:") ||
        lowered.startsWith("drop off state:") ||
        lowered.startsWith("drop-off zip:") ||
        lowered.startsWith("dropoff zip:") ||
        lowered.startsWith("drop off zip:")
      );
    })
    .join("\n")
    .trim();
}

async function getCurrentWorkerUser() {
  const { data } =
    await supabaseClient.auth.getSession();

  if (data.session && data.session.user) {
    localStorage.setItem("taskmintWorkerUserId", data.session.user.id);
    localStorage.setItem("taskmintUserId", data.session.user.id);
    return data.session.user;
  }

  const savedUserId =
    localStorage.getItem("taskmintWorkerUserId") ||
    localStorage.getItem("taskmintUserId");

  if (savedUserId) {
    return { id: savedUserId };
  }

  return null;
}


async function fetchSingleByColumn(tableName, columnName, value) {
  if (!value) {
    return null;
  }

  const { data, error } =
    await supabaseClient
      .from(tableName)
      .select("*")
      .eq(columnName, value)
      .maybeSingle();

  if (error || !data) {
    return null;
  }

  return data;
}

async function getWorkerProfile(workerUser) {
  if (!workerUser || !workerUser.id) {
    return null;
  }

  const { data: mainProfile } =
    await supabaseClient
      .from("profiles")
      .select("*")
      .eq("id", workerUser.id)
      .maybeSingle();

  currentMainProfile = mainProfile || null;

  let profile =
    await fetchSingleByColumn("worker_profiles", "auth_user_id", workerUser.id) ||
    await fetchSingleByColumn("worker_profiles", "id", workerUser.id);

  if (profile && profile.id) {
    return {
      ...(mainProfile || {}),
      ...profile
    };
  }

  const fullName =
    mainProfile?.full_name ||
    mainProfile?.display_name ||
    `${mainProfile?.first_name || ""} ${mainProfile?.last_name || ""}`.trim() ||
    workerUser.email?.split("@")[0] ||
    "Worker";

  return mainProfile || {
    id: workerUser.id,
    auth_user_id: workerUser.id,
    full_name: fullName
  };
}

function isWorkerApprovedForQuotes(profile) {
  return (
    profile &&
    (
      profile.is_worker_approved === true ||
      profile.is_approved === true ||
      String(profile.worker_status || "").toLowerCase() === "approved" ||
      String(profile.approval_status || "").toLowerCase() === "approved" ||
      String(profile.verification_status || "").toLowerCase() === "approved"
    )
  );
}

function getWorkerDisplayName(workerProfile, workerUser) {
  const fullName =
    workerProfile.full_name ||
    "";

  if (fullName) {
    const parts =
      String(fullName).trim().split(/\s+/);

    if (parts.length > 1) {
      return `${parts[0]} ${parts[parts.length - 1].charAt(0).toUpperCase()}.`;
    }

    return parts[0];
  }

  if (workerUser && workerUser.email) {
    return workerUser.email.split("@")[0];
  }

  return "Worker";
}

function getWorkerFirstName(workerProfile, workerUser) {
  const fullName =
    workerProfile.full_name ||
    "";

  if (fullName) {
    return String(fullName).trim().split(/\s+/)[0];
  }

  if (workerUser && workerUser.email) {
    return workerUser.email.split("@")[0];
  }

  return "";
}

function getWorkerLastInitial(workerProfile) {
  const fullName =
    workerProfile.full_name ||
    "";

  if (fullName) {
    const parts =
      String(fullName).trim().split(/\s+/);

    if (parts.length > 1) {
      return parts[parts.length - 1].charAt(0).toUpperCase();
    }
  }

  return "";
}

async function loadTask() {
  clearError();

  currentWorkerUser =
    await getCurrentWorkerUser();

  if (!currentWorkerUser || !currentWorkerUser.id) {
    showError("You must be logged in as a worker to send a quote.");
    document.getElementById("submitQuoteBtn").disabled = true;
    return;
  }

  currentWorkerProfile =
    await getWorkerProfile(currentWorkerUser);

  if (!isWorkerApprovedForQuotes(currentWorkerProfile)) {
    showError("Your worker profile is pending TaskMint approval. You can submit quotes after TaskMint approves your account.");
    document.getElementById("submitQuoteBtn").disabled = true;
  }

  if (!selectedTaskId) {
    showError("No task selected.");
    return;
  }

  const { data: task, error } =
    await supabaseClient
      .from("tasks")
      .select("*")
      .eq("id", selectedTaskId)
      .maybeSingle();

  if (error || !task) {
    showError("Error loading task.");
    return;
  }

  document.getElementById("taskTitle").innerText =
    task.title || task.category || "Task";

  document.getElementById("taskDescription").innerText =
    removeHiddenAddressDetails(task.description || task.additional_notes || "");

  document.getElementById("taskLocation").innerText =
    [task.city, task.state].filter(Boolean).join(", ") ||
    "Location hidden until customer accepts your quote.";

  document.getElementById("taskDate").innerText =
    task.date_flexible
      ? "Flexible"
      : formatDate(task.task_date || task.date_needed || task.needed_by);

  selectedTaskCustomerId =
    task.customer_id;
}

async function submitQuote() {
  clearError();

  const amount =
    document.getElementById("quoteAmount").value;

  const message =
    document.getElementById("quoteMessage").value;

  const cleanedMessage =
    message.trim();

  if (!currentWorkerUser || !currentWorkerUser.id) {
    showError("You must be logged in as a worker to submit a quote.");
    return;
  }

  if (!isWorkerApprovedForQuotes(currentWorkerProfile)) {
    showError("Your worker profile is pending TaskMint approval. You can submit quotes after TaskMint approves your account.");
    return;
  }

  if (!selectedTaskId) {
    showError("No task selected.");
    return;
  }

  if (!selectedTaskCustomerId) {
    showError("This task is missing the customer ID.");
    return;
  }

  if (Number(amount) <= 0) {
    showError("Quote amount must be greater than $0.");
    return;
  }

  if (cleanedMessage.length < 10) {
    showError("Please provide more details for the customer.");
    return;
  }

  const button =
    document.getElementById("submitQuoteBtn");

  button.disabled = true;
  button.innerText = "Submitting Quote...";

  const workerProfileId =
    currentWorkerProfile && currentWorkerProfile.id
      ? currentWorkerProfile.id
      : "";

  if (!workerProfileId) {
    button.disabled = false;
    button.innerText = "Submit Quote";
    showError("Your worker profile could not be found. Complete or refresh your worker profile before sending a quote.");
    return;
  }

  const workerDisplayName =
    getWorkerDisplayName(currentWorkerProfile || {}, currentWorkerUser);

  const firstName =
    getWorkerFirstName(currentWorkerProfile || {}, currentWorkerUser);

  const lastInitial =
    getWorkerLastInitial(currentWorkerProfile || {});

  const quotePayload = {
    task_id: selectedTaskId,
    worker_id: workerProfileId,
    customer_id: selectedTaskCustomerId,
    quote_amount: Number(amount),
    message: cleanedMessage,
    status: "pending",
    worker_display_name: workerDisplayName,
    worker_first_name: firstName,
    worker_last_initial: lastInitial,
    selected_flexible_date: selectedQuoteFlexibleDate || null
  };

  const { data: existingQuote } =
    await supabaseClient
      .from("worker_quotes")
      .select("id, status")
      .eq("task_id", selectedTaskId)
      .eq("worker_id", workerProfileId)
      .eq("customer_id", selectedTaskCustomerId)
      .in("status", [
        "pending",
        "accepted",
        "in_progress",
        "completed",
        "paid"
      ])
      .maybeSingle();

  if (existingQuote) {
    button.disabled = false;
    button.innerText = "Submit Quote";

    showError(
      "You've already sent a quote to this customer. Please wait until the customer either accepts or declines your quote."
    );

    return;
  }

  const { error } =
    await supabaseClient
      .from("worker_quotes")
      .insert([quotePayload]);

  if (error) {
    button.disabled = false;
    button.innerText = "Submit Quote";
    showError(error.message + " | worker_id sent: " + workerProfileId);
    return;
  }

  localStorage.removeItem("selectedQuoteFlexibleDate");

  alert("Quote submitted successfully.");

  document.getElementById("quoteAmount").value = "";
  document.getElementById("quoteMessage").value = "";
  document.getElementById("characterCount").innerText = "0 / 500";

  window.location.href = "worker-open-task.html";
}

const quoteMessage =
  document.getElementById("quoteMessage");

const characterCount =
  document.getElementById("characterCount");

quoteMessage.addEventListener("input", () => {
  characterCount.innerText =
    `${quoteMessage.value.length} / 500`;
});

loadTask();
</script>

</body>
</html>
