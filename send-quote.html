<!DOCTYPE html>
<html>
<head>
  <title>Send Quote - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
    }

    .back {
      color: #0b7a28;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 15px;
      cursor: pointer;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #0b7a28;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .task-title {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .task-info {
      font-size: 14px;
      color: #444;
      margin: 8px 0;
      line-height: 1.5;
    }

    input,
    textarea {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 120px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 16px;
      border: none;
      border-radius: 12px;
      background: #0b7a28;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #aaa;
      cursor: not-allowed;
    }

    .notice {
      background: #fff7e6;
      border: 1px solid #ffd27a;
      color: #7a4b00;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 15px;
      font-size: 14px;
      line-height: 1.4;
    }

    .error {
      background: #fff2f2;
      border: 1px solid #ffb7b7;
      color: #8b0018;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 15px;
      font-size: 14px;
      line-height: 1.4;
      display: none;
    }

    .money-field {
      display: flex;
      align-items: center;
      border: 1px solid #ddd;
      border-radius: 10px;
      margin-top: 12px;
      background: white;
      overflow: hidden;
    }

    .money-field span {
      padding: 0 16px;
      font-size: 18px;
      font-weight: bold;
      color: #111;
    }

    .money-field input {
      border: none;
      margin: 0;
      flex: 1;
      padding: 14px;
      font-size: 15px;
      outline: none;
    }
  </style>
</head>

<body>

<div class="container">

  <a class="back" onclick="window.location.href='worker-open-task.html'">
    ← Back
  </a>

  <h1>Send Quote</h1>

  <div class="notice">
    Workers must complete their profile and be approved before quotes can be submitted.
  </div>

  <div class="error" id="errorBox"></div>

  <div class="card">

    <div class="task-title" id="taskTitle">
      Loading Task...
    </div>

    <div class="task-info" id="taskDescription"></div>

    <div class="task-info">
      <strong>Location:</strong>
      <span id="taskLocation"></span>
    </div>

    <div class="task-info">
      <strong>Date Needed:</strong>
      <span id="taskDate"></span>
    </div>

  </div>

  <div class="card">

    <div class="money-field">
      <span>$</span>
      <input
        type="number"
        id="quoteAmount"
        placeholder="0.00"
        step="0.01"
        min="1"
        oninput="preventNegative(this)"
      >
    </div>

    <textarea
      id="quoteMessage"
      maxlength="500"
      placeholder="Describe your experience, timeline, or anything the customer should know..."
    ></textarea>

    <div id="characterCount"
      style="
        font-size:13px;
        color:#666;
        margin-top:6px;
        text-align:right;
      ">
      0 / 500
    </div>

    <button id="submitQuoteBtn" onclick="submitQuote()">
      Submit Quote
    </button>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

const selectedTaskId =
  localStorage.getItem("selectedQuoteTaskId");

let selectedTaskCustomerId = null;
let currentWorkerUser = null;
let currentWorkerProfile = null;

function showError(message) {
  const errorBox =
    document.getElementById("errorBox");

  errorBox.style.display = "block";
  errorBox.innerText = message;
}

function clearError() {
  const errorBox =
    document.getElementById("errorBox");

  errorBox.style.display = "none";
  errorBox.innerText = "";
}

function formatDate(value) {
  if (!value) {
    return "Not specified";
  }

  const date =
    new Date(value);

  if (isNaN(date.getTime())) {
    return value;
  }

  return date.toLocaleDateString();
}

function preventNegative(input) {
  if (Number(input.value) < 0) {
    input.value = "";
  }
}

async function getCurrentWorkerUser() {
  const { data } =
    await supabaseClient.auth.getSession();

  if (data.session && data.session.user) {
    localStorage.setItem("taskmintWorkerUserId", data.session.user.id);
    localStorage.setItem("taskmintUserId", data.session.user.id);
    return data.session.user;
  }

  const savedUserId =
    localStorage.getItem("taskmintWorkerUserId") ||
    localStorage.getItem("taskmintUserId");

  if (savedUserId) {
    return { id: savedUserId };
  }

  return null;
}

async function fetchSingleByColumn(tableName, columnName, value) {
  if (!value) {
    return null;
  }

  const { data, error } =
    await supabaseClient
      .from(tableName)
      .select("*")
      .eq(columnName, value)
      .maybeSingle();

  if (error || !data) {
    return null;
  }

  return data;
}

async function getWorkerProfile(workerUser) {
  if (!workerUser || !workerUser.id) {
    return null;
  }

  let profile =
    await fetchSingleByColumn("worker_profiles", "user_id", workerUser.id) ||
    await fetchSingleByColumn("worker_profiles", "worker_id", workerUser.id) ||
    await fetchSingleByColumn("worker_profiles", "profile_id", workerUser.id) ||
    await fetchSingleByColumn("worker_profiles", "id", workerUser.id);

  if (!profile && workerUser.email) {
    profile =
      await fetchSingleByColumn("worker_profiles", "email", workerUser.email);
  }

  if (!profile && workerUser.email) {
    profile =
      await fetchSingleByColumn("workers", "email", workerUser.email);
  }

  if (!profile) {
    profile =
      await fetchSingleByColumn("profiles", "id", workerUser.id);
  }

  return profile || {};
}

function getWorkerDisplayName(workerProfile, workerUser) {
  const firstName =
    workerProfile.first_name ||
    workerProfile.first ||
    workerProfile.worker_first_name ||
    "";

  const lastName =
    workerProfile.last_name ||
    workerProfile.last ||
    workerProfile.worker_last_name ||
    "";

  const lastInitial =
    lastName
      ? String(lastName).trim().charAt(0).toUpperCase()
      : "";

  if (firstName) {
    return `${firstName} ${lastInitial ? lastInitial + "." : ""}`.trim();
  }

  const fullName =
    workerProfile.full_name ||
    workerProfile.display_name ||
    workerProfile.worker_name ||
    "";

  if (fullName) {
    const parts =
      String(fullName).trim().split(/\s+/);

    if (parts.length > 1) {
      return `${parts[0]} ${parts[parts.length - 1].charAt(0).toUpperCase()}.`;
    }

    return parts[0];
  }

  if (workerUser && workerUser.email) {
    return workerUser.email.split("@")[0];
  }

  return "Worker";
}

function getWorkerFirstName(workerProfile, workerUser) {
  if (workerProfile.first_name || workerProfile.first || workerProfile.worker_first_name) {
    return workerProfile.first_name || workerProfile.first || workerProfile.worker_first_name;
  }

  const fullName =
    workerProfile.full_name ||
    workerProfile.display_name ||
    "";

  if (fullName) {
    return String(fullName).trim().split(/\s+/)[0];
  }

  if (workerUser && workerUser.email) {
    return workerUser.email.split("@")[0];
  }

  return "";
}

function getWorkerLastInitial(workerProfile) {
  const lastName =
    workerProfile.last_name ||
    workerProfile.last ||
    workerProfile.worker_last_name ||
    "";

  if (lastName) {
    return String(lastName).trim().charAt(0).toUpperCase();
  }

  const fullName =
    workerProfile.full_name ||
    workerProfile.display_name ||
    "";

  if (fullName) {
    const parts =
      String(fullName).trim().split(/\s+/);

    if (parts.length > 1) {
      return parts[parts.length - 1].charAt(0).toUpperCase();
    }
  }

  return "";
}

async function loadTask() {
  clearError();

  currentWorkerUser =
    await getCurrentWorkerUser();

  if (!currentWorkerUser || !currentWorkerUser.id) {
    showError("You must be logged in as a worker to send a quote.");
    document.getElementById("submitQuoteBtn").disabled = true;
    return;
  }

  currentWorkerProfile =
    await getWorkerProfile(currentWorkerUser);

  if (!selectedTaskId) {
    showError("No task selected.");
    return;
  }

  const { data: task, error } =
    await supabaseClient
      .from("tasks")
      .select("*")
      .eq("id", selectedTaskId)
      .maybeSingle();

  if (error || !task) {
    showError("Error loading task.");
    return;
  }

  document.getElementById("taskTitle").innerText =
    task.title || task.category || "Task";

  document.getElementById("taskDescription").innerText =
    task.description || task.additional_notes || "";

  document.getElementById("taskLocation").innerText =
    [task.city, task.state].filter(Boolean).join(", ") ||
    task.location ||
    "Not specified";

  document.getElementById("taskDate").innerText =
    task.date_flexible
      ? "Flexible"
      : formatDate(task.task_date || task.date_needed || task.needed_by);

  selectedTaskCustomerId =
    task.customer_id;
}

async function submitQuote() {
  clearError();

  const amount =
    document.getElementById("quoteAmount").value;

  const message =
    document.getElementById("quoteMessage").value;

  const cleanedMessage =
    message.trim();

  if (!currentWorkerUser || !currentWorkerUser.id) {
    showError("You must be logged in as a worker to submit a quote.");
    return;
  }

  if (!selectedTaskId) {
    showError("No task selected.");
    return;
  }

  if (!selectedTaskCustomerId) {
    showError("This task is missing the customer ID.");
    return;
  }

  if (Number(amount) <= 0) {
    showError("Quote amount must be greater than $0.");
    return;
  }

  if (cleanedMessage.length < 10) {
    showError("Please provide more details for the customer.");
    return;
  }

  const button =
    document.getElementById("submitQuoteBtn");

  button.disabled = true;
  button.innerText = "Submitting Quote...";

  const workerUserId =
    currentWorkerUser.id;

  const workerDisplayName =
    getWorkerDisplayName(currentWorkerProfile || {}, currentWorkerUser);

  const firstName =
    getWorkerFirstName(currentWorkerProfile || {}, currentWorkerUser);

  const lastInitial =
    getWorkerLastInitial(currentWorkerProfile || {});

  const quotePayload = {
    task_id: selectedTaskId,
    worker_id: workerUserId,
    customer_id: selectedTaskCustomerId,
    quote_amount: Number(amount),
    message: cleanedMessage,
    status: "pending",
    worker_display_name: workerDisplayName,
    worker_first_name: firstName,
    worker_last_initial: lastInitial
  };

  const { error } =
    await supabaseClient
      .from("worker_quotes")
      .insert([quotePayload]);

  if (error) {
    button.disabled = false;
    button.innerText = "Submit Quote";
    showError(error.message);
    return;
  }

  alert("Quote submitted successfully.");

  document.getElementById("quoteAmount").value = "";
  document.getElementById("quoteMessage").value = "";
  document.getElementById("characterCount").innerText = "0 / 500";

  window.location.href = "worker-open-task.html";
}

const quoteMessage =
  document.getElementById("quoteMessage");

const characterCount =
  document.getElementById("characterCount");

quoteMessage.addEventListener("input", () => {
  characterCount.innerText =
    `${quoteMessage.value.length} / 500`;
});

loadTask();
</script>

</body>
</html>
