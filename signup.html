<!DOCTYPE html>
<html>
<head>
  <title>Sign Up - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #f5f5f5;
      padding: 20px;
    }

    .container {
      max-width: 400px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
    }

    button {
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }

    .link {
      text-align: center;
      margin-top: 16px;
    }

    .link a {
      color: green;
      text-decoration: none;
    }

    #status {
      margin-top: 14px;
      text-align: center;
      color: #333;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Create Account</h2>

<input id="firstName" type="text" placeholder="First Name" />
<input id="lastName" type="text" placeholder="Last Name" />
<input id="email" type="email" placeholder="Email" />
<input id="password" type="password" placeholder="Password" />
<input id="streetAddress" type="text" placeholder="Street Address" />
<input id="city" type="text" placeholder="City" />
<input id="state" type="text" placeholder="State" />
<input id="zipcode" type="text" placeholder="Zip code" />
    <input id="phone" type="text" placeholder="Phone Number" /> 
     <input id="phoneCode" type="text" placeholder="Enter verification code" />
    <button type="button" onclick="sendPhoneCode()">Send Code</button>
    <button type="button" onclick="verifyPhoneCode()">Verify Code</button>


    <select id="role">
      <option value="customer">Customer</option>
      <option value="worker">Worker</option>
    </select>

<div style="display:grid; grid-template-columns:24px 1fr; align-items:center; column-gap:8px; margin:12px 0; font-size:14px; text-align:left;">
  <input type="checkbox" id="termsCheck" style="margin:0; width:16px; height:16px;">
  <span style="line-height:1.4;">
    I agree to the <a href="terms.html" target="_blank">Terms</a> and
    <a href="privacy.html" target="_blank">Privacy Policy</a>
  </span>
</div>
    
   <button id="signupBtn">Create Account</button>

    <p id="status"></p>

    <div class="link">
      <a href="index.html">Back to Home</a>
    </div>
  </div>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
  const supabaseClient = window.supabase.createClient(
    "https://dbcthtjmtlumidpbucrc.supabase.co",
    "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
  );

document.getElementById("signupBtn").addEventListener("click", async () => {

const termsCheck = document.getElementById("termsCheck");

if (!termsCheck.checked) {
  document.getElementById("status").innerText = "You must accept the terms.";
  return;
}
  
  const firstName = document.getElementById("firstName").value;
  const lastName = document.getElementById("lastName").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const phone = document.getElementById("phone").value;
  const streetAddress = document.getElementById("streetAddress").value;
  const city = document.getElementById("city").value;
  const state = document.getElementById("state").value;
  const zipcode = document.getElementById("zipcode").value;
const accountType = document.getElementById("role").value;
  
  const status = document.getElementById("status");

  // Step 1: Create auth user
const { data, error } = await supabaseClient.auth.signUp({
  email,
  password
});

  if (error) {
    status.innerText = error.message;
    return;
  }

const user = data.user || data.session?.user;
  
  if (!user) {
    status.innerText = "User not returned";
    return;
  }

  // Step 2: Save profile data
  const { error: profileError } = await supabaseClient.from("profiles").insert([
    {
      id: user.id,
      first_name: firstName,
      last_name: lastName,
      email: email,
      phone: phone,
      street_address: streetAddress,
      city: city,
      state: state,
      zipcode: zipcode,
      account_type: accountType
    }
  ]);

   console.log("PROFILE ERROR:", profileError);

  if (profileError) {
    status.innerText = profileError.message;
    return;
  }

 status.innerText = "Account created successfully";

setTimeout(() => {
  window.location.href = "login.html";
}, 1500);
  
});
  async function sendPhoneCode() {
  const phone = document.getElementById("phone").value;

  const { error } = await supabaseClient.auth.signInWithOtp({
    phone: phone
  });

  if (error) {
    document.getElementById("status").innerText = error.message;
    return;
  }

  document.getElementById("status").innerText = "Code sent.";
}

async function verifyPhoneCode() {
  const phone = document.getElementById("phone").value;
  const code = document.getElementById("phoneCode").value;

  const { error } = await supabaseClient.auth.verifyOtp({
    phone: phone,
    token: code,
    type: "sms"
  });

  if (error) {
    document.getElementById("status").innerText = error.message;
    return;
  }

  document.getElementById("status").innerText = "Phone verified.";
  window.phoneVerified = true;
}
</script>
</body>
</html>
