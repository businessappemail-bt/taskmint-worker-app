<!DOCTYPE html>
<html>
<head>
  <title>Worker Availability - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
    }

    .back {
      color: #0b7a28;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 15px;
    }

    h1 {
      text-align: center;
      color: #0b7a28;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .day-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .day-row:last-child {
      border-bottom: none;
    }

    .time-inputs {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    input,
    select {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 14px;
      border: none;
      border-radius: 12px;
      background: #0b7a28;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .note {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      margin-top: 10px;
    }

    .availability-row {
  padding: 14px 0;
  border-bottom: 1px solid #eee;
}

.availability-row:last-child {
  border-bottom: none;
}

.availability-row label {
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-weight: bold;
  margin-bottom: 10px;
}

.availability-row input[type="checkbox"] {
  width: 18px;
  height: 18px;
  margin: 0;
}

.day-times {
  display: flex;
  gap: 10px;
}

.day-times input {
  flex: 1;
}

    .blocked-list {
  margin-top: 14px;
}

.blocked-date-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #f7f7f7;
  border-radius: 10px;
  padding: 12px;
  margin-top: 10px;
  font-size: 14px;
}

.blocked-date-item button {
  width: auto;
  margin: 0;
  padding: 8px 12px;
  font-size: 13px;
  background: #b00020;
}
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

  <a class="back" href="worker-dashboard.html">
    ← Back
  </a>

  <h1>Set Availability</h1>

 <div class="card">

  <div class="section-title">
    Weekly Availability
  </div>

  <div class="availability-row">
    <label>
      <input type="checkbox" id="mondayAvailable">
      Monday
    </label>

    <div class="day-times">
      <input type="time" id="mondayStart" step="3600">
      <input type="time" id="mondayEnd" step="3600">
    </div>
  </div>

  <div class="availability-row">
    <label>
      <input type="checkbox" id="tuesdayAvailable">
      Tuesday
    </label>

    <div class="day-times">
      <input type="time" id="tuesdayStart" step="3600">
      <input type="time" id="tuesdayEnd" step="3600">
    </div>
  </div>

  <div class="availability-row">
    <label>
      <input type="checkbox" id="wednesdayAvailable">
      Wednesday
    </label>

    <div class="day-times">
      <input type="time" id="wednesdayStart" step="3600">
      <input type="time" id="wednesdayEnd" step="3600">
    </div>
  </div>

  <div class="availability-row">
    <label>
      <input type="checkbox" id="thursdayAvailable">
      Thursday
    </label>

    <div class="day-times">
      <input type="time" id="thursdayStart" step="3600">
      <input type="time" id="thursdayEnd" step="3600">
    </div>
  </div>

  <div class="availability-row">
    <label>
      <input type="checkbox" id="fridayAvailable">
      Friday
    </label>

    <div class="day-times">
      <input type="time" id="fridayStart" step="3600">
      <input type="time" id="fridayEnd" step="3600">
    </div>
  </div>

  <div class="availability-row">
    <label>
      <input type="checkbox" id="saturdayAvailable">
      Saturday
    </label>

    <div class="day-times">
      <input type="time" id="saturdayStart" step="3600">
      <input type="time" id="saturdayEnd" step="3600">
    </div>
  </div>

  <div class="availability-row">
    <label>
      <input type="checkbox" id="sundayAvailable">
      Sunday
    </label>

    <div class="day-times">
      <input type="time" id="sundayStart" step="3600">
      <input type="time" id="sundayEnd" step="3600">
    </div>
  </div>

  <div class="note">
    Set different available times for each day. Customers can request times only inside these windows.
  </div>

</div>

<div class="card">

  <div class="section-title">
    Blocked Dates
  </div>

  <label>From</label>
  <input type="date" id="blockedStartDate">

  <label style="display:block; margin-top:12px;">Through</label>
  <input type="date" id="blockedEndDate">

<button type="button" onclick="addBlockedDateRange()">
  Add Blocked Date Range
</button>

  <div id="blockedDatesList" class="blocked-list">
    No blocked dates added yet.
  </div>

  <div class="note">
    Use this to block multiple days at once for vacations, appointments, or unavailable periods.
  </div>

</div>

</div>

  </div>

  <button type="button" onclick="saveAvailability()">
  Save Availability
</button>

</div>

<script>
let blockedDates = [];

  const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

function addBlockedDateRange() {
  const startInput = document.getElementById("blockedStartDate");
  const endInput = document.getElementById("blockedEndDate");

  const startDate = startInput.value;
  const endDate = endInput.value;

  if (!startDate || !endDate) {
    alert("Choose a start date and through date.");
    return;
  }

  if (endDate < startDate) {
    alert("Through date cannot be before the start date.");
    return;
  }

  const rangeText = startDate + " through " + endDate;

  if (!blockedDates.includes(rangeText)) {
    blockedDates.push(rangeText);
  }

  startInput.value = "";
  endInput.value = "";

  renderBlockedDates();
}

function renderBlockedDates() {
  const container = document.getElementById("blockedDatesList");

  if (blockedDates.length === 0) {
    container.innerHTML = "No blocked dates added yet.";
    return;
  }

  container.innerHTML = "";

  blockedDates.forEach((date, index) => {
    container.innerHTML += `
      <div class="blocked-date-item">
        <span>${date}</span>

        <button
          type="button"
          onclick="removeBlockedDate(${index})">
          Remove
        </button>
      </div>
    `;
  });
}

function removeBlockedDate(index) {
  blockedDates.splice(index, 1);
  renderBlockedDates();
}

 async function saveAvailability() {
  const { data: sessionData } =
  await supabaseClient.auth.getSession();

const workerUser =
  sessionData.session.user;

const availabilityRows = [];

const days = [
  "Monday",
  "Tuesday",
  "Wednesday",
  "Thursday",
  "Friday",
  "Saturday",
  "Sunday"
];

days.forEach((day) => {

  const lower =
    day.toLowerCase();

  const isChecked =
    document.getElementById(
      `${lower}Available`
    ).checked;

  if (isChecked) {

    availabilityRows.push({

      worker_id: workerUser.id,

      day_of_week: day,

      start_time:
        document.getElementById(
          `${lower}Start`
        ).value,

      end_time:
        document.getElementById(
          `${lower}End`
        ).value,

      is_available: true,

      blocked_dates: blockedDates

    });

        if (availabilityRows.length === 0) {
  alert("Select at least one available day.");
  return;
}

    const { error } =
  await supabaseClient
    .from("worker_availability")
    .insert(availabilityRows);

if (error) {
  alert(error.message);
  return;
}

  }

});
alert("Availability saved.");

window.location.href =
  "worker-dashboard.html";
}
</script>
  
</body>
</html>
