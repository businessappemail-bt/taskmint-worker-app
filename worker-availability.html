<!DOCTYPE html>
<html>
<head>
  <title>Worker Availability - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
    }

    .back {
      color: #0b7a28;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 15px;
    }

    h1 {
      text-align: center;
      color: #0b7a28;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 14px;
    }

    .day-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
    }

    .day-row:last-child {
      border-bottom: none;
    }

    .time-inputs {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    input,
    select {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 14px;
      border: none;
      border-radius: 12px;
      background: #0b7a28;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .note {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <a class="back" href="worker-dashboard.html">
    ← Back
  </a>

  <h1>Set Availability</h1>

  <div class="card">

    <div class="section-title">
      Available Days
    </div>

    <div class="day-row">
      <span>Monday</span>
      <input type="checkbox">
    </div>

    <div class="day-row">
      <span>Tuesday</span>
      <input type="checkbox">
    </div>

    <div class="day-row">
      <span>Wednesday</span>
      <input type="checkbox">
    </div>

    <div class="day-row">
      <span>Thursday</span>
      <input type="checkbox">
    </div>

    <div class="day-row">
      <span>Friday</span>
      <input type="checkbox">
    </div>

    <div class="day-row">
      <span>Saturday</span>
      <input type="checkbox">
    </div>

    <div class="day-row">
      <span>Sunday</span>
      <input type="checkbox">
    </div>

  </div>

  <div class="card">

    <div class="section-title">
      Available Hours
    </div>

    <div class="time-inputs">

      <div>
        <label>Start Time</label>
        <input type="time">
      </div>

      <div>
        <label>End Time</label>
        <input type="time">
      </div>

    </div>

    <div class="note">
      Customers will only be able to request times during your available schedule.
    </div>

  </div>

  <div class="card">

    <div class="section-title">
      Blocked Dates
    </div>

    <input type="date">

    <div class="note">
      Use blocked dates for vacations, personal appointments, or unavailable days.
    </div>

  </div>

  <button>
    Save Availability
  </button>

</div>

</body>
</html>
