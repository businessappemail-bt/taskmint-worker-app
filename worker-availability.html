<!DOCTYPE html>
<html>
<head>
  <title>Worker Availability - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 
  <style>
    * {
      box-sizing: border-box;
    }
 
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
      padding-bottom: 90px;
    }
 
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
    }
 
    .back {
      color: #0b7a28;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 15px;
    }
 
    h1 {
      text-align: center;
      color: #0b7a28;
      margin: 0 0 8px;
    }
 
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      line-height: 1.4;
      margin: 0 0 18px;
    }
 
    .card {
      background: white;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
 
    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }
 
    .availability-row {
      padding: 11px 0;
      border-bottom: 1px solid #eee;
    }
 
    .availability-row:last-child {
      border-bottom: none;
    }
 
    .availability-row label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: bold;
      margin-bottom: 8px;
      font-size: 15px;
    }
 
    .availability-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin: 0;
      accent-color: #0b7a28;
    }
 
    .day-times {
      display: flex;
      gap: 8px;
    }
 
    .day-times input {
      flex: 1;
    }
 
    input,
    select {
      width: 100%;
      padding: 11px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 14px;
      box-sizing: border-box;
      background: white;
    }
 
    input:disabled {
      background: #eeeeee;
      color: #999;
    }
 
    input:focus,
    select:focus {
      outline: none;
      border-color: #0b7a28;
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }
 
    button {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border: none;
      border-radius: 12px;
      background: #0b7a28;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
 
    button:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }
 
    .secondary {
      background: white;
      color: #111;
      border: 1px solid #ddd;
    }
 
    .danger {
      background: #b00020;
      color: white;
    }
 
    .quick-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 6px;
    }
 
    .quick-actions button {
      margin-top: 0;
      padding: 11px;
      font-size: 13px;
    }
 
    .note {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      margin-top: 10px;
    }
 
    .blocked-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }
 
    .small-label {
      display: block;
      font-size: 12px;
      font-weight: bold;
      color: #555;
      margin-bottom: 5px;
    }
 
    .blocked-list {
      margin-top: 12px;
    }
 
    .blocked-date-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: #f7f7f7;
      border-radius: 10px;
      padding: 10px;
      margin-top: 8px;
      font-size: 14px;
    }
 
    .blocked-date-item button {
      width: auto;
      margin: 0;
      padding: 8px 10px;
      font-size: 12px;
      border-radius: 8px;
    }
 
    .empty-note {
      background: #f7f7f7;
      border: 1px dashed #ccc;
      border-radius: 10px;
      padding: 12px;
      text-align: center;
      color: #666;
      font-size: 13px;
    }
 
    .save-card {
      position: sticky;
      bottom: 0;
      background: #f4f4f4;
      padding-top: 8px;
    }
 
    #statusMessage {
      min-height: 18px;
      margin-top: 8px;
      text-align: center;
      font-size: 13px;
      font-weight: bold;
    }
  </style>
</head>
 
<body>
 
<div class="container">
 
  <a class="back" href="worker-dashboard.html">&larr; Back</a>
 
  <h1>Set Availability</h1>
  <p class="subtitle">Choose when you normally work and block dates you are unavailable.</p>
 
  <div class="card">
    <div class="section-title">Weekly Availability</div>
 
    <div class="quick-actions">
      <button class="secondary" type="button" onclick="applyWeekdayPreset()">
        Weekdays 9-5
      </button>
 
      <button class="secondary" type="button" onclick="clearAvailability()">
        Clear All
      </button>
    </div>
 
    <div class="availability-row">
      <label>
        Monday
        <input type="checkbox" id="mondayAvailable" onchange="toggleDayInputs('monday')">
      </label>
      <div class="day-times">
        <input type="time" id="mondayStart" step="900" disabled>
        <input type="time" id="mondayEnd" step="900" disabled>
      </div>
    </div>
 
    <div class="availability-row">
      <label>
        Tuesday
        <input type="checkbox" id="tuesdayAvailable" onchange="toggleDayInputs('tuesday')">
      </label>
      <div class="day-times">
        <input type="time" id="tuesdayStart" step="900" disabled>
        <input type="time" id="tuesdayEnd" step="900" disabled>
      </div>
    </div>
 
    <div class="availability-row">
      <label>
        Wednesday
        <input type="checkbox" id="wednesdayAvailable" onchange="toggleDayInputs('wednesday')">
      </label>
      <div class="day-times">
        <input type="time" id="wednesdayStart" step="900" disabled>
        <input type="time" id="wednesdayEnd" step="900" disabled>
      </div>
    </div>
 
    <div class="availability-row">
      <label>
        Thursday
        <input type="checkbox" id="thursdayAvailable" onchange="toggleDayInputs('thursday')">
      </label>
      <div class="day-times">
        <input type="time" id="thursdayStart" step="900" disabled>
        <input type="time" id="thursdayEnd" step="900" disabled>
      </div>
    </div>
 
    <div class="availability-row">
      <label>
        Friday
        <input type="checkbox" id="fridayAvailable" onchange="toggleDayInputs('friday')">
      </label>
      <div class="day-times">
        <input type="time" id="fridayStart" step="900" disabled>
        <input type="time" id="fridayEnd" step="900" disabled>
      </div>
    </div>
 
    <div class="availability-row">
      <label>
        Saturday
        <input type="checkbox" id="saturdayAvailable" onchange="toggleDayInputs('saturday')">
      </label>
      <div class="day-times">
        <input type="time" id="saturdayStart" step="900" disabled>
        <input type="time" id="saturdayEnd" step="900" disabled>
      </div>
    </div>
 
    <div class="availability-row">
      <label>
        Sunday
        <input type="checkbox" id="sundayAvailable" onchange="toggleDayInputs('sunday')">
      </label>
      <div class="day-times">
        <input type="time" id="sundayStart" step="900" disabled>
        <input type="time" id="sundayEnd" step="900" disabled>
      </div>
    </div>
 
    <div class="note">
      Customers can request times only inside the windows you save here.
    </div>
  </div>
 
  <div class="card">
    <div class="section-title">Blocked Dates</div>
 
    <div class="blocked-grid">
      <div>
        <label class="small-label" for="blockedStartDate">From</label>
        <input type="date" id="blockedStartDate">
      </div>
 
      <div>
        <label class="small-label" for="blockedEndDate">Through</label>
        <input type="date" id="blockedEndDate">
      </div>
    </div>
 
    <button type="button" class="secondary" onclick="addBlockedDateRange()">
      Add Blocked Date Range
    </button>
 
    <div id="blockedDatesList" class="blocked-list">
      <div class="empty-note">No blocked dates added yet.</div>
    </div>
 
    <div class="note">
      Use this for vacations, appointments, or days you cannot accept work.
    </div>
  </div>
 
  <div class="save-card">
    <button type="button" id="saveButton" onclick="saveAvailability()">
      Save Availability
    </button>
 
    <div id="statusMessage"></div>
  </div>
 
</div>
 
<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);
 
const days = [
  "Monday",
  "Tuesday",
  "Wednesday",
  "Thursday",
  "Friday",
  "Saturday",
  "Sunday"
];
 
let blockedDates = [];
let currentUser = null;
let currentWorkerId = null;
 
function setStatus(message, color = "#666") {
  const status = document.getElementById("statusMessage");
  status.style.color = color;
  status.innerText = message;
}
 
function toggleDayInputs(day) {
  const checked = document.getElementById(`${day}Available`).checked;
  const startInput = document.getElementById(`${day}Start`);
  const endInput = document.getElementById(`${day}End`);
 
  startInput.disabled = !checked;
  endInput.disabled = !checked;
 
  if (checked && !startInput.value && !endInput.value) {
    startInput.value = "09:00";
    endInput.value = "17:00";
  }
 
  if (!checked) {
    startInput.value = "";
    endInput.value = "";
  }
}
 
function applyWeekdayPreset() {
  days.forEach(day => {
    const lower = day.toLowerCase();
    const isWeekday = !["saturday", "sunday"].includes(lower);
 
    document.getElementById(`${lower}Available`).checked = isWeekday;
    document.getElementById(`${lower}Start`).disabled = !isWeekday;
    document.getElementById(`${lower}End`).disabled = !isWeekday;
    document.getElementById(`${lower}Start`).value = isWeekday ? "09:00" : "";
    document.getElementById(`${lower}End`).value = isWeekday ? "17:00" : "";
  });
}
 
function clearAvailability() {
  days.forEach(day => {
    const lower = day.toLowerCase();
 
    document.getElementById(`${lower}Available`).checked = false;
    document.getElementById(`${lower}Start`).value = "";
    document.getElementById(`${lower}End`).value = "";
    document.getElementById(`${lower}Start`).disabled = true;
    document.getElementById(`${lower}End`).disabled = true;
  });
}
 
function addBlockedDateRange() {
  const startInput = document.getElementById("blockedStartDate");
  const endInput = document.getElementById("blockedEndDate");
 
  const startDate = startInput.value;
  const endDate = endInput.value;
 
  if (!startDate || !endDate) {
    alert("Choose a start date and through date.");
    return;
  }
 
  if (endDate < startDate) {
    alert("Through date cannot be before the start date.");
    return;
  }
 
  const rangeText = `${startDate} through ${endDate}`;
 
  if (!blockedDates.includes(rangeText)) {
    blockedDates.push(rangeText);
  }
 
  startInput.value = "";
  endInput.value = "";
 
  renderBlockedDates();
}
 
function renderBlockedDates() {
  const container = document.getElementById("blockedDatesList");
 
  if (blockedDates.length === 0) {
    container.innerHTML = `<div class="empty-note">No blocked dates added yet.</div>`;
    return;
  }
 
  container.innerHTML = "";
 
  blockedDates.forEach((date, index) => {
    container.innerHTML += `
      <div class="blocked-date-item">
        <span>${date}</span>
        <button type="button" class="danger" onclick="removeBlockedDate(${index})">
          Remove
        </button>
      </div>
    `;
  });
}
 
function removeBlockedDate(index) {
  blockedDates.splice(index, 1);
  renderBlockedDates();
}
 
async function getCurrentWorker() {
  const { data: sessionData, error: sessionError } =
    await supabaseClient.auth.getSession();
 
  if (
    sessionError ||
    !sessionData ||
    !sessionData.session ||
    !sessionData.session.user
  ) {
    window.location.href = "worker-login.html";
    return false;
  }
 
  currentUser = sessionData.session.user;
 
 const { data: workerProfile, error: profileError } =
  await supabaseClient
    .from("worker_profiles")
    .select("id")
    .eq("email", currentUser.email)
    .maybeSingle();
 
  if (profileError) {
    alert("Error finding worker profile: " + profileError.message);
    return false;
  }
 
  if (!workerProfile || !workerProfile.id) {
    alert("Worker profile not found in worker_profiles.");
    return false;
  }
 
  currentWorkerId = workerProfile.id;
  return true;
}
 
async function loadAvailability() {
  const found = await getCurrentWorker();
 
  if (!found) {
    return;
  }
 
  setStatus("Loading availability...", "#666");
 
  const { data, error } = await supabaseClient
    .from("worker_availability")
    .select("day_of_week, start_time, end_time, is_available, blocked_dates")
    .eq("worker_id", currentWorkerId);
 
  if (error) {
    setStatus("Error loading availability: " + error.message, "#b00020");
    return;
  }
 
  clearAvailability();
  blockedDates = [];
 
  if (data && data.length > 0) {
    data.forEach(row => {
      const lower = String(row.day_of_week || "").toLowerCase();
 
      if (row.is_available && days.map(day => day.toLowerCase()).includes(lower)) {
        document.getElementById(`${lower}Available`).checked = true;
        document.getElementById(`${lower}Start`).disabled = false;
        document.getElementById(`${lower}End`).disabled = false;
        document.getElementById(`${lower}Start`).value = row.start_time || "";
        document.getElementById(`${lower}End`).value = row.end_time || "";
      }
 
      if (Array.isArray(row.blocked_dates)) {
        row.blocked_dates.forEach(date => {
          if (!blockedDates.includes(date)) {
            blockedDates.push(date);
          }
        });
      }
    });
  }
 
  renderBlockedDates();
  setStatus("", "#666");
}
 
function buildAvailabilityRows() {
  const availabilityRows = [];
 
  days.forEach(day => {
    const lower = day.toLowerCase();
    const isChecked = document.getElementById(`${lower}Available`).checked;
 
    if (!isChecked) {
      return;
    }
 
    const startTime = document.getElementById(`${lower}Start`).value;
    const endTime = document.getElementById(`${lower}End`).value;
 
    if (!startTime || !endTime) {
      throw new Error(`Choose both start and end time for ${day}.`);
    }
 
    if (endTime <= startTime) {
      throw new Error(`${day} end time must be after start time.`);
    }
 
    availabilityRows.push({
      worker_id: currentWorkerId,
      day_of_week: day,
      start_time: startTime,
      end_time: endTime,
      is_available: true,
      blocked_dates: blockedDates
    });
  });
 
  return availabilityRows;
}
 
async function saveAvailability() {
  const saveButton = document.getElementById("saveButton");
  const originalButtonText = saveButton.innerText;

  saveButton.innerText = "Saving...";
  saveButton.disabled = true;
  setStatus("Saving availability...", "#666");

  try {
    if (!currentWorkerId) {
      const found = await getCurrentWorker();

      if (!found) {
        setStatus("Worker profile not found.", "#b00020");
        return;
      }
    }

    let availabilityRows = [];

    try {
      availabilityRows = buildAvailabilityRows();
    } catch (error) {
      alert(error.message);
      setStatus("Fix the schedule issue.", "#b00020");
      return;
    }

    if (availabilityRows.length === 0) {
      alert("Select at least one available day.");
      setStatus("Select at least one available day.", "#b00020");
      return;
    }

    const { error: deleteError } = await supabaseClient
      .from("worker_availability")
      .delete()
      .eq("worker_id", currentWorkerId);

    if (deleteError) {
      setStatus("Error clearing old availability: " + deleteError.message, "#b00020");
      return;
    }

    const { error: insertError } = await supabaseClient
      .from("worker_availability")
      .insert(availabilityRows);

    if (insertError) {
      setStatus("Error saving availability: " + insertError.message, "#b00020");
      return;
    }

    setStatus("Availability saved.", "#0b7a28");
    await loadAvailability();

  } catch (error) {
    setStatus(
      error.message || "Something went wrong while saving availability.",
      "#b00020"
    );
  } finally {
    saveButton.innerText = originalButtonText;
    saveButton.disabled = false;
  }
}
 
loadAvailability();
</script>
 
</body>
</html>
