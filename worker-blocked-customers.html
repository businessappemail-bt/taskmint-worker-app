<!DOCTYPE html>
<html>
<head>
  <title>Blocked Customers - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f2f7f4;
      --surface2: #e6f4eb;
      --border: #e2ebe5;
      --accent: #0b7a28;
      --text: #111111;
      --muted: #6b7870;
      --danger: #b00020;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 470px;
      padding: 20px 16px 30px;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 40;
      width: 100%;
      max-width: 470px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      margin: -20px -16px 20px;
    }

    .back {
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
      display: inline-block;
      font-size: 14px;
    }

    .hero {
      background: var(--accent);
      color: white;
      border-radius: 22px;
      padding: 24px 20px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(11,122,40,0.22);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: riseIn 0.35s 0.05s forwards;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 155px;
      height: 155px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      top: -65px;
      right: -55px;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      bottom: -45px;
      left: -35px;
    }

    .hero h1 {
      margin: 0 0 7px;
      font-size: 29px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 2;
    }

    .hero p {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
      position: relative;
      z-index: 2;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      opacity: 0;
      animation: riseIn 0.35s 0.12s forwards;
    }

    .info-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      opacity: 0;
      animation: riseIn 0.35s 0.1s forwards;
    }

    .customer-row {
      display: flex;
      gap: 12px;
      align-items: center;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }

    .customer-pic {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      object-fit: cover;
      background: var(--surface2);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .customer-name {
      font-weight: 800;
      font-size: 16px;
      line-height: 1.2;
    }

    .small-text {
      color: var(--muted);
      font-size: 12.5px;
      margin-top: 5px;
      line-height: 1.45;
      font-weight: 600;
    }

    button {
      width: 100%;
      padding: 13px;
      margin-top: 12px;
      border: none;
      border-radius: 13px;
      background: var(--accent);
      color: white;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(11,122,40,0.10);
    }

    .danger {
      background: var(--danger);
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 24px 18px;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 600;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 360px) {
      .hero h1 {
        font-size: 25px;
      }

      .customer-row {
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <a class="back" href="worker-settings.html">← Back to Settings</a>
  </div>

  <div class="hero">
    <h1>Blocked Customers</h1>
    <p>Manage customers you blocked from contacting you for future jobs.</p>
  </div>

  <div class="info-card">
    <div class="small-text">
      Customers listed here cannot contact you for future jobs unless you remove them from your blocked list.
    </div>
  </div>

  <div id="blockedCustomersList">
    <div class="card empty">Loading blocked customers...</div>
  </div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

let currentUser = null;
let currentWorkerIds = [];

function getHiddenWorkerConversationIds() {
  try {
    return JSON.parse(localStorage.getItem("taskmintWorkerHiddenConversations") || "[]");
  } catch (error) {
    return [];
  }
}

async function migrateLocalHiddenBlocksToBlockedUsers() {
  const hiddenConversationIds =
    getHiddenWorkerConversationIds();

  if (!hiddenConversationIds || hiddenConversationIds.length === 0) {
    return;
  }

  for (const conversationId of hiddenConversationIds) {
    const { data: conversation } =
      await supabaseClient
        .from("task_conversations")
        .select("id, worker_id, customer_id")
        .eq("id", conversationId)
        .maybeSingle();

    if (!conversation || !conversation.worker_id || !conversation.customer_id) {
      continue;
    }

    const workerId =
      conversation.worker_id;

    const customerId =
      conversation.customer_id;

    const { data: existingBlock } =
      await supabaseClient
        .from("blocked_users")
        .select("id")
        .eq("worker_id", workerId)
        .eq("customer_id", customerId)
        .maybeSingle();

    if (!existingBlock) {
      await supabaseClient
        .from("blocked_users")
        .insert([
          {
            worker_id: workerId,
            customer_id: customerId
          }
        ]);
    }
  }

  localStorage.removeItem("taskmintWorkerHiddenConversations");
}


function escapeHTML(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function loadBlockedCustomers() {
  const list = document.getElementById("blockedCustomersList");

  const { data: userData } = await supabaseClient.auth.getUser();

  if (!userData || !userData.user) {
    window.location.href = "worker-login.html";
    return;
  }

  currentUser = userData.user;

  currentWorkerIds = [currentUser.id];

  const { data: workerProfile } = await supabaseClient
    .from("worker_profiles")
    .select("id")
    .eq("email", currentUser.email)
    .maybeSingle();

  if (workerProfile && workerProfile.id) {
    currentWorkerIds.push(workerProfile.id);
  }

  currentWorkerIds = [...new Set(currentWorkerIds.filter(Boolean).map(String))];

  await migrateLocalHiddenBlocksToBlockedUsers();

  const { data: blocks, error } = await supabaseClient
    .from("blocked_users")
    .select("*")
    .in("worker_id", currentWorkerIds)
    .order("created_at", { ascending:false });

  if (error) {
    list.innerHTML = `<div class="card empty">Error loading blocked customers.</div>`;
    return;
  }

  if (!blocks || blocks.length === 0) {
    list.innerHTML = `<div class="card empty">No blocked customers.</div>`;
    return;
  }

  list.innerHTML = "";

  for (const block of blocks) {
    const customer = await getCustomer(block.customer_id);
    const name = formatCustomerName(customer);
    const photo = customer?.profile_photo_url || "Taskmintlogo.png";

    list.innerHTML += `
      <div class="card">
        <div class="customer-row">
          <img class="customer-pic" src="${escapeHTML(photo)}">
          <div>
            <div class="customer-name">${escapeHTML(name)}</div>
            <div class="small-text">
  This customer cannot contact you for future jobs.
</div>
          </div>
        </div>

        <button class="danger" onclick="removeBlockedCustomer('${escapeHTML(block.id)}')">
          Remove from Blocked List
        </button>
      </div>
    `;
  }
}

async function getCustomer(customerId) {
  if (!customerId) return null;

  const { data } = await supabaseClient
    .from("profiles")
    .select("first_name, last_name, full_name, profile_photo_url")
    .eq("id", customerId)
    .maybeSingle();

  return data;
}

function formatCustomerName(customer) {
  if (!customer) return "Customer";

  if (customer.first_name && customer.last_name) {
    return `${customer.first_name} ${customer.last_name.charAt(0)}.`;
  }

  if (customer.full_name) {
    const parts = customer.full_name.trim().split(" ");
    return `${parts[0] || "Customer"} ${parts[1] ? parts[1].charAt(0) + "." : ""}`;
  }

  return "Customer";
}

function formatDate(dateValue) {
  if (!dateValue) return "Unknown date";
  return new Date(dateValue).toLocaleDateString();
}

async function removeBlockedCustomer(blockId) {
  const confirmRemove = confirm("Remove this customer from your blocked list?");

  if (!confirmRemove) return;

  let query = supabaseClient
    .from("blocked_users")
    .delete()
    .eq("id", blockId);

  if (currentWorkerIds.length > 0) {
    query = query.in("worker_id", currentWorkerIds);
  }

  const { error } = await query;

  if (error) {
    alert("Unable to remove blocked customer.");
    return;
  }

  loadBlockedCustomers();
}

loadBlockedCustomers();
</script>

</body>
</html>
