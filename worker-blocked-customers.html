<!DOCTYPE html>
<html>
<head>
  <title>Blocked Customers - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { margin:0; font-family:Arial, sans-serif; background:#f5f5f5; color:#111; }
    .container { max-width:420px; margin:0 auto; padding:20px; }
    .back { color:#0b7a28; font-weight:bold; text-decoration:none; display:inline-block; margin-bottom:18px; }
    h1 { text-align:center; color:#0b7a28; margin-bottom:18px; }
    .card { background:white; border-radius:14px; padding:18px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.08); }
    .customer-row { display:flex; gap:12px; align-items:center; }
    .customer-pic { width:52px; height:52px; border-radius:50%; object-fit:cover; background:#ddd; }
    .customer-name { font-weight:bold; font-size:16px; }
    .small-text { color:#666; font-size:13px; margin-top:4px; line-height:1.4; }
    button { width:100%; padding:13px; margin-top:12px; border:none; border-radius:10px; background:#0b7a28; color:white; font-size:15px; font-weight:bold; cursor:pointer; }
    .danger { background:#b00020; }
    .empty { text-align:center; color:#666; padding:22px; }
  </style>
</head>

<body>

<div class="container">

  <a class="back" href="worker-settings.html">← Back to Settings</a>

  <h1>Blocked Customers</h1>

  <div class="card">
    <div class="small-text">
      Customers listed here cannot contact you for future jobs unless you remove them from your blocked list.
    </div>
  </div>

  <div id="blockedCustomersList">
    <div class="card empty">Loading blocked customers...</div>
  </div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

let currentUser = null;
let currentWorkerIds = [];

function escapeHTML(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function loadBlockedCustomers() {
  const list = document.getElementById("blockedCustomersList");

  const { data: userData } = await supabaseClient.auth.getUser();

  if (!userData || !userData.user) {
    window.location.href = "worker-login.html";
    return;
  }

  currentUser = userData.user;

  currentWorkerIds = [currentUser.id];

  const { data: workerProfile } = await supabaseClient
    .from("worker_profiles")
    .select("id")
    .eq("email", currentUser.email)
    .maybeSingle();

  if (workerProfile && workerProfile.id) {
    currentWorkerIds.push(workerProfile.id);
  }

  currentWorkerIds = [...new Set(currentWorkerIds.filter(Boolean).map(String))];

  let blocks = [];
  let error = null;

  const result1 = await supabaseClient
    .from("blocked_customers")
    .select("*")
    .in("worker_id", currentWorkerIds)
    .order("created_at", { ascending:false });

  if (!result1.error && result1.data) {
    blocks = result1.data;
  }

  if (blocks.length === 0) {
    const result2 = await supabaseClient
      .from("blocked_customers")
      .select("*")
      .in("blocked_by_worker_id", currentWorkerIds)
      .order("created_at", { ascending:false });

    if (!result2.error && result2.data) {
      blocks = result2.data;
    }
  }

  error = result1.error;

  if (error) {
    list.innerHTML = `<div class="card empty">Error loading blocked customers.</div>`;
    return;
  }

  if (!blocks || blocks.length === 0) {
    list.innerHTML = `<div class="card empty">No blocked customers.</div>`;
    return;
  }

  list.innerHTML = "";

  for (const block of blocks) {
    const customer = await getCustomer(block.customer_id);
    const name = formatCustomerName(customer);
    const photo = customer?.profile_photo_url || "Taskmintlogo.png";

    list.innerHTML += `
      <div class="card">
        <div class="customer-row">
          <img class="customer-pic" src="${escapeHTML(photo)}">
          <div>
            <div class="customer-name">${escapeHTML(name)}</div>
            <div class="small-text">
  This customer cannot contact you for future jobs.
</div>
          </div>
        </div>

        <button class="danger" onclick="removeBlockedCustomer('${escapeHTML(block.id)}')">
          Remove from Blocked List
        </button>
      </div>
    `;
  }
}

async function getCustomer(customerId) {
  if (!customerId) return null;

  const { data } = await supabaseClient
    .from("profiles")
    .select("first_name, last_name, full_name, profile_photo_url")
    .eq("id", customerId)
    .maybeSingle();

  return data;
}

function formatCustomerName(customer) {
  if (!customer) return "Customer";

  if (customer.first_name && customer.last_name) {
    return `${customer.first_name} ${customer.last_name.charAt(0)}.`;
  }

  if (customer.full_name) {
    const parts = customer.full_name.trim().split(" ");
    return `${parts[0] || "Customer"} ${parts[1] ? parts[1].charAt(0) + "." : ""}`;
  }

  return "Customer";
}

function formatDate(dateValue) {
  if (!dateValue) return "Unknown date";
  return new Date(dateValue).toLocaleDateString();
}

async function removeBlockedCustomer(blockId) {
  const confirmRemove = confirm("Remove this customer from your blocked list?");

  if (!confirmRemove) return;

  let query = supabaseClient
    .from("blocked_customers")
    .delete()
    .eq("id", blockId);

  if (currentWorkerIds.length > 0) {
    query = query.in("worker_id", currentWorkerIds);
  }

  const { error } = await query;

  if (error) {
    alert("Unable to remove blocked customer.");
    return;
  }

  loadBlockedCustomers();
}

loadBlockedCustomers();
</script>

</body>
</html>
