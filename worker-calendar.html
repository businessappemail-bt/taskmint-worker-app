    <!DOCTYPE html>
<html>
<head>
  <title>Worker Calendar - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(25,182,76,0.16), transparent 32%),
        linear-gradient(180deg, #eef8f1 0%, #f5f5f5 100%);
      color: #111;
      padding-bottom: 90px;
    }

    .container {
      max-width: 430px;
      margin: 0 auto;
      padding: 18px;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .back, .refresh {
      color: #0b7a28;
      font-weight: 900;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
    }

    .hero {
      background: linear-gradient(135deg, #0b7a28, #19b64c);
      color: white;
      border-radius: 28px;
      padding: 22px;
      margin-bottom: 16px;
      box-shadow: 0 14px 30px rgba(11,122,40,0.22);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.1;
    }

    .hero p {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      opacity: 0.96;
    }

    .summary-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .summary-box, .calendar-card, .jobs-card, .job-card, .empty {
      background: white;
      border: 1px solid #edf1ee;
      border-radius: 22px;
      padding: 14px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 14px;
    }

    .summary-label {
      color: #0b7a28;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 5px;
    }

    .summary-value {
      font-size: 18px;
      font-weight: 900;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .month-title {
      font-size: 18px;
      font-weight: 900;
    }

    .month-btn {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 12px;
      background: #e7f7ec;
      color: #0b7a28;
      font-size: 20px;
      font-weight: 900;
      cursor: pointer;
    }

    .weekday-row, .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .weekday {
      text-align: center;
      font-size: 11px;
      color: #666;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .day {
      min-height: 46px;
      border-radius: 14px;
      border: 1px solid #edf1ee;
      background: #f7faf8;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      padding: 7px 5px;
      position: relative;
      text-align: left;
    }

    .day.blank {
      background: transparent;
      border: none;
      cursor: default;
    }

    .day.today {
      border-color: #0b7a28;
      box-shadow: 0 0 0 2px rgba(11,122,40,0.10);
    }

    .day.selected {
      background: #0b7a28;
      color: white;
    }

    .day.booked {
      background: #e7f7ec;
      border-color: #bde8ca;
    }

    .job-dot {
      position: absolute;
      right: 7px;
      bottom: 7px;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #19b64c;
    }

    .day.selected .job-dot {
      background: white;
    }

    .jobs-title {
      font-size: 17px;
      font-weight: 900;
      margin-bottom: 10px;
    }

    .job-card {
      border-radius: 18px;
      padding: 13px;
      margin-bottom: 10px;
      box-shadow: none;
      background: #f7faf8;
    }

    .job-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .job-title {
      font-size: 15px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .job-meta {
      color: #666;
      font-size: 12px;
      line-height: 1.35;
    }

    .pill {
      border-radius: 999px;
      padding: 6px 9px;
      background: #e7f7ec;
      color: #0b7a28;
      font-size: 10px;
      font-weight: 900;
      text-transform: capitalize;
      white-space: nowrap;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .info-box {
      background: white;
      border: 1px solid #e3eee6;
      border-radius: 14px;
      padding: 9px;
      min-height: 58px;
    }

    .info-label {
      color: #0b7a28;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .info-value {
      font-size: 12px;
      font-weight: 800;
      line-height: 1.35;
    }

    .empty {
      text-align: center;
      color: #666;
      line-height: 1.5;
    }

    button.open-job {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 13px;
      background: #0b7a28;
      color: white;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <a class="back" href="worker-dashboard.html">← Back</a>
    <div class="refresh" onclick="loadCalendarJobs()">Refresh</div>
  </div>

  <div class="hero">
    <h1>Calendar</h1>
    <p>View accepted jobs, in-progress jobs, and tasks waiting for customer confirmation by month.</p>
  </div>

  <div class="summary-row">
    <div class="summary-box">
      <div class="summary-label">This Month</div>
      <div class="summary-value" id="monthCount">0</div>
    </div>

    <div class="summary-box">
      <div class="summary-label">Today</div>
      <div class="summary-value" id="todayCount">0</div>
    </div>

    <div class="summary-box">
      <div class="summary-label">Active</div>
      <div class="summary-value" id="activeCount">0</div>
    </div>
  </div>

  <div class="calendar-card">
    <div class="calendar-header">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-title" id="monthTitle">Month</div>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>

    <div class="weekday-row">
      <div class="weekday">Sun</div>
      <div class="weekday">Mon</div>
      <div class="weekday">Tue</div>
      <div class="weekday">Wed</div>
      <div class="weekday">Thu</div>
      <div class="weekday">Fri</div>
      <div class="weekday">Sat</div>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>
  </div>

  <div class="jobs-card">
    <div class="jobs-title" id="selectedDateTitle">Jobs</div>
    <div id="selectedJobsList">
      <div class="empty">Loading calendar...</div>
    </div>
  </div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

let currentUser = null;
let currentWorkerIds = [];
let loadedJobs = [];
let visibleMonth = new Date();
let selectedDate = new Date();

function cleanText(value, fallback = "Not specified") {
  if (value === null || value === undefined) return fallback;
  const text = String(value).trim();
  return text === "" ? fallback : text;
}

function escapeHTML(value) {
  return cleanText(value, "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function getFirstAvailable(record, keys, fallback = "") {
  if (!record) return fallback;

  for (const key of keys) {
    if (
      record[key] !== null &&
      record[key] !== undefined &&
      String(record[key]).trim() !== ""
    ) {
      return record[key];
    }
  }

  return fallback;
}

function normalizeStatus(value) {
  return cleanText(value, "accepted").toLowerCase().replaceAll(" ", "_");
}

function getTaskDate(task) {
  return getFirstAvailable(task, [
    "task_date",
    "scheduled_for",
    "scheduled_date",
    "date_needed",
    "needed_by",
    "scheduled_start",
    "due_date"
  ], "");
}

function getDateObject(value) {
  if (!value) return null;

  const rawValue =
    String(value).trim();

  const dateOnlyMatch =
    rawValue.match(/^\d{4}-\d{2}-\d{2}/);

  if (dateOnlyMatch) {
    const parts =
      dateOnlyMatch[0].split("-");

    return new Date(
      Number(parts[0]),
      Number(parts[1]) - 1,
      Number(parts[2])
    );
  }

  const date = new Date(rawValue);
  if (Number.isNaN(date.getTime())) return null;
  return date;
}

function formatDate(value) {
  const date = getDateObject(value);
  if (!date) return "Not scheduled";

  return date.toLocaleDateString([], {
    year: "numeric",
    month: "short",
    day: "numeric"
  });
}

function getTaskTime(task) {
  const timeValue =
    task.scheduled_start ||
    task.scheduled_for ||
    task.scheduled_date ||
    task.task_time ||
    task.time_needed ||
    task.task_date ||
    task.date_needed ||
    "";

  const date =
    getDateObject(timeValue);

  if (!date) {
    return "Time not listed";
  }

  const hasTime =
    date.getHours() !== 0 ||
    date.getMinutes() !== 0;

  if (!hasTime) {
    return "Time not listed";
  }

  return date.toLocaleTimeString([], {
    hour: "numeric",
    minute: "2-digit"
  });
}


function toDateKey(value) {
  const date = value instanceof Date ? value : getDateObject(value);
  if (!date) return "";

  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");

  return `${year}-${month}-${day}`;
}

function selectedDateKey() {
  return toDateKey(selectedDate);
}

function getTaskTitle(task) {
  return getFirstAvailable(task, [
    "title",
    "task_title",
    "job_title",
    "category",
    "service_type"
  ], "Untitled Job");
}

function getTaskCategory(task) {
  return getFirstAvailable(task, [
    "category",
    "task_category",
    "service_type"
  ], "Not listed");
}

function getCityState(task) {
  const city = getFirstAvailable(task, ["city", "task_city", "service_city"], "");
  const state = getFirstAvailable(task, ["state", "task_state", "service_state"], "");
  return [city, state].filter(Boolean).join(", ") || "Location not listed";
}

function getQuoteAmount(quote) {
  return Number(quote?.quote_amount || quote?.amount || quote?.price || 0);
}

function formatMoney(value) {
  const numberValue = Number(value || 0);
  if (Number.isNaN(numberValue)) return "$0.00";
  return "$" + numberValue.toFixed(2);
}

function isSameDay(dateOne, dateTwo) {
  return (
    dateOne.getFullYear() === dateTwo.getFullYear() &&
    dateOne.getMonth() === dateTwo.getMonth() &&
    dateOne.getDate() === dateTwo.getDate()
  );
}

async function loadCurrentWorker() {
  const { data, error } = await supabaseClient.auth.getUser();

  if (error || !data || !data.user) {
    document.getElementById("selectedJobsList").innerHTML = `
      <div class="empty">
        No active worker session found. Please log in again.
      </div>
    `;
    return false;
  }

  currentUser = data.user;

  const ids = [currentUser.id];

  const { data: profile } =
    await supabaseClient
      .from("profiles")
      .select("id, email")
      .eq("email", currentUser.email)
      .maybeSingle();

  if (profile && profile.id) ids.push(profile.id);

  const { data: workerRecord } =
    await supabaseClient
      .from("worker_profiles")
      .select("id, email")
      .eq("email", currentUser.email)
      .maybeSingle();

  if (workerRecord && workerRecord.id) ids.push(workerRecord.id);

  currentWorkerIds = [...new Set(ids.filter(Boolean).map(String))];

  return true;
}

async function fetchAcceptedQuotes() {
  const { data, error } =
    await supabaseClient
      .from("worker_quotes")
      .select("*")
      .in("worker_id", currentWorkerIds)
      .in("status", ["accepted", "in_progress", "worker_completed", "completed", "paid"])
      .order("created_at", { ascending: false });

  if (error) throw error;

  return data || [];
}

async function fetchScheduledTasks() {
  const { data, error } =
    await supabaseClient
      .from("tasks")
      .select("*")
      .or(
        `worker_id.in.(${currentWorkerIds.join(",")}),accepted_worker_id.in.(${currentWorkerIds.join(",")}),assigned_worker_id.in.(${currentWorkerIds.join(",")})`
      )
      .in("status", [
        "accepted",
        "scheduled",
        "in_progress",
        "worker_completed",
        "completed",
        "paid"
      ])
      .order("created_at", { ascending: false });

  if (error) throw error;

  return data || [];
}

async function fetchTasksForQuotes(quotes) {
  const taskIds = [...new Set(quotes.map(quote => quote.task_id).filter(Boolean))];

  if (taskIds.length === 0) return {};

  const { data, error } =
    await supabaseClient
      .from("tasks")
      .select("*")
      .in("id", taskIds);

  if (error) throw error;

  const taskMap = {};

  (data || []).forEach(task => {
    taskMap[task.id] = task;
  });

  return taskMap;
}

async function loadCalendarJobs() {
  document.getElementById("selectedJobsList").innerHTML =
    `<div class="empty">Loading calendar...</div>`;

  const workerLoaded = await loadCurrentWorker();

  if (!workerLoaded) return;

  try {
    const quotes = await fetchAcceptedQuotes();
    const taskMap = await fetchTasksForQuotes(quotes);
    const scheduledTasks = await fetchScheduledTasks();

    const quoteJobs =
      quotes
        .map(quote => {
          const task = taskMap[quote.task_id];

          if (!task) return null;

          return { quote, task };
        })
        .filter(Boolean);

    const quoteTaskIds =
      new Set(
        quoteJobs
          .map(job => String(job.task.id))
          .filter(Boolean)
      );

    const taskJobs =
      scheduledTasks
        .filter(task => !quoteTaskIds.has(String(task.id)))
        .map(task => {
          return {
            quote: {
              status: task.status || "scheduled",
              quote_amount:
                task.paid_amount ||
                task.amount_paid ||
                task.task_amount ||
                task.worker_payout_amount ||
                0
            },
            task
          };
        });

    loadedJobs =
      [...quoteJobs, ...taskJobs];

    renderCalendar();
    renderSelectedJobs();
    updateSummary();

  } catch (error) {
    document.getElementById("selectedJobsList").innerHTML = `
      <div class="empty">
        ${escapeHTML(error.message || "Unable to load calendar.")}
      </div>
    `;
  }
}

function changeMonth(direction) {
  visibleMonth =
    new Date(
      visibleMonth.getFullYear(),
      visibleMonth.getMonth() + direction,
      1
    );

  selectedDate =
    new Date(
      visibleMonth.getFullYear(),
      visibleMonth.getMonth(),
      1
    );

  renderCalendar();
  renderSelectedJobs();
  updateSummary();
}

function renderCalendar() {
  const grid = document.getElementById("calendarGrid");
  const title = document.getElementById("monthTitle");

  const year = visibleMonth.getFullYear();
  const month = visibleMonth.getMonth();

  title.innerText =
    visibleMonth.toLocaleDateString([], {
      month: "long",
      year: "numeric"
    });

  grid.innerHTML = "";

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    const blank = document.createElement("div");
    blank.className = "day blank";
    grid.appendChild(blank);
  }

  const today = new Date();

  for (let day = 1; day <= daysInMonth; day++) {
    const date = new Date(year, month, day);
    const key = toDateKey(date);

    const hasJob =
      loadedJobs.some(job => toDateKey(getTaskDate(job.task)) === key);

    const div = document.createElement("div");

    div.className =
      [
        "day",
        hasJob ? "booked" : "",
        isSameDay(date, today) ? "today" : "",
        isSameDay(date, selectedDate) ? "selected" : ""
      ]
        .filter(Boolean)
        .join(" ");

    div.innerHTML = `
      ${day}
      ${hasJob ? `<span class="job-dot"></span>` : ""}
    `;

    div.onclick = () => {
      selectedDate = date;
      renderCalendar();
      renderSelectedJobs();
    };

    grid.appendChild(div);
  }
}

function renderSelectedJobs() {
  const list = document.getElementById("selectedJobsList");
  const title = document.getElementById("selectedDateTitle");
  const key = selectedDateKey();

  title.innerText =
    selectedDate.toLocaleDateString([], {
      weekday: "long",
      month: "short",
      day: "numeric",
      year: "numeric"
    });

  const jobs =
    loadedJobs.filter(job => toDateKey(getTaskDate(job.task)) === key);

  if (jobs.length === 0) {
    list.innerHTML = `
      <div class="empty">
        No jobs scheduled for this date.
      </div>
    `;
    return;
  }

  list.innerHTML = "";

  jobs.forEach(job => {
    const task = job.task;
    const quote = job.quote;
    const status = normalizeStatus(quote.status);

    const card = document.createElement("div");
    card.className = "job-card";

    card.innerHTML = `
      <div class="job-top">
        <div>
          <div class="job-title">
            ${escapeHTML(getTaskTitle(task))}
          </div>

          <div class="job-meta">
            ${escapeHTML(getTaskCategory(task))} • ${escapeHTML(getCityState(task))}
          </div>
        </div>

        <div class="pill">
          ${escapeHTML(status.replaceAll("_", " "))}
        </div>
      </div>

      <div class="info-grid">
        <div class="info-box">
          <div class="info-label">Date</div>
          <div class="info-value">${escapeHTML(formatDate(getTaskDate(task)))}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Time</div>
          <div class="info-value">${escapeHTML(getTaskTime(task))}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Quote</div>
          <div class="info-value">${escapeHTML(formatMoney(getQuoteAmount(quote)))}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Task Status</div>
          <div class="info-value">${escapeHTML(task.status || "accepted")}</div>
        </div>

        <div class="info-box">
          <div class="info-label">Payment</div>
          <div class="info-value">${escapeHTML(task.payment_status || "Not listed")}</div>
        </div>
      </div>

      <button class="open-job" onclick="openMyJobs()">
        Open My Jobs
      </button>
    `;

    list.appendChild(card);
  });
}

function updateSummary() {
  const month = visibleMonth.getMonth();
  const year = visibleMonth.getFullYear();

  const monthJobs =
    loadedJobs.filter(job => {
      const date = getDateObject(getTaskDate(job.task));

      return (
        date &&
        date.getMonth() === month &&
        date.getFullYear() === year
      );
    });

  const today = new Date();

  const todayJobs =
    loadedJobs.filter(job => {
      const date = getDateObject(getTaskDate(job.task));
      return date && isSameDay(date, today);
    });

  const activeJobs =
    loadedJobs.filter(job => {
      const quoteStatus =
        normalizeStatus(job.quote.status);

      const taskStatus =
        normalizeStatus(job.task.status);

      return (
        job.task.customer_completed !== true &&
        !["completed", "paid"].includes(taskStatus) &&
        !["completed", "paid"].includes(quoteStatus)
      );
    });

  document.getElementById("monthCount").innerText = String(monthJobs.length);
  document.getElementById("todayCount").innerText = String(todayJobs.length);
  document.getElementById("activeCount").innerText = String(activeJobs.length);
}

function openMyJobs() {
  window.location.href = "my-jobs.html";
}

loadCalendarJobs();
</script>

</body>
</html>
