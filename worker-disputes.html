<!DOCTYPE html>
<html>
<head>
  <title>Worker Dispute Center - TaskMint</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f2f7f4;
      --surface2: #e6f4eb;
      --border: #e2ebe5;
      --accent: #0b7a28;
      --text: #111111;
      --muted: #6b7870;
      --danger: #b00020;
      --warning-bg: #fffbeb;
      --warning-border: #f0c040;
      --warning-text: #7a4f00;
      --blue-bg: #eef5ff;
      --blue-text: #0b4d91;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 470px;
      padding: 20px 16px 30px;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 40;
      width: 100%;
      max-width: 470px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 20px;
      margin: -20px -16px 16px;
    }

    .back {
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
      display: inline-block;
      font-size: 14px;
    }

    .hero {
      background: var(--accent);
      color: white;
      border-radius: 22px;
      padding: 24px 20px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(11,122,40,0.22);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: riseIn 0.35s 0.05s forwards;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 155px;
      height: 155px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      top: -65px;
      right: -55px;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      bottom: -45px;
      left: -35px;
    }

    h1 {
      margin: 0 0 7px;
      font-size: 29px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 2;
    }

    .hero p {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
      position: relative;
      z-index: 2;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      opacity: 0;
      animation: riseIn 0.35s 0.12s forwards;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 12px;
      letter-spacing: -0.1px;
    }

    label {
      display: block;
      margin-top: 13px;
      margin-bottom: 7px;
      font-weight: 800;
      font-size: 11px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }

    select,
    textarea,
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 13px;
      border-radius: 13px;
      border: 1px solid var(--border);
      font-size: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none;
      background: white;
      color: var(--text);
    }

    select:focus,
    textarea:focus,
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }

    textarea {
      min-height: 118px;
      resize: vertical;
      line-height: 1.45;
    }

    input[type="file"] {
      background: white;
      font-size: 12.5px;
      color: var(--muted);
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 13px;
      background: var(--accent);
      color: white;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 14px;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(11,122,40,0.10);
    }

    button.secondary {
      background: white;
      color: var(--accent);
      border: 1px solid var(--border);
    }

    .note {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 8px;
      background: white;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 11px;
    }

    .status-message {
      text-align: center;
      font-weight: 800;
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.4;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 20px 14px;
      font-size: 13px;
      line-height: 1.45;
      background: white;
      border: 1px dashed #bfd1c6;
      border-radius: 16px;
    }

    .dispute-card {
      background: white;
      border-left: 4px solid var(--accent);
    }

    .dispute-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 10px;
    }

    .dispute-title-wrap {
      min-width: 0;
      flex: 1;
    }

    .dispute-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .unread-dot {
      width: 10px;
      height: 10px;
      background: var(--danger);
      border-radius: 50%;
      flex-shrink: 0;
      box-shadow: 0 0 0 3px rgba(176,0,32,0.10);
    }

    .dispute-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .dispute-info-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
    }

    .dispute-info-label {
      color: var(--accent);
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .dispute-info-value {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
      word-break: break-word;
    }

    .evidence-box {
      margin-top: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }

    .small-text {
      font-size: 12.8px;
      color: var(--muted);
      line-height: 1.5;
      margin-top: 8px;
      font-weight: 600;
      white-space: pre-wrap;
    }

    .status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      margin-top: 10px;
      text-transform: capitalize;
    }

    .open {
      background: var(--warning-bg);
      color: var(--warning-text);
      border: 1px solid var(--warning-border);
    }

    .reviewing {
      background: var(--blue-bg);
      color: var(--blue-text);
      border: 1px solid #c9def8;
    }

    .resolved {
      background: var(--surface2);
      color: var(--accent);
      border: 1px solid #cfead7;
    }

    .rejected {
      background: #ffe5e5;
      color: var(--danger);
      border: 1px solid #ffc4c4;
    }

    .message-thread {
      margin-top: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
    }

    .thread-title {
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--text);
      font-size: 13px;
    }

    .support-message {
      margin-top: 9px;
      background: white;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      border-left: 4px solid var(--accent);
    }

    .response-title {
      font-weight: 800;
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 12.5px;
    }

    .reply-status {
      font-size: 13px;
      font-weight: 800;
      margin-top: 8px;
      text-align: center;
      line-height: 1.4;
    }

    img {
      width: 100%;
      border-radius: 16px;
      margin-top: 12px;
      border: 1px solid var(--border);
      background: white;
      display: block;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 360px) {
      h1 {
        font-size: 25px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <a class="back" href="worker-settings.html">
      ← Back to Settings
    </a>
  </div>

  <div class="hero">
    <h1>Dispute Center</h1>
    <p>Open a dispute, upload evidence, and review TaskMint support responses in one place.</p>
  </div>

  <div class="card">

    <div class="section-title">
      Open New Dispute
    </div>

    <label>Select Job</label>

    <select id="taskSelect">
      <option value="">Loading jobs...</option>
    </select>

    <label>Dispute Reason</label>

    <select id="reasonSelect">
      <option value="">Select reason</option>
      <option>Customer did not confirm completion</option>
      <option>Payment issue</option>
      <option>Customer cancellation issue</option>
      <option>Unsafe work environment</option>
      <option>Customer unavailable</option>
      <option>Scope of work changed</option>
      <option>Other</option>
    </select>

    <label>Dispute Details</label>

    <textarea
      id="detailsInput"
      maxlength="2500"
      placeholder="Explain what happened in detail..."
    ></textarea>

    <label>Upload Evidence</label>

    <input
      id="evidenceInput"
      type="file"
      accept="image/*"
    >

    <div class="note">
      Upload screenshots, photos, arrival proof, or messages related to the dispute.
    </div>

    <button onclick="submitDispute()">
      Submit Dispute
    </button>

    <div id="formStatus" class="status-message"></div>

  </div>

  <div class="card">
    <div class="section-title">Active Disputes</div>

    <div id="activeDisputes">
      <div class="empty">Loading disputes...</div>
    </div>
  </div>

  <div class="card">
    <div class="section-title">Dispute History</div>

    <div id="historyDisputes">
      <div class="empty">Loading dispute history...</div>
    </div>
  </div>

</div>

<script>
const supabaseClient =
  window.supabase.createClient(
    "https://dbcthtjmtlumidpbucrc.supabase.co",
    "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
  );

let currentUser = null;
let currentWorkerId = null;
let currentWorkerIds = [];
let eligibleTasks = [];
let unreadDisputeIds = new Set();

const params =
  new URLSearchParams(window.location.search);

let selectedDisputeId =
  params.get("dispute_id") || "";

let selectedTaskId =
  params.get("task_id") || "";

let selectedOrderNumber =
  params.get("order_number") || "";

const blockedWords = [
  "fuck",
  "shit",
  "bitch",
  "asshole",
  "nigga",
  "nigger",
  "cunt",
  "motherfucker",
  "pussy"
];

function escapeHTML(value) {
  return String(value || "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function containsBlockedWords(text) {
  const lower = text.toLowerCase();
  return blockedWords.some(word => lower.includes(word));
}

function getDisputeDetails(dispute) {
  return (
    dispute.details ||
    dispute.description ||
    dispute.additional_notes ||
    ""
  );
}

function getDisputeOrderNumber(dispute) {
  return (
    dispute.order_number ||
    dispute.task_order_number ||
    selectedOrderNumber ||
    (
      dispute.task_id
        ? "TM-" + String(dispute.task_id).slice(0, 8).toUpperCase()
        : "Not linked"
    )
  );
}

function formatDisputeDate(value) {
  if (!value) {
    return "Not listed";
  }

  const date = new Date(value);

  if (Number.isNaN(date.getTime())) {
    return value;
  }

  return date.toLocaleDateString();
}

async function loadUnreadMessageDots(disputes) {
  unreadDisputeIds = new Set();

  const disputeIds =
    (disputes || [])
      .map(dispute => dispute.id)
      .filter(Boolean);

  if (disputeIds.length === 0) {
    return;
  }

  const { data, error } = await supabaseClient
    .from("dispute_messages")
    .select("dispute_id, sender_type, sender_role, visible_to, is_read")
    .in("dispute_id", disputeIds)
    .in("visible_to", ["worker"])
    .eq("is_read", false);

  if (error || !data) {
    return;
  }

  data.forEach(message => {
    const sender =
      String(message.sender_role || message.sender_type || "").toLowerCase();

    if (sender !== "worker") {
      unreadDisputeIds.add(String(message.dispute_id));
    }
  });
}

async function init() {
  const { data } = await supabaseClient.auth.getUser();

  if (!data || !data.user) {
    window.location.href = "login.html";
    return;
  }

  currentUser = data.user;

  const ids = [currentUser.id];

  const { data: profile, error } = await supabaseClient
    .from("profiles")
    .select("id")
    .eq("email", currentUser.email)
    .maybeSingle();

  if (profile && profile.id) {
    ids.push(profile.id);
  }

  const { data: workerProfileByEmail } = await supabaseClient
    .from("worker_profiles")
    .select("id, auth_user_id, email")
    .eq("email", currentUser.email)
    .maybeSingle();

  const { data: workerProfileByAuthId } = await supabaseClient
    .from("worker_profiles")
    .select("id, auth_user_id, email")
    .eq("auth_user_id", currentUser.id)
    .maybeSingle();

  const workerProfiles =
    [
      workerProfileByEmail,
      workerProfileByAuthId
    ].filter(Boolean);

  workerProfiles.forEach(workerProfile => {
    if (workerProfile.id) {
      ids.push(workerProfile.id);
    }

    if (workerProfile.auth_user_id) {
      ids.push(workerProfile.auth_user_id);
    }
  });

  currentWorkerIds =
    [...new Set(ids.filter(Boolean).map(String))];

  currentWorkerId =
    currentWorkerIds[0] || "";

  if (!currentWorkerId) {
    document.getElementById("activeDisputes").innerHTML =
      `<div class="empty">Worker profile not found.</div>`;
    return;
  }

  await loadTasks();
  await loadDisputes();
}

async function loadTasks() {
  const select = document.getElementById("taskSelect");

  const { data, error } = await supabaseClient
    .from("worker_quotes")
    .select(`
      task_id,
      tasks (
        id,
        title
      )
    `)
    .in("worker_id", currentWorkerIds)
    .in("status", [
      "accepted",
      "in_progress",
      "completed",
      "paid"
    ]);

  if (error || !data || data.length === 0) {
    select.innerHTML = `<option value="">No eligible jobs</option>`;
    return;
  }

  eligibleTasks = data;
  select.innerHTML = `<option value="">Select a job</option>`;

  data.forEach(item => {
    if (item.tasks) {
      select.innerHTML += `
        <option value="${item.tasks.id}">
          ${escapeHTML(item.tasks.title || "Untitled Job")}
        </option>
      `;
    }
  });

  if (selectedTaskId) {
    select.value = selectedTaskId;
  }
}

async function uploadEvidence(file) {
  if (!file) return null;

  const safeFileName = file.name.replace(/[^a-zA-Z0-9._-]/g, "-");
  const path =
    `worker-disputes/${currentWorkerId}-${Date.now()}-${safeFileName}`;

  const { error } = await supabaseClient.storage
    .from("dispute-evidence")
    .upload(path, file);

  if (error) {
    throw error;
  }

  const { data } = supabaseClient.storage
    .from("dispute-evidence")
    .getPublicUrl(path);

  return data.publicUrl;
}

async function submitDispute() {
  const status = document.getElementById("formStatus");
  const taskId = document.getElementById("taskSelect").value;
  const reason = document.getElementById("reasonSelect").value;
  const details = document.getElementById("detailsInput").value.trim();
  const evidenceFile = document.getElementById("evidenceInput").files[0];

  status.innerText = "";

  if (!taskId || !reason || !details) {
    status.style.color = "#b00020";
    status.innerText = "Please complete all fields.";
    return;
  }

  if (containsBlockedWords(details)) {
    status.style.color = "#b00020";
    status.innerText = "Please remove inappropriate language.";
    return;
  }

  try {
    const evidenceUrl = await uploadEvidence(evidenceFile);

    const { error } = await supabaseClient
      .from("disputes")
      .insert({
        task_id: taskId,
        worker_id: currentWorkerId,
        opened_by: "worker",
        reason: reason,
        details: details,
        description: details,
        evidence_url: evidenceUrl,
        status: "open"
      });

    if (error) {
      throw error;
    }

    status.style.color = "#0b7a28";
    status.innerText = "Dispute submitted successfully.";

    document.getElementById("taskSelect").value = "";
    document.getElementById("reasonSelect").value = "";
    document.getElementById("detailsInput").value = "";
    document.getElementById("evidenceInput").value = "";

    await loadDisputes();
  } catch (error) {
    console.error(error);
    status.style.color = "#b00020";
    status.innerText = error.message;
  }
}

async function loadDisputes() {
  const activeBox = document.getElementById("activeDisputes");
  const historyBox = document.getElementById("historyDisputes");

  let disputes = [];
  let loadError = null;

  if (currentWorkerIds.length > 0) {
    const workerDisputes =
      await supabaseClient
        .from("disputes")
        .select("*")
        .in("worker_id", currentWorkerIds)
        .order("created_at", {
          ascending: false
        });

    if (workerDisputes.error) {
      loadError = workerDisputes.error;
    } else {
      disputes = disputes.concat(workerDisputes.data || []);
    }
  }

  if (selectedTaskId) {
    const taskDisputes =
      await supabaseClient
        .from("disputes")
        .select("*")
        .eq("task_id", selectedTaskId)
        .order("created_at", {
          ascending: false
        });

    if (taskDisputes.error) {
      loadError = loadError || taskDisputes.error;
    } else {
      disputes = disputes.concat(taskDisputes.data || []);
    }
  }

  const disputeMap = {};

  disputes.forEach(dispute => {
    if (dispute && dispute.id) {
      disputeMap[dispute.id] = dispute;
    }
  });

  const data =
    Object.values(disputeMap)
      .sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));

  if (loadError && data.length === 0) {
    activeBox.innerHTML =
      `<div class="empty">Error loading disputes.</div>`;

    historyBox.innerHTML =
      `<div class="empty">Error loading history.</div>`;

    return;
  }

  const active = (data || []).filter(d =>
    ["open", "reviewing", "pending", "in_review", "waiting_on_customer", "waiting_on_worker"].includes(String(d.status || "open"))
  );

  const history = (data || []).filter(d =>
    ["resolved", "rejected", "closed", "cancelled"].includes(String(d.status || ""))
  );

  await loadUnreadMessageDots(data);

  renderDisputes(activeBox, active, true);
  renderDisputes(historyBox, history, false);
}

function renderDisputes(container, disputes, allowReplies) {
  if (!disputes || disputes.length === 0) {
    container.innerHTML = `<div class="empty">No disputes found.</div>`;
    return;
  }

  container.innerHTML = "";

  disputes.forEach(dispute => {
    const hasUnread =
      unreadDisputeIds.has(String(dispute.id));

    container.innerHTML += `
      <div class="card dispute-card">
        <div class="dispute-header">
          <div class="dispute-title-wrap">
            <div class="dispute-title-row">
              ${hasUnread ? `<span class="unread-dot"></span>` : ""}
              <div class="section-title" style="margin-bottom:0;">
                ${escapeHTML(dispute.reason || "Dispute")}
              </div>
            </div>

            <div class="small-text">
              Order # ${escapeHTML(getDisputeOrderNumber(dispute))}
            </div>
          </div>

          <div class="status ${escapeHTML(dispute.status || "open")}">
            ${escapeHTML(dispute.status || "open")}
          </div>
        </div>

        <div class="dispute-meta-grid">
          <div class="dispute-info-box">
            <div class="dispute-info-label">Submitted</div>
            <div class="dispute-info-value">${escapeHTML(formatDisputeDate(dispute.created_at))}</div>
          </div>

          <div class="dispute-info-box">
            <div class="dispute-info-label">Task ID</div>
            <div class="dispute-info-value">${escapeHTML(dispute.task_id || "Not linked")}</div>
          </div>
        </div>

        <div class="note">
          ${escapeHTML(getDisputeDetails(dispute) || "No dispute details listed.")}
        </div>

        ${
          dispute.evidence_url
            ? `
              <div class="evidence-box">
                <div class="thread-title">Evidence</div>
                <img src="${escapeHTML(dispute.evidence_url)}" alt="Dispute evidence">
              </div>
            `
            : ""
        }

        <div class="message-thread">
          <div class="thread-title">
            TaskMint Support Messages
          </div>

          <div id="messages-${dispute.id}">
            <div class="small-text">Loading messages...</div>
          </div>
        </div>

        ${allowReplies
          ? `
            <label for="reply-${dispute.id}">Reply to TaskMint</label>

            <textarea
              id="reply-${dispute.id}"
              placeholder="Reply to TaskMint support..."
            ></textarea>

            <button onclick="sendWorkerReply('${dispute.id}')">
              Send Reply
            </button>

            <div
              id="replyStatus-${dispute.id}"
              class="reply-status"
            ></div>
          `
          : ""
        }
      </div>
    `;

    setTimeout(() => {
      loadDisputeMessages(
        dispute.id,
        `messages-${dispute.id}`
      );
    }, 100);
  });
}

async function loadDisputeMessages(disputeId, containerId) {
  const container = document.getElementById(containerId);

  if (!container) return;

  const { data, error } = await supabaseClient
    .from("dispute_messages")
    .select("*")
    .eq("dispute_id", disputeId)
    .in("visible_to", ["worker"])
    .order("created_at", {
      ascending: true
    });

  if (error || !data) {
    container.innerHTML =
      "<div class='small-text'>Unable to load messages.</div>";
    return;
  }

  if (data.length === 0) {
    container.innerHTML =
      "<div class='small-text'>No TaskMint responses yet.</div>";
    return;
  }

  container.innerHTML = "";

  data.forEach(message => {
    container.innerHTML += `
      <div class="support-message">
        <div class="response-title">
          TaskMint Support
        </div>

        <div>
          ${escapeHTML(message.message)}
        </div>

        <div class="small-text">
          ${new Date(message.created_at).toLocaleString()}
        </div>
      </div>
    `;
  });

  await supabaseClient
    .from("dispute_messages")
    .update({ is_read: true })
    .eq("dispute_id", disputeId)
    .in("visible_to", ["worker"])
    .neq("sender_type", "worker");
}

async function sendWorkerReply(disputeId) {
  const input = document.getElementById(`reply-${disputeId}`);
  const status = document.getElementById(`replyStatus-${disputeId}`);

  if (!input) return;

  const message = input.value.trim();

  if (!message) {
    alert("Enter a message.");
    return;
  }

  if (containsBlockedWords(message)) {
    alert("Please remove inappropriate language.");
    return;
  }

  if (status) {
    status.style.color = "#666";
    status.innerText = "Sending reply...";
  }

  const { error } = await supabaseClient
    .from("dispute_messages")
    .insert({
      dispute_id: disputeId,
      sender_type: "worker",
      sender_role: "worker",
      visible_to: "admin",
      message: message,
      is_read: false
    });

  if (error) {
    if (status) {
      status.style.color = "#b00020";
      status.innerText = error.message;
    } else {
      alert(error.message);
    }

    return;
  }

  input.value = "";

  if (status) {
    status.style.color = "#0b7a28";
    status.innerText = "Reply sent to TaskMint support.";
  }
}

init();
