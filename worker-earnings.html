<!DOCTYPE html>
<html>
<head>
  <title>Worker Earnings - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
      padding-bottom: 90px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .back {
      color: #0b7a28;
      font-weight: bold;
      margin-bottom: 18px;
      display: inline-block;
      text-decoration: none;
    }

    h1 {
      margin-top: 0;
      color: #0b7a28;
    }

    .summary-card {
      background: #0b7a28;
      color: white;
      padding: 22px;
      border-radius: 18px;
      margin-bottom: 20px;
    }

    .summary-label {
      font-size: 14px;
      opacity: 0.9;
    }

    .summary-amount {
      font-size: 34px;
      font-weight: bold;
      margin-top: 10px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border: 1px solid #eee;
    }

    .job-title {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .amount {
      color: #0b7a28;
      font-size: 22px;
      font-weight: bold;
      margin-top: 10px;
    }

    .small-text {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
    }

    .status {
      display: inline-block;
      background: #e6f4ea;
      color: #0b7a28;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<div class="container">

  <a class="back"
  href="worker-dashboard.html">
    ← Back to Dashboard
  </a>

  <h1>Earnings</h1>

  <div class="summary-card">

    <div class="summary-label">
      Total Earnings
    </div>

    <div class="summary-amount">
      $0.00
    </div>

  </div>

  <div class="card">

    <div class="job-title">
      Furniture Assembly
    </div>

    <div class="small-text">
      Completed May 15, 2026
    </div>

    <div class="amount">
      +$120
    </div>

    <div class="status">
      Paid
    </div>

  </div>

  <div class="card">

    <div class="job-title">
      TV Mounting
    </div>

    <div class="small-text">
      Completed May 10, 2026
    </div>

    <div class="amount">
      +$85
    </div>

    <div class="status">
      Paid
    </div>

  </div>

</div>

</body>
</html>
