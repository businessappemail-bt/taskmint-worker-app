<!DOCTYPE html>
<html>
<head>
  <title>Worker Earnings - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
      padding-bottom: 90px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .back {
      color: #0b7a28;
      font-weight: bold;
      margin-bottom: 18px;
      display: inline-block;
      text-decoration: none;
    }

    h1 {
      margin-top: 0;
      color: #0b7a28;
    }

    .summary-card {
      background: #0b7a28;
      color: white;
      padding: 22px;
      border-radius: 18px;
      margin-bottom: 20px;
    }

    .summary-label {
      font-size: 14px;
      opacity: 0.9;
    }

    .summary-amount {
      font-size: 34px;
      font-weight: bold;
      margin-top: 10px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 14px;
    }

    .filter-card,
    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border: 1px solid #eee;
    }

    label {
      display: block;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 6px;
    }

    select {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 15px;
      background: white;
      box-sizing: border-box;
    }

    .job-title {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .small-text {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
      line-height: 1.4;
    }

    .money-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-top: 8px;
    }

    .money-row strong {
      color: #111;
    }

    .worker-pay {
      color: #0b7a28;
      font-size: 22px;
      font-weight: bold;
      margin-top: 12px;
    }

    .fee {
      color: #b00020;
      font-weight: bold;
    }

    .status {
      display: inline-block;
      background: #e6f4ea;
      color: #0b7a28;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 10px;
      text-transform: capitalize;
    }

    .section-title {
      font-size: 18px;
      font-weight: bold;
      margin: 20px 0 12px;
      color: #111;
    }

    .pdf-button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: #111;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 18px;
      transition: 0.2s;
    }

    .pdf-button:hover {
      transform: scale(1.01);
    }

    .empty {
      text-align: center;
      color: #666;
      padding: 18px;
      line-height: 1.5;
    }
  </style>
</head>

<body>

<div class="container">

  <a class="back" href="worker-dashboard.html">
    ← Back to Dashboard
  </a>

  <h1>Earnings</h1>

  <div class="summary-card">
    <div class="summary-label">Total Worker Payouts</div>

    <div class="summary-amount" id="totalPayout">
      Loading...
    </div>

    <div class="summary-row">
      <span>Total Job Amounts</span>
      <strong id="totalCustomerPaid">Loading...</strong>
    </div>

    <div class="summary-row">
      <span>Total TaskMint Fees</span>
      <strong id="totalFees">Loading...</strong>
    </div>
  </div>

  <div class="filter-card">
    <label>Filter by Date</label>
    <select id="dateFilter" onchange="renderEarnings()">
      <option value="all">All Earnings</option>
      <option value="this_week">This Week</option>
      <option value="this_month">This Month</option>
      <option value="last_month">Last Month</option>
      <option value="this_year">This Year</option>
    </select>
  </div>

  <button class="pdf-button" onclick="downloadEarningsPDF()">
    Download PDF Statement
  </button>

  <div class="section-title">Completed Earnings</div>

  <div id="earningsList">
    <div class="empty">Loading earnings...</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

let allEarnings = [];
let currentTotals = {
  totalPayout: 0,
  totalCustomerPaid: 0,
  totalFees: 0
};

loadEarnings();

function formatMoney(value) {
  const numberValue = Number(value || 0);

  if (Number.isNaN(numberValue)) {
    return "$0.00";
  }

  return "$" + numberValue.toFixed(2);
}

function formatDate(value) {
  if (!value) {
    return "Not listed";
  }

  const date = new Date(value);

  if (Number.isNaN(date.getTime())) {
    return "Not listed";
  }

  return date.toLocaleDateString([], {
    year: "numeric",
    month: "short",
    day: "numeric"
  });
}

function getEarningDate(item) {
  return item.payout_date || item.created_at || "";
}

function isInDateFilter(item, filterValue) {
  if (filterValue === "all") {
    return true;
  }

  const rawDate = getEarningDate(item);

  if (!rawDate) {
    return false;
  }

  const date = new Date(rawDate);

  if (Number.isNaN(date.getTime())) {
    return false;
  }

  const now = new Date();
  const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  const startOfWeek = new Date(startOfToday);
  startOfWeek.setDate(startOfToday.getDate() - startOfToday.getDay());

  const startOfThisMonth = new Date(now.getFullYear(), now.getMonth(), 1);
  const startOfLastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  const startOfNextMonth = new Date(now.getFullYear(), now.getMonth() + 1, 1);
  const startOfThisYear = new Date(now.getFullYear(), 0, 1);

  if (filterValue === "this_week") {
    return date >= startOfWeek;
  }

  if (filterValue === "this_month") {
    return date >= startOfThisMonth && date < startOfNextMonth;
  }

  if (filterValue === "last_month") {
    return date >= startOfLastMonth && date < startOfThisMonth;
  }

  if (filterValue === "this_year") {
    return date >= startOfThisYear;
  }

  return true;
}

async function loadEarnings() {
  const { data: sessionData } =
    await supabaseClient.auth.getSession();

  if (!sessionData.session || !sessionData.session.user) {
    document.getElementById("totalPayout").innerText = "$0.00";
    document.getElementById("totalCustomerPaid").innerText = "$0.00";
    document.getElementById("totalFees").innerText = "$0.00";
    document.getElementById("earningsList").innerHTML = `
      <div class="card">
        No active worker session found. Please log in again.
      </div>
    `;
    return;
  }

  const workerUser =
    sessionData.session.user;

  const { data: workerProfile } =
    await supabaseClient
      .from("worker_profiles")
      .select("id")
      .eq("email", workerUser.email)
      .maybeSingle();

  if (!workerProfile) {
    document.getElementById("totalPayout").innerText = "$0.00";
    document.getElementById("totalCustomerPaid").innerText = "$0.00";
    document.getElementById("totalFees").innerText = "$0.00";
    document.getElementById("earningsList").innerHTML = `
      <div class="card">
        Worker profile not found for this account.
      </div>
    `;
    return;
  }

  const { data: earnings, error } =
    await supabaseClient
      .from("worker_earnings")
      .select("*")
      .eq("worker_id", workerProfile.id)
      .order("created_at", { ascending: false });

  if (error) {
    console.log(error);
    document.getElementById("earningsList").innerHTML = `
      <div class="card">
        Unable to load earnings.
      </div>
    `;
    return;
  }

  allEarnings = earnings || [];
  renderEarnings();
}

function renderEarnings() {
  const filterValue =
    document.getElementById("dateFilter").value;

  const earnings =
    allEarnings.filter(item => isInDateFilter(item, filterValue));

  const earningsList =
    document.getElementById("earningsList");

  earningsList.innerHTML = "";

  let totalPayout = 0;
  let totalCustomerPaid = 0;
  let totalFees = 0;

  earnings.forEach((item) => {
    totalPayout += Number(item.worker_payout || 0);
    totalCustomerPaid += Number(item.customer_paid || 0);
    totalFees += Number(item.platform_fee || 0);

    earningsList.innerHTML += `
      <div class="card">

        <div class="job-title">
          ${item.job_category || "Completed Task"}
        </div>

        <div class="small-text">
          Completed / earned on ${formatDate(getEarningDate(item))}
        </div>

        <div class="small-text">
          Task ID: ${item.task_id || "Not listed"}
        </div>

        <div class="money-row">
          <span>Customer Paid</span>
          <strong>${formatMoney(item.customer_paid)}</strong>
        </div>

        <div class="money-row">
          <span>TaskMint Fee</span>
          <span class="fee">-${formatMoney(item.platform_fee)}</span>
        </div>

        <div class="worker-pay">
          Worker Payout: ${formatMoney(item.worker_payout)}
        </div>

        <div class="status">
          ${item.payout_status || "pending"}
        </div>

      </div>
    `;
  });

  if (earnings.length === 0) {
    earningsList.innerHTML = `
      <div class="empty">
        No earnings match this filter.
      </div>
    `;
  }

  currentTotals = {
    totalPayout,
    totalCustomerPaid,
    totalFees
  };

  document.getElementById("totalPayout").innerText =
    formatMoney(totalPayout);

  document.getElementById("totalCustomerPaid").innerText =
    formatMoney(totalCustomerPaid);

  document.getElementById("totalFees").innerText =
    formatMoney(totalFees);
}

function downloadEarningsPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const filterValue =
    document.getElementById("dateFilter").value;

  const earnings =
    allEarnings.filter(item => isInDateFilter(item, filterValue));

  doc.setFontSize(18);
  doc.text("TaskMint Earnings Statement", 20, 20);

  doc.setFontSize(12);
  doc.text(`Total Job Amounts: ${formatMoney(currentTotals.totalCustomerPaid)}`, 20, 40);
  doc.text(`TaskMint Platform Fees: ${formatMoney(currentTotals.totalFees)}`, 20, 50);
  doc.text(`Total Worker Payouts: ${formatMoney(currentTotals.totalPayout)}`, 20, 60);

  doc.text("Earnings Details", 20, 80);

  let y = 95;

  earnings.forEach((item) => {
    if (y > 260) {
      doc.addPage();
      y = 20;
    }

    doc.text(`${item.job_category || "Completed Task"} - ${formatDate(getEarningDate(item))}`, 20, y);
    doc.text(`Customer Paid: ${formatMoney(item.customer_paid)}`, 20, y + 10);
    doc.text(`TaskMint Fee: -${formatMoney(item.platform_fee)}`, 20, y + 20);
    doc.text(`Worker Payout: ${formatMoney(item.worker_payout)}`, 20, y + 30);
    doc.text(`Status: ${item.payout_status || "pending"}`, 20, y + 40);

    y += 58;
  });

  doc.save("taskmint-earnings.pdf");
}
</script>

</body>
</html>
