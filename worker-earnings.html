<!DOCTYPE html>
<html>
<head>
  <title>Worker Earnings - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
      padding-bottom: 90px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .back {
      color: #0b7a28;
      font-weight: bold;
      margin-bottom: 18px;
      display: inline-block;
      text-decoration: none;
    }

    h1 {
      margin-top: 0;
      color: #0b7a28;
    }

    .summary-card {
      background: #0b7a28;
      color: white;
      padding: 22px;
      border-radius: 18px;
      margin-bottom: 20px;
    }

    .summary-label {
      font-size: 14px;
      opacity: 0.9;
    }

    .summary-amount {
      font-size: 34px;
      font-weight: bold;
      margin-top: 10px;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 14px;
    }

    .filter-card,
    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border: 1px solid #eee;
    }

    label {
      display: block;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 6px;
    }

    select {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 15px;
      background: white;
      box-sizing: border-box;
    }

    .job-title {
      font-size: 17px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .small-text {
      color: #666;
      font-size: 13px;
      margin-top: 4px;
    }

    .money-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-top: 8px;
    }

    .money-row strong {
      color: #111;
    }

    .worker-pay {
      color: #0b7a28;
      font-size: 22px;
      font-weight: bold;
      margin-top: 12px;
    }

    .fee {
      color: #b00020;
      font-weight: bold;
    }

    .status {
      display: inline-block;
      background: #e6f4ea;
      color: #0b7a28;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 10px;
    }

    .pdf-button {
  width: 100%;
  padding: 15px;
  border: none;
  border-radius: 14px;
  background: #111;
  color: white;
  font-size: 15px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 18px;
  transition: 0.2s;
}

.pdf-button:hover {
  transform: scale(1.01);
}
  </style>
</head>

<body>

<div class="container">

  <a class="back" href="worker-dashboard.html">
    ← Back to Dashboard
  </a>

  <h1>Earnings</h1>

  <div class="summary-card">
    <div class="summary-label">Total Worker Payouts</div>
   <div class="summary-amount" id="totalPayout">
  Loading...
</div>

    <div class="summary-row">
      <span>Total Job Amounts</span>
      <strong id="totalCustomerPaid">
  Loading...
</strong>
    </div>

<div id="earningsList"></div>
    
  </div>

  <div class="filter-card">
    <label>Filter by Date</label>
    <select id="dateFilter">
      <option value="all">All Earnings</option>
      <option value="this_week">This Week</option>
      <option value="this_month">This Month</option>
      <option value="last_month">Last Month</option>
      <option value="this_year">This Year</option>
    </select>
  </div>

 <button class="pdf-button"
  onclick="downloadEarningsPDF()">
  Download PDF Statement
</button>

</div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

 const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

loadEarnings();

async function loadEarnings() {

  const { data: sessionData } =
    await supabaseClient.auth.getSession();

  const workerUser =
    sessionData.session.user;

  console.log(workerUser.email);

  const { data: workerProfile } =
    await supabaseClient
      .from("worker_profiles")
      .select("id")
      .eq("email", workerUser.email)
      .maybeSingle();

  const { data: earnings, error } =
  await supabaseClient
    .from("worker_earnings")
    .select("*")
    .eq("worker_id", workerProfile.id);

if (error) {
  console.log(error);
  return;
}

const earningsList =
  document.getElementById("earningsList");

earningsList.innerHTML = "";

let totalPayout = 0;
let totalCustomerPaid = 0;
  
 earnings.forEach((item) => {

  totalPayout += Number(
    item.worker_payout || 0
  );

  totalCustomerPaid += Number(
    item.customer_paid || 0
  );

  earningsList.innerHTML += `
    <div class="card">

      <div class="job-title">
        ${item.task_title || "Completed Task"}
      </div>

      <div class="small-text">
        Paid Job
      </div>

      <div class="money-row">
        <span>Customer Paid</span>
        <strong>
          $${Number(item.customer_paid || 0).toFixed(2)}
        </strong>
      </div>

      <div class="money-row">
        <span>TaskMint Fee</span>
        <span class="fee">
          -$${Number(item.platform_fee || 0).toFixed(2)}
        </span>
      </div>

      <div class="worker-pay">
        Worker Payout:
        $${Number(item.worker_payout || 0).toFixed(2)}
      </div>

      <div class="status">
        Paid
      </div>

    </div>
  `;

});

  document.getElementById("totalPayout")
    .innerText =
      `$${totalPayout.toFixed(2)}`;

  document.getElementById("totalCustomerPaid")
    .innerText =
      `$${totalCustomerPaid.toFixed(2)}`;

}
  
function downloadEarningsPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.setFontSize(18);
  doc.text("TaskMint Earnings Statement", 20, 20);

  doc.setFontSize(12);
  doc.text("Total Job Amounts: $205.00", 20, 40);
  doc.text("TaskMint Platform Fees: $30.75", 20, 50);
  doc.text("Total Worker Payouts: $174.25", 20, 60);

  doc.text("Earnings Details", 20, 80);

  doc.text("Furniture Assembly", 20, 95);
  doc.text("Customer Paid: $120.00", 20, 105);
  doc.text("TaskMint Fee: -$18.00", 20, 115);
  doc.text("Worker Payout: $102.00", 20, 125);

  doc.text("TV Mounting", 20, 145);
  doc.text("Customer Paid: $85.00", 20, 155);
  doc.text("TaskMint Fee: -$12.75", 20, 165);
  doc.text("Worker Payout: $72.25", 20, 175);

  doc.save("taskmint-earnings.pdf");
}
</script>

</body>
</html>
