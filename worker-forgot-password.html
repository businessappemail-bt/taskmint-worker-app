<!DOCTYPE html>
<html>
<head>
  <title>Forgot Password - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #e9f7ee 0%, #f5f5f5 100%);
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .back {
      color: #0b7a28;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    h1 {
      color: #0b7a28;
      margin-top: 0;
      text-align: center;
    }

    .sub {
      color: #666;
      font-size: 14px;
      line-height: 1.5;
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      border: none;
      border-radius: 12px;
      background: #0b7a28;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .status {
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      margin-top: 14px;
      line-height: 1.4;
    }
  </style>
</head>

<body>

<div class="container">

  <a class="back" href="login.html">← Back to Login</a>

  <div class="card">
    <h1>Reset Password</h1>

    <div class="sub">
      Enter your email and TaskMint will send you a secure link to create a new password.
    </div>

    <input
      type="email"
      id="email"
      placeholder="Enter your email"
    >

    <button onclick="sendResetEmail()">
      Send Reset Email
    </button>

    <div id="statusMessage" class="status"></div>
  </div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function sendResetEmail() {
  const email =
    document.getElementById("email").value.trim();

  const status =
    document.getElementById("statusMessage");

  if (!email) {
    status.style.color = "#b00020";
    status.innerText = "Enter your email address.";
    return;
  }

  status.style.color = "#666";
  status.innerText = "Sending reset email...";

  const { error } =
    await supabaseClient.auth.resetPasswordForEmail(email, {
      redirectTo: "https://businessappemail-bt.github.io/task-app/reset-password.html"
    });

  if (error) {
    status.style.color = "#b00020";
    status.innerText = error.message;
    return;
  }

  status.style.color = "#0b7a28";
  status.innerText =
    "Password reset email sent. Check your inbox and spam folder.";
}
</script>

</body>
</html>
