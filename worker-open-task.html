<!DOCTYPE html>
<html>
<head>
  <title>Open Tasks - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
 
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f2f7f4;
      --surface2: #e6f4eb;
      --border: #e2ebe5;
      --accent: #0b7a28;
      --text: #111111;
      --muted: #6b7870;
      --danger: #b00020;
      --warning-bg: #fffbeb;
      --warning-border: #f0c040;
      --warning-text: #7a4f00;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 90px;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 470px;
      padding: 20px 16px 30px;
      position: relative;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 40;
      width: 100%;
      max-width: 470px;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 13px 20px;
      margin: -20px -16px 20px;
    }

    .back {
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
      font-size: 14px;
    }

    .small-action {
      color: var(--accent);
      font-weight: 800;
      font-size: 12px;
      cursor: pointer;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 8px 11px;
    }

    .hero {
      background: var(--accent);
      color: white;
      border-radius: 22px;
      padding: 24px 20px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(11,122,40,0.22);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: riseIn 0.35s 0.05s forwards;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 155px;
      height: 155px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      top: -65px;
      right: -55px;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      bottom: -45px;
      left: -35px;
    }

    .hero-title {
      font-size: 29px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1.08;
      margin-bottom: 7px;
      position: relative;
      z-index: 2;
    }

    .hero-sub {
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
      position: relative;
      z-index: 2;
    }

    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      opacity: 0;
      animation: riseIn 0.35s 0.12s forwards;
    }

    .filter-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 4px;
      letter-spacing: -0.1px;
    }

    .filter-sub {
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
      margin-bottom: 12px;
      font-weight: 600;
    }

    select,
    input {
      width: 100%;
      padding: 13px;
      margin-top: 10px;
      border-radius: 13px;
      border: 1px solid var(--border);
      font-size: 14px;
      box-sizing: border-box;
      background: white;
      color: var(--text);
      outline: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    select:focus,
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }

    .filter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .task-card {
      background: white;
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      opacity: 0;
      animation: riseIn 0.35s 0.12s forwards;
    }

    .task-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .task-title {
      font-size: 17px;
      font-weight: 800;
      line-height: 1.25;
      margin-bottom: 7px;
      letter-spacing: -0.1px;
    }

    .category-pill,
    .request-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--surface2);
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
      text-transform: capitalize;
      border: 1px solid #cfead7;
    }

    .request-pill {
      background: var(--text);
      color: white;
      margin-top: 6px;
      border-color: var(--text);
    }

    .request-pill.direct {
      background: var(--warning-bg);
      color: var(--warning-text);
      border: 1px solid var(--warning-border);
    }

    .customer-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px;
      border-radius: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      margin-bottom: 12px;
    }

    .customer-photo {
      width: 44px;
      height: 44px;
      border-radius: 15px;
      object-fit: cover;
      border: 1px solid var(--border);
      background: var(--surface2);
      flex-shrink: 0;
    }

    .customer-name {
      font-size: 13.5px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.2;
    }

    .customer-sub {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 3px;
      line-height: 1.35;
      font-weight: 600;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-bottom: 12px;
    }

    .info-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 15px;
      padding: 11px;
      min-height: 70px;
    }

    .info-label {
      font-size: 10.5px;
      font-weight: 800;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .info-value {
      font-size: 12.5px;
      color: var(--text);
      line-height: 1.35;
      font-weight: 700;
      word-break: break-word;
    }

    .details-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
      display: none;
    }

    .details-box.open {
      display: block;
    }

    .summary-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .details-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 6px;
    }

    .details-text {
      font-size: 13px;
      color: var(--text);
      line-height: 1.45;
      white-space: pre-wrap;
      font-weight: 600;
    }

    .privacy-note {
      font-size: 12px;
      color: var(--warning-text);
      line-height: 1.45;
      background: var(--warning-bg);
      border: 1px solid var(--warning-border);
      border-radius: 14px;
      padding: 11px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .quote-sent-note {
      font-size: 12px;
      color: var(--accent);
      line-height: 1.45;
      background: var(--surface2);
      border: 1px solid #bfe6c9;
      border-radius: 14px;
      padding: 11px;
      margin-bottom: 12px;
      font-weight: 800;
    }

    .button-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 13px;
      background: var(--accent);
      color: white;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(11,122,40,0.10);
    }

    button.secondary {
      background: white;
      color: var(--accent);
      border: 1px solid var(--border);
    }

    button.full {
      grid-column: 1 / -1;
    }

    button:disabled {
      background: #b9b9b9;
      color: white;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
      opacity: 0.75;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 24px 18px;
      line-height: 1.5;
      font-size: 13px;
      font-weight: 600;
    }

    .count-line {
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 12px;
      font-weight: 800;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 11px;
    }

    .loading-spinner {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 360px) {
      .hero-title {
        font-size: 25px;
      }

      .filter-grid,
      .info-grid,
      .button-grid {
        grid-template-columns: 1fr;
      }

      button.full {
        grid-column: auto;
      }

      .task-top {
        display: block;
      }

      .category-pill {
        margin-top: 8px;
      }
    }
  </style>
</head>

</div>

function cleanText(value, fallback = "Not specified") {

  }
 
  const text = String(value).trim();

}
 
function escapeHTML(value) {
  return cleanText(value, "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}
 
function getFirstAvailable(record, keys, fallback = "") {
  if (!record) {
    return fallback;
  }
 
  for (const key of keys) {
    if (
      record[key] !== null &&
      record[key] !== undefined &&
      String(record[key]).trim() !== ""
    ) {
      return record[key];
    }
  }
 
  return fallback;
}

  }

    const day =
      dateOnlyMatch[3];

  if (Number.isNaN(date.getTime())) {
    return value;
  }

    year: "numeric",
    month: "short",
    day: "numeric"
  });
}
