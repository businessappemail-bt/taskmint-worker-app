<!DOCTYPE html>
<html>
<head>
<title>Open Tasks - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #f5f5f5;
color: #111;
}

.container {
max-width: 420px;
margin: 0 auto;
padding: 20px;
}

.back {
color: #0b7a28;
font-weight: bold;
text-decoration: none;
display: inline-block;
margin-bottom: 15px;
}

h1 {
text-align: center;
font-size: 26px;
margin-bottom: 20px;
}

.card {
background: white;
border-radius: 14px;
padding: 18px;
margin-bottom: 16px;
box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.task-title {
font-size: 18px;
font-weight: bold;
margin-bottom: 8px;
}

.task-info {
font-size: 14px;
color: #444;
margin: 6px 0;
}

button {
width: 100%;
padding: 14px;
margin-top: 14px;
border: none;
border-radius: 10px;
background: #0b7a28;
color: white;
font-size: 15px;
font-weight: bold;
cursor: pointer;
}

.secondary {
background: white;
color: #111;
border: 1px solid #ddd;
}

.empty {
text-align: center;
color: #666;
padding: 25px;
}

  select,
input {
  width: 100%;
  padding: 13px;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  font-size: 15px;
  box-sizing: border-box;
  background: white;
}
</style>
</head>

<body>
<div class="container">
<a class="back" href="worker-dashboard.html">← Back</a>

<h1>Browse Available Tasks</h1>

<div class="card">
  <div class="task-title">Filter Tasks</div>

  <select id="categoryFilter" onchange="loadTasks()">
    <option value="">All Categories</option>
    <option value="Cleaning">Cleaning</option>
    <option value="Moving">Moving</option>
    <option value="Furniture Assembly">Furniture Assembly</option>
    <option value="TV Mounting">TV Mounting</option>
    <option value="Yard Work">Yard Work</option>
    <option value="Delivery">Delivery</option>
    <option value="Other">Other</option>
  </select>

  <input
    type="text"
    id="cityFilter"
    placeholder="Filter by city"
    oninput="loadTasks()"
  >
</div>

<div id="tasksList" class="card empty">
Loading open tasks...
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
"https://dbcthtjmtlumidpbucrc.supabase.co",
"sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function loadTasks() {
const container = document.getElementById("tasksList");

  const selectedCategory =
  document.getElementById("categoryFilter").value;

const selectedCity =
  document.getElementById("cityFilter").value.trim().toLowerCase();

let query = supabaseClient
  .from("tasks")
  .select("*")
  .eq("status", "open");

if (selectedCategory) {
  query = query.eq("category", selectedCategory);
}

const { data: tasks, error } = await query;

if (error) {
console.error(error);
container.innerHTML = "<div class='empty'>Error loading tasks</div>";
return;
}

if (!tasks || tasks.length === 0) {
container.innerHTML = "<div class='empty'>No open tasks available</div>";
return;
}

container.innerHTML = "";

tasks.forEach(task => {

const taskCity =
  (task.city || "").toLowerCase();

if (
  selectedCity &&
  !taskCity.includes(selectedCity)
) {
  return;
}

const div = document.createElement("div");
div.className = "card";

div.innerHTML = `
<div class="task-title">${task.title}</div>
<div class="task-info">${task.description || ""}</div>
<div class="task-info">
<strong>Location:</strong>
${task.city || "Not specified"}
</div>

<div class="task-info">
<strong>Date Needed:</strong>
${task.task_date || "Not specified"}
</div>

<button onclick="viewTask('${task.id}')">
View Task
</button>

<button class="secondary"
onclick="sendQuote('${task.id}')">
Send Quote
</button>
`;

container.appendChild(div);
});
}

function viewTask(taskId) {
localStorage.setItem("selectedJobId", taskId);
window.location.href = "job-details.html";
}
  function sendQuote(taskId) {
  localStorage.setItem("selectedQuoteTaskId", taskId);
  window.location.href = "send-quote.html";
}

loadTasks();
</script>
</body>
</html>
