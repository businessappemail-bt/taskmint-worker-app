<!DOCTYPE html>
<html>
<head>
  <title>Payout Information - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 20px;
    }

    .back {
      color: #0b7a28;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 18px;
      font-size: 15px;
    }

    h1 {
      text-align: center;
      color: #0b7a28;
      margin-bottom: 18px;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .status-box {
      background: #f7f7f7;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 18px;
      border: 1px solid #e5e5e5;
    }

    .status-title {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .status-text {
      color: #666;
      font-size: 14px;
      line-height: 1.4;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #0b7a28;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
    }

    .secondary {
      background: white;
      border: 1px solid #ddd;
      color: #111;
    }

    .note {
      margin-top: 16px;
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>

<body>

<div class="container">

  <a class="back" href="worker-dashboard.html">
    ← Back to Dashboard
  </a>

  <h1>Payout Information</h1>

  <div class="card">

    <div class="status-box">

      <div class="status-title">
        Payout Status
      </div>

      <div class="status-text" id="payoutStatus">
        No payout method connected yet.
      </div>

    </div>

    <button onclick="startStripePayoutSetup()">
      Set Up / Update Payout Method
    </button>

    <button
      class="secondary"
      onclick="window.location.href='worker-dashboard.html'"
    >
      Back to Dashboard
    </button>

    <div class="note">
      Workers can securely connect ACH bank accounts or eligible debit cards through Stripe. TaskMint does not store full banking information.
    </div>

  </div>

</div>

<script>

async function startStripePayoutSetup() {

  try {

    const response = await fetch(
      "https://task-app-mu-two.vercel.app/api/create-stripe-account-link",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
  email: "worker@test.com",
  stripeAccountId: null
})
      }
    );

    const data =
      await response.json();

    if (!response.ok) {

      alert(data.error || "Stripe setup failed.");

      return;
    }

    window.location.href =
      data.url;

  } catch (error) {

    console.error(error);

    alert("Unable to connect to Stripe.");

  }

}

</script>

</body>
</html>
