<!DOCTYPE html>
<html>
<head>
<title>Edit Worker Profile - TaskMint</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
font-family: Arial, sans-serif;
background: #f5f5f5;
color: #111;
}

.container {
max-width: 420px;
margin: 0 auto;
padding: 20px;
}

.back {
color: #0b7a28;
font-weight: bold;
text-decoration: none;
display: inline-block;
margin-bottom: 15px;
}

h1 {
text-align: center;
font-size: 26px;
margin-bottom: 20px;
}

.card {
background: white;
border-radius: 14px;
padding: 18px;
box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

label {
display: block;
font-weight: bold;
margin-top: 14px;
margin-bottom: 6px;
}

textarea,
input {
width: 100%;
box-sizing: border-box;
padding: 12px;
border: 1px solid #ccc;
border-radius: 10px;
font-size: 15px;
font-family: Arial, sans-serif;
}

textarea {
min-height: 130px;
resize: vertical;
}

button {
width: 100%;
padding: 14px;
margin-top: 16px;
border: none;
border-radius: 10px;
background: #0b7a28;
color: white;
font-size: 15px;
font-weight: bold;
cursor: pointer;
}

.secondary {
background: white;
color: #111;
border: 1px solid #ddd;
}

.help-text {
font-size: 13px;
color: #666;
margin-top: 4px;
}

#statusMessage {
margin-top: 12px;
font-weight: bold;
text-align: center;
}
</style>
</head>

<body>
<div class="container">
<a class="back" href="worker-dashboard.html">← Back</a>

<h1>Edit Public Worker Profile</h1>

<div class="card">
<label for="experienceDescription">Experience Description</label>
<textarea id="experienceDescription" placeholder="Tell customers what type of work you have experience with, how long you’ve been doing it, and what makes you reliable."></textarea>
<div class="help-text">This is what customers will see on your public worker profile.</div>

<label for="servicesOffered">Services Offered</label>
<input id="servicesOffered" type="text" placeholder="Cleaning, moving, yard work, painting">

<label for="serviceArea">Service Area</label>
<input id="serviceArea" type="text" placeholder="Villa Rica, Douglasville, Atlanta">

<button onclick="saveProfile()">Save Profile</button>

<button class="secondary" onclick="window.location.href='worker-dashboard.html'">
Back to Dashboard
</button>

<p id="statusMessage"></p>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
"https://dbcthtjmtlumidpbucrc.supabase.co",
"sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJC1dJ"
);

let currentUser = null;

async function checkLogin() {
const { data, error } = await supabaseClient.auth.getUser();

if (error || !data || !data.user) {
alert("You must log in first.");
window.location.href = "login.html";
return;
}

currentUser = data.user;
loadProfile();
}

async function loadProfile() {
const { data, error } = await supabaseClient
.from("profiles")
.select("experience, skills, service_area")
.eq("id", currentUser.id)
.single();

if (error) {
return;
}

document.getElementById("experienceDescription").value = data.experience || "";
document.getElementById("servicesOffered").value = data.skills || "";
document.getElementById("serviceArea").value = data.service_area || "";
}

async function saveProfile() {
const status = document.getElementById("statusMessage");

if (!currentUser) {
alert("You must log in first.");
window.location.href = "login.html";
return;
}

const experience = document.getElementById("experienceDescription").value.trim();
const services = document.getElementById("servicesOffered").value.trim();
const area = document.getElementById("serviceArea").value.trim();

const { error } = await supabaseClient
.from("profiles")
.upsert({
id: currentUser.id,
email: currentUser.email,
experience: experience,
skills: services,
service_area: area,
account_type: "worker",
is_worker_approved: false
});

if (error) {
console.error(error);
status.style.color = "red";
status.innerText = "Error saving profile.";
return;
}

status.style.color = "green";
status.innerText = "Profile saved successfully.";
}

checkLogin();
</script>
</body>
</html>
