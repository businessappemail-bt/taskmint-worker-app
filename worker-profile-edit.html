
<!DOCTYPE html>
<html>
<head>
  <title>Edit Worker Profile - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f2f7f4;
      --surface2: #e6f4eb;
      --border: #e2ebe5;
      --accent: #0b7a28;
      --text: #111111;
      --muted: #6b7870;
      --danger: #b00020;
      --warn-bg: #fffbeb;
      --warn-border: #f0c040;
      --warn-text: #7a4f00;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      padding-bottom: 90px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top-bar,
    .container {
      width: 100%;
      max-width: 470px;
    }

    .top-bar {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(255,255,255,0.97);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 13px 20px;
    }

    .back {
      color: var(--accent);
      font-weight: 800;
      text-decoration: none;
      font-size: 14px;
    }

    .container {
      padding: 20px 16px 30px;
    }

    .top-card {
      background: var(--accent);
      border-radius: 22px;
      padding: 24px 20px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(11,122,40,0.22);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: riseIn 0.35s 0.05s forwards;
    }

    .top-card::before {
      content: "";
      position: absolute;
      width: 155px;
      height: 155px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      top: -65px;
      right: -55px;
    }

    .top-card::after {
      content: "";
      position: absolute;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      bottom: -45px;
      left: -35px;
    }

    .top-title {
      font-size: 29px;
      font-weight: 800;
      margin-bottom: 7px;
      color: #fff;
      letter-spacing: -0.5px;
      line-height: 1.08;
      position: relative;
      z-index: 2;
    }

    .top-sub {
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
      position: relative;
      z-index: 2;
    }

    .progress-wrap {
      margin-top: 15px;
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.20);
      border-radius: 16px;
      padding: 13px;
      position: relative;
      z-index: 2;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
      margin-bottom: 8px;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      background: rgba(255,255,255,0.24);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #fff;
      border-radius: 999px;
      transition: width 0.25s ease;
    }

    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      opacity: 0;
      animation: riseIn 0.35s 0.12s forwards;
    }

    .section-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--text);
      letter-spacing: -0.1px;
    }

    .checklist {
      display: grid;
      gap: 9px;
      margin-top: 12px;
    }

    .checklist-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      font-size: 13px;
      color: var(--text);
      cursor: pointer;
    }

    .check-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 700;
    }

    .check-icon {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--border);
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .checklist-item.done .check-icon {
      background: var(--accent);
      color: #fff;
    }

    .check-status {
      font-size: 11px;
      font-weight: 800;
      color: var(--muted);
      white-space: nowrap;
      background: var(--surface);
      border-radius: 999px;
      padding: 6px 9px;
    }

    .checklist-item.done .check-status {
      color: var(--accent);
      background: var(--surface2);
    }

    .profile-photo-section {
      text-align: center;
      margin-bottom: 8px;
    }

    .profile-preview-wrap {
      width: 124px;
      height: 124px;
      margin: 0 auto 13px;
      border-radius: 30px;
      padding: 5px;
      background: var(--accent);
      box-shadow: 0 8px 18px rgba(11,122,40,0.16);
    }

    .profile-preview {
      width: 114px;
      height: 114px;
      border-radius: 25px;
      object-fit: cover;
      background: var(--surface2);
      border: 4px solid #fff;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin: 13px 0 7px;
    }

    textarea,
    input,
    select {
      width: 100%;
      padding: 13px;
      border: 1px solid var(--border);
      border-radius: 13px;
      font-size: 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #fff;
      outline: none;
      color: var(--text);
      transition: border-color 0.18s, box-shadow 0.18s;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      line-height: 1.45;
    }
