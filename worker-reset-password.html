<!DOCTYPE html>
<html>
<head>
  <title>Create New Password - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f2f7f4;
      --surface2: #e6f4eb;
      --border: #e2ebe5;
      --accent: #0b7a28;
      --text: #111111;
      --muted: #6b7870;
      --danger: #b00020;
    }

    body {
      margin: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 100%;
      max-width: 470px;
      min-height: 100vh;
      padding: 20px 16px 30px;
    }

    .hero {
      background: var(--accent);
      color: white;
      border-radius: 22px;
      padding: 24px 20px;
      margin-bottom: 14px;
      box-shadow: 0 8px 24px rgba(11,122,40,0.22);
      position: relative;
      overflow: hidden;
      opacity: 0;
      animation: riseIn 0.35s 0.05s forwards;
    }

    .hero::before {
      content: "";
      position: absolute;
      width: 155px;
      height: 155px;
      border-radius: 50%;
      background: rgba(255,255,255,0.10);
      top: -65px;
      right: -55px;
    }

    .hero::after {
      content: "";
      position: absolute;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: rgba(255,255,255,0.07);
      bottom: -45px;
      left: -35px;
    }

    h1 {
      margin: 0 0 7px;
      font-size: 29px;
      font-weight: 800;
      line-height: 1.08;
      letter-spacing: -0.5px;
      position: relative;
      z-index: 2;
    }

    .hero-sub {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: rgba(255,255,255,0.82);
      position: relative;
      z-index: 2;
    }

    .card {
      background: var(--surface);
      border-radius: 20px;
      padding: 16px;
      border: 1px solid var(--border);
      opacity: 0;
      animation: riseIn 0.35s 0.12s forwards;
    }

    .field-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .field-label {
      display: block;
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      padding: 13px;
      border-radius: 13px;
      border: 1px solid var(--border);
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      background: white;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }

    input::placeholder {
      color: #8b9790;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      border: none;
      border-radius: 13px;
      background: var(--accent);
      color: white;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.18s, box-shadow 0.18s;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    button:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 14px rgba(11,122,40,0.10);
    }

    .status {
      text-align: center;
      font-size: 13px;
      font-weight: 800;
      margin-top: 14px;
      line-height: 1.4;
      min-height: 18px;
    }

    .note-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 13px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.45;
      font-weight: 600;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 360px) {
      h1 {
        font-size: 25px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <div class="hero">
    <h1>Create New Password</h1>
    <div class="hero-sub">
      Enter and confirm your new password to finish resetting your TaskMint account access.
    </div>
  </div>

  <div class="card">

    <div class="field-card">
      <label class="field-label" for="newPassword">New Password</label>

      <input
        type="password"
        id="newPassword"
        placeholder="New password"
      >
    </div>

    <div class="field-card">
      <label class="field-label" for="confirmPassword">Confirm Password</label>

      <input
        type="password"
        id="confirmPassword"
        placeholder="Confirm new password"
      >
    </div>

    <button onclick="updatePassword()">
      Update Password
    </button>

    <div id="statusMessage" class="status"></div>

    <div class="note-card">
      Your password must be at least 6 characters. After updating, you will be sent back to the login page.
    </div>

  </div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function updatePassword() {
  const password =
    document.getElementById("newPassword").value.trim();

  const confirmPassword =
    document.getElementById("confirmPassword").value.trim();

  const status =
    document.getElementById("statusMessage");

  if (!password || !confirmPassword) {
    status.style.color = "#b00020";
    status.innerText = "Enter and confirm your new password.";
    return;
  }

  if (password !== confirmPassword) {
    status.style.color = "#b00020";
    status.innerText = "Passwords do not match.";
    return;
  }

  if (password.length < 6) {
    status.style.color = "#b00020";
    status.innerText = "Password must be at least 6 characters.";
    return;
  }

  status.style.color = "#666";
  status.innerText = "Updating password...";

  const { error } =
    await supabaseClient.auth.updateUser({
      password: password
    });

  if (error) {
    status.style.color = "#b00020";
    status.innerText = error.message;
    return;
  }

  status.style.color = "#0b7a28";
  status.innerText = "Password updated successfully.";

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1500);
}
</script>

</body>
</html>
