<!DOCTYPE html>
<html>
<head>
  <title>Create New Password - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #e9f7ee 0%, #f5f5f5 100%);
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .card {
      background: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }

    h1 {
      color: #0b7a28;
      text-align: center;
      margin-top: 0;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 15px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 14px;
      border: none;
      border-radius: 12px;
      background: #0b7a28;
      color: white;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }

    .status {
      text-align: center;
      font-size: 14px;
      font-weight: bold;
      margin-top: 14px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="card">
    <h1>Create New Password</h1>

    <input
      type="password"
      id="newPassword"
      placeholder="New password"
    >

    <input
      type="password"
      id="confirmPassword"
      placeholder="Confirm new password"
    >

    <button onclick="updatePassword()">
      Update Password
    </button>

    <div id="statusMessage" class="status"></div>
  </div>
</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function updatePassword() {
  const password =
    document.getElementById("newPassword").value.trim();

  const confirmPassword =
    document.getElementById("confirmPassword").value.trim();

  const status =
    document.getElementById("statusMessage");

  if (!password || !confirmPassword) {
    status.style.color = "#b00020";
    status.innerText = "Enter and confirm your new password.";
    return;
  }

  if (password !== confirmPassword) {
    status.style.color = "#b00020";
    status.innerText = "Passwords do not match.";
    return;
  }

  if (password.length < 6) {
    status.style.color = "#b00020";
    status.innerText = "Password must be at least 6 characters.";
    return;
  }

  status.style.color = "#666";
  status.innerText = "Updating password...";

  const { error } =
    await supabaseClient.auth.updateUser({
      password: password
    });

  if (error) {
    status.style.color = "#b00020";
    status.innerText = error.message;
    return;
  }

  status.style.color = "#0b7a28";
  status.innerText = "Password updated successfully.";

  setTimeout(() => {
    window.location.href = "login.html";
  }, 1500);
}
</script>

</body>
</html>
