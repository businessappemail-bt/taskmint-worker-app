<!DOCTYPE html>
<html>
<head>
  <title>Worker Sign Up - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      color: #111;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      background: white;
      min-height: 100vh;
      padding: 20px;
      box-sizing: border-box;
    }

    .back {
      color: #0b7a28;
      font-weight: bold;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 15px;
    }

    h1 {
      text-align: center;
      color: #0b7a28;
      margin-bottom: 8px;
    }

    .subtext {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border: 1px solid #eee;
    }

    label {
      display: block;
      font-weight: bold;
      margin-top: 12px;
      margin-bottom: 6px;
      font-size: 14px;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 13px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      min-height: 110px;
      resize: none;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 18px;
      border: none;
      border-radius: 12px;
      background: #0b7a28;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .note {
      font-size: 13px;
      color: #666;
      margin-top: 10px;
      line-height: 1.4;
    }

    .error {
      color: #b00020;
      font-size: 14px;
      margin-top: 12px;
      font-weight: bold;
      text-align: center;
    }

    .success {
      color: #0b7a28;
      font-size: 14px;
      margin-top: 12px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>

<body>

<div class="container">

  <a class="back" href="login.html">← Back</a>

  <h1>Worker Sign Up</h1>

  <div class="subtext">
    Create your TaskMint worker account. Worker accounts must be reviewed before quotes can be sent.
  </div>

  <div class="card">

    <label>First Name</label>
    <input type="text" id="firstName">

    <label>Last Name</label>
    <input type="text" id="lastName">

    <label>Email</label>
    <input type="email" id="email">

    <label>Password</label>
    <input type="password" id="password">

    <label>Phone Number</label>
    <input type="tel" id="phone">

    <label>Address</label>
    <input type="text" id="address">

    <label>City</label>
    <input type="text" id="city">

    <label>State</label>
    <input type="text" id="state">

    <label>Zip Code</label>
    <input type="text" id="zipCode">

    <label>Birthday</label>
    <input type="date" id="birthday">

    <label>Gender</label>
    <select id="gender">
      <option value="">Select gender</option>
      <option value="Female">Female</option>
      <option value="Male">Male</option>
      <option value="Non-binary">Non-binary</option>
      <option value="Prefer not to say">Prefer not to say</option>
    </select>

    <label>Social Security Number Last 4 Digits</label>
    <input type="text" id="ssnLast4" maxlength="4" placeholder="Last 4 only">

    <div class="note">
      For security, TaskMint should only store the last 4 digits here. Full tax verification should be handled later through a secure provider.
    </div>

    <label>Government ID Upload</label>
    <input type="file" id="governmentId" accept="image/*,.pdf">

    <label>Experience Details</label>
    <textarea id="experienceDetails" placeholder="Tell customers about your experience, skills, and the types of tasks you can complete."></textarea>

    <button onclick="createWorkerAccount()">
      Create Worker Account
    </button>

    <div id="status"></div>

  </div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

async function createWorkerAccount() {
  const status = document.getElementById("status");
  status.className = "";
  status.innerText = "";

  const firstName = document.getElementById("firstName").value.trim();
  const lastName = document.getElementById("lastName").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();
  const city = document.getElementById("city").value.trim();
  const state = document.getElementById("state").value.trim();
  const zipCode = document.getElementById("zipCode").value.trim();
  const birthday = document.getElementById("birthday").value;
  const gender = document.getElementById("gender").value;
  const ssnLast4 = document.getElementById("ssnLast4").value.trim();
  const experienceDetails = document.getElementById("experienceDetails").value.trim();
  const governmentIdFile = document.getElementById("governmentId").files[0];

  if (
    !firstName || !lastName || !email || !password || !phone ||
    !address || !city || !state || !zipCode || !birthday ||
    !gender || !ssnLast4 || !governmentIdFile
  ) {
    status.className = "error";
    status.innerText = "Please complete all required fields.";
    return;
  }

  if (ssnLast4.length !== 4 || isNaN(ssnLast4)) {
    status.className = "error";
    status.innerText = "Enter exactly 4 numbers for SSN last 4.";
    return;
  }

  status.className = "success";
  status.innerText = "Creating worker account...";

  const { data: authData, error: authError } =
    await supabaseClient.auth.signUp({
      email: email,
      password: password
    });

  if (authError) {
    status.className = "error";
    status.innerText = authError.message;
    return;
  }

  const authUser = authData.user;

  if (!authUser) {
    status.className = "error";
    status.innerText = "Account created, but user session was not returned.";
    return;
  }

  const fileExt = governmentIdFile.name.split(".").pop();
  const filePath = `${authUser.id}/government-id-${Date.now()}.${fileExt}`;

  const { error: uploadError } =
    await supabaseClient.storage
      .from("worker-ids")
      .upload(filePath, governmentIdFile);

  if (uploadError) {
    status.className = "error";
    status.innerText = uploadError.message;
    return;
  }

  const { error: insertError } =
    await supabaseClient
      .from("workers")
      .insert([
        {
          auth_user_id: authUser.id,
          first_name: firstName,
          last_name: lastName,
          email: email,
          phone: phone,
          address: address,
          city: city,
          state: state,
          zip_code: zipCode,
          birthday: birthday,
          gender: gender,
          ssn_last4: ssnLast4,
          government_id_url: filePath,
          experience_details: experienceDetails,
          phone_verified: false,
          email_verified: false,
          is_approved: false
        }
      ]);

  if (insertError) {
    status.className = "error";
    status.innerText = insertError.message;
    return;
  }

  status.className = "success";
  status.innerText = "Worker account created. Your account is pending approval.";

  setTimeout(() => {
    window.location.href = "worker-dashboard.html";
  }, 1500);
}
</script>

</body>
</html>
