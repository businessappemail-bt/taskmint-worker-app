<!DOCTYPE html>
<html>
<head>
  <title>Worker Support - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      margin:0;
      font-family:Arial, sans-serif;
      background:#f5f5f5;
      color:#111;
      padding-bottom:60px;
    }

    .container {
      max-width:420px;
      margin:0 auto;
      padding:20px;
    }

    .back {
      color:#0b7a28;
      font-weight:bold;
      text-decoration:none;
      display:inline-block;
      margin-bottom:18px;
    }

    h1 {
      text-align:center;
      color:#0b7a28;
      margin-bottom:18px;
    }

    .card {
      background:white;
      border-radius:14px;
      padding:18px;
      margin-bottom:16px;
      box-shadow:0 2px 8px rgba(0,0,0,0.08);
    }

    .section-title {
      font-size:18px;
      font-weight:bold;
      margin-bottom:12px;
    }

    label {
      display:block;
      font-weight:bold;
      margin-top:14px;
      margin-bottom:6px;
    }

    input,
    textarea,
    select {
      width:100%;
      box-sizing:border-box;
      padding:12px;
      border:1px solid #ccc;
      border-radius:10px;
      font-size:15px;
      font-family:Arial, sans-serif;
    }

    textarea {
      min-height:120px;
      resize:vertical;
    }

    button {
      width:100%;
      padding:14px;
      margin-top:16px;
      border:none;
      border-radius:10px;
      background:#0b7a28;
      color:white;
      font-size:15px;
      font-weight:bold;
      cursor:pointer;
    }

    .secondary {
      background:white;
      color:#111;
      border:1px solid #ddd;
    }

    .note {
      font-size:13px;
      color:#666;
      line-height:1.5;
      margin-top:10px;
    }

    .status-message {
      text-align:center;
      margin-top:14px;
      font-size:14px;
      font-weight:bold;
    }

    .support-email {
      font-size:14px;
      color:#0b7a28;
      font-weight:bold;
      margin-top:10px;
      word-break:break-word;
    }
  </style>
</head>

<body>

<div class="container">

  <a class="back" href="worker-settings.html">
    ← Back to Settings
  </a>

  <h1>Worker Support</h1>

  <div class="card">

    <div class="section-title">
      Contact TaskMint Support
    </div>

    <div class="note">
      Submit questions about payouts, disputes, jobs, account access, reviews, scheduling, verification, or technical issues.
    </div>

    <div class="support-email">
      worker.support@trytaskmint.com
    </div>

    <label for="supportCategory">
      Support Category
    </label>

    <select id="supportCategory">
      <option value="">Select a category</option>
      <option>Payout Issue</option>
      <option>Job Dispute</option>
      <option>Schedule Problem</option>
      <option>Account Access</option>
      <option>Verification Issue</option>
      <option>Customer Complaint</option>
      <option>Technical Problem</option>
      <option>Other</option>
    </select>

    <label for="supportSubject">
      Subject
    </label>

    <input
      id="supportSubject"
      type="text"
      maxlength="120"
      placeholder="Brief summary of the issue"
    >

    <label for="supportMessage">
      Message
    </label>

    <textarea
      id="supportMessage"
      maxlength="3000"
      placeholder="Describe the issue in detail..."
    ></textarea>

    <button onclick="submitSupportTicket()">
      Submit Support Request
    </button>

    <button
      class="secondary"
      onclick="window.location.href='worker-dashboard.html'"
    >
      Back to Dashboard
    </button>

    <div
      class="status-message"
      id="statusMessage"
    ></div>

  </div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

let currentUser = null;

async function submitSupportTicket() {

  const status =
    document.getElementById("statusMessage");

  const { data } =
    await supabaseClient.auth.getUser();

  if (!data || !data.user) {

    window.location.href =
      "login.html";

    return;
  }

  currentUser =
    data.user;

  const category =
    document.getElementById("supportCategory").value;

  const subject =
    document.getElementById("supportSubject").value.trim();

  const message =
    document.getElementById("supportMessage").value.trim();

  if (!category || !subject || !message) {

    status.style.color =
      "#b00020";

    status.innerText =
      "Please complete all fields.";

    return;
  }

  const { error } =
    await supabaseClient
      .from("worker_support_tickets")
      .insert({
        worker_id: currentUser.id,
        worker_email: currentUser.email,
        category: category,
        subject: subject,
        message: message,
        status: "open"
      });

  if (error) {

    console.error(error);

    status.style.color =
      "#b00020";

    status.innerText =
      "Error submitting support request.";

    return;
  }

  status.style.color =
    "#0b7a28";

  status.innerText =
    "Support request submitted successfully.";

  document.getElementById("supportCategory").value = "";
  document.getElementById("supportSubject").value = "";
  document.getElementById("supportMessage").value = "";
}
</script>

</body>
</html>
