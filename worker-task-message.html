<!DOCTYPE html>
<html>
<head>
  <title>Task Message - TaskMint</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #e9f7ee 0%, #f5f5f5 100%);
      color: #111;
      padding-bottom: 90px;
    }

    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 18px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .back {
      color: #0b7a28;
      font-weight: 900;
      text-decoration: none;
      font-size: 14px;
      cursor: pointer;
    }

    .refresh {
      color: #0b7a28;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
    }

    .hero {
      background: linear-gradient(135deg, #0b7a28, #19a447);
      color: white;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 14px;
      box-shadow: 0 10px 28px rgba(11,122,40,0.22);
    }

    .hero-title {
      font-size: 24px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .hero-sub {
      font-size: 13px;
      line-height: 1.45;
      opacity: 0.95;
    }

    .notice,
    .card {
      background: white;
      border-radius: 18px;
      padding: 15px;
      margin-bottom: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.08);
      border: 1px solid #edf1ee;
    }

    .notice {
      border-left: 5px solid #0b7a28;
      color: #444;
      font-size: 13px;
      line-height: 1.45;
    }

    .task-box {
      background: #f7faf8;
      border: 1px solid #e3eee6;
      border-radius: 16px;
      padding: 12px;
      margin-bottom: 12px;
    }

    .task-title {
      font-size: 15px;
      font-weight: 900;
      color: #111;
      margin-bottom: 5px;
    }

    .task-meta,
    .task-details {
      font-size: 12px;
      color: #666;
      line-height: 1.45;
    }

    .task-details {
      margin-top: 8px;
      color: #444;
    }

    .message {
      padding: 12px;
      border-radius: 14px;
      margin-bottom: 10px;
      max-width: 86%;
      border: 1px solid #e3eee6;
    }

    .message.mine {
      background: #e7f7ec;
      margin-left: auto;
    }

    .message.theirs {
      background: white;
      margin-right: auto;
    }

    .message-label {
      font-size: 12px;
      font-weight: 900;
      color: #0b7a28;
      margin-bottom: 4px;
    }

    .message-text {
      font-size: 14px;
      color: #333;
      line-height: 1.45;
      white-space: pre-wrap;
    }

    .small {
      color: #777;
      font-size: 11px;
      margin-top: 6px;
    }

    textarea,
    input {
      width: 100%;
      box-sizing: border-box;
      padding: 13px;
      margin-top: 10px;
      border: 1px solid #d9d9d9;
      border-radius: 13px;
      font-size: 15px;
      font-family: Arial, sans-serif;
      outline: none;
      background: #fbfbfb;
    }

    textarea:focus,
    input:focus {
      border-color: #0b7a28;
      background: white;
      box-shadow: 0 0 0 3px rgba(11,122,40,0.10);
    }

    textarea {
      min-height: 105px;
      resize: vertical;
    }

    button {
      width: 100%;
      padding: 13px;
      margin-top: 10px;
      border: none;
      border-radius: 13px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    .send {
      background: #0b7a28;
      color: white;
    }

    .secondary {
      background: white;
      color: #111;
      border: 1px solid #dfe5e0;
    }

    .action-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .error {
      color: #b00020;
      font-weight: bold;
    }

    .success {
      color: #0b7a28;
      font-weight: bold;
    }

    .empty {
      color: #666;
      font-size: 13px;
      line-height: 1.45;
      text-align: center;
      padding: 16px;
      background: #f7faf8;
      border-radius: 14px;
      border: 1px solid #e3eee6;
    }

    img {
      max-width: 100%;
      border-radius: 10px;
      margin-top: 8px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="top-bar">
    <a class="back" href="worker-open-task.html">← Back</a>
   <div class="refresh" onclick="refreshTaskMessages()">Refresh</div>
  </div>

  <div class="hero">
    <div class="hero-title">Task Message</div>
    <div class="hero-sub">
      Ask the customer questions about this task before sending a quote.
    </div>
  </div>

  <div class="notice">
    This conversation is tied to this task only. Do not share payment details, threats, or inappropriate content.
  </div>

  <div class="card">
    <div id="taskDetails" class="task-box">
      Loading task details...
    </div>

    <div id="messagesList">
      <div class="empty">Loading messages...</div>
    </div>
  </div>

  <div class="card">
    <textarea
      id="messageInput"
      placeholder="Ask a question about this task..."
    ></textarea>

    <input
      id="imageInput"
      type="file"
      accept="image/*"
    >

    <button class="send" onclick="sendMessage()">
      Send Message
    </button>

    <div class="action-grid">
      <button class="secondary" onclick="goToQuote()">
        Send Quote
      </button>

      <button class="secondary" onclick="loadPage()">
        Refresh
      </button>
    </div>

    <p id="status"></p>
  </div>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://dbcthtjmtlumidpbucrc.supabase.co",
  "sb_publishable_3h7cO2Z8CDxZyEKDLRzvtg_1UJCLldJ"
);

const params = new URLSearchParams(window.location.search);

let currentUser = null;
let currentWorkerId = null;
let currentTaskId =
  params.get("task_id") ||
  localStorage.getItem("selectedMessageTaskId") ||
  localStorage.getItem("selectedTaskId") ||
  localStorage.getItem("selectedJobId") ||
  "";

let currentCustomerId =
  params.get("customer_id") ||
  localStorage.getItem("selectedCustomerId") ||
  "";

let currentConversationId =
  params.get("conversation_id") ||
  localStorage.getItem("selectedConversationId") ||
  "";

const blockedWords = [
  "fuck",
  "shit",
  "bitch",
  "asshole",
  "damn",
  "nigga",
  "nigger",
  "motherfucker",
  "motherfucka",
  "retard",
  "hoe",
  "cunt",
  "dick",
  "pussy"
];

function containsBlockedWords(text) {
  const lowerText = String(text || "").toLowerCase();
  return blockedWords.some(word => lowerText.includes(word));
}

function escapeHTML(value) {
  if (value === null || value === undefined) {
    return "";
  }

  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function setStatus(message, type = "") {
  const status = document.getElementById("status");
  status.className = type;
  status.innerText = message;
}

function getFirstAvailable(record, keys, fallback = "") {
  if (!record) {
    return fallback;
  }

  for (const key of keys) {
    if (
      record[key] !== null &&
      record[key] !== undefined &&
      String(record[key]).trim() !== ""
    ) {
      return record[key];
    }
  }

  return fallback;
}

async function getCurrentUser() {
  const { data } = await supabaseClient.auth.getSession();

  if (data.session && data.session.user) {
    localStorage.setItem("taskmintUserId", data.session.user.id);
    return data.session.user;
  }

  window.location.href = "worker-login.html";
  return null;
}

async function getCurrentWorkerId(user) {
  const { data: workerProfile } = await supabaseClient
    .from("worker_profiles")
    .select("id")
    .eq("email", user.email)
    .maybeSingle();

  if (workerProfile && workerProfile.id) {
    currentWorkerId = workerProfile.id;
    localStorage.setItem("selectedWorkerId", currentWorkerId);
    return currentWorkerId;
  }

  currentWorkerId = user.id;
  return currentWorkerId;
}

async function loadTask() {
  const taskBox = document.getElementById("taskDetails");

  if (!currentTaskId) {
    taskBox.innerHTML = `
      <div class="empty">
        No task was selected.
      </div>
    `;
    return null;
  }

  const { data: task, error } = await supabaseClient
    .from("tasks")
    .select("*")
    .eq("id", currentTaskId)
    .maybeSingle();

  if (error || !task) {
    taskBox.innerHTML = `
      <div class="empty">
        Task details could not be loaded.
      </div>
    `;
    return null;
  }

  if (!currentCustomerId) {
    currentCustomerId = getFirstAvailable(task, [
      "customer_id",
      "client_id",
      "posted_by",
      "created_by",
      "user_id",
      "profile_id"
    ], "");
  }

  const title = getFirstAvailable(task, [
    "title",
    "task_title",
    "job_title",
    "category"
  ], "Open Task");

  const category = getFirstAvailable(task, [
    "category",
    "task_category",
    "service_type"
  ], "Category not listed");

  const city = getFirstAvailable(task, [
    "city",
    "task_city",
    "service_city"
  ], "City not listed");

  const state = getFirstAvailable(task, [
    "state",
    "task_state",
    "service_state"
  ], "");

  const dateNeeded = getFirstAvailable(task, [
    "task_date",
    "date_needed",
    "needed_by",
    "scheduled_date",
    "scheduled_start",
    "due_date"
  ], "Not listed");

  const details = getFirstAvailable(task, [
    "description",
    "details",
    "task_details",
    "notes",
    "special_instructions"
  ], "No task details were provided.");

  taskBox.innerHTML = `
    <div class="task-title">
      ${escapeHTML(title)}
    </div>

    <div class="task-meta">
      ${escapeHTML(category)} •
      ${escapeHTML(city)}${state ? ", " + escapeHTML(state) : ""}<br>
      Date Needed: ${escapeHTML(dateNeeded)}
    </div>

    <div class="task-details">
      ${escapeHTML(details)}
    </div>
  `;

  return task;
}

async function ensureConversation(user) {
  await getCurrentWorkerId(user);

  if (!currentTaskId || !currentCustomerId || !currentWorkerId) {
    setStatus("Missing task, customer, or worker information.", "error");
    return null;
  }

  if (currentConversationId) {
    const { data: existingConversation } = await supabaseClient
      .from("task_conversations")
      .select("*")
      .eq("id", currentConversationId)
      .maybeSingle();

    if (existingConversation) {
      currentConversationId = existingConversation.id;
      localStorage.setItem("selectedConversationId", currentConversationId);
      return existingConversation;
    }
  }

  const { data: foundConversation } = await supabaseClient
    .from("task_conversations")
    .select("*")
    .eq("task_id", currentTaskId)
    .eq("customer_id", currentCustomerId)
    .eq("worker_id", currentWorkerId)
    .maybeSingle();

  if (foundConversation) {
    currentConversationId = foundConversation.id;
    localStorage.setItem("selectedConversationId", currentConversationId);
    return foundConversation;
  }

  const { data: newConversation, error } = await supabaseClient
    .from("task_conversations")
    .insert({
      task_id: currentTaskId,
      customer_id: currentCustomerId,
      worker_id: currentWorkerId,
      conversation_type: "task",
      updated_at: new Date().toISOString()
    })
    .select()
    .single();

  if (error) {
    setStatus(error.message, "error");
    return null;
  }

  currentConversationId = newConversation.id;
  localStorage.setItem("selectedConversationId", currentConversationId);

  await supabaseClient
    .from("worker_inbox_items")
    .insert({
      worker_id: currentWorkerId,
      customer_id: currentCustomerId,
      conversation_id: currentConversationId,
      task_id: currentTaskId,
      item_type: "task_message",
      title: "Task Message",
      preview: "Conversation started for an open task.",
      is_read: false
    });

  return newConversation;
}

async function loadMessages() {
  const box = document.getElementById("messagesList");

  if (!currentConversationId) {
    box.innerHTML = `
      <div class="empty">
        No messages yet. Start the conversation below.
      </div>
    `;
    return;
  }

  const { data: messages, error } = await supabaseClient
    .from("task_messages")
    .select("*")
    .eq("conversation_id", currentConversationId)
    .order("created_at", { ascending: true });

  if (error) {
    box.innerHTML = `<p class="error">${escapeHTML(error.message)}</p>`;
    return;
  }

  if (!messages || messages.length === 0) {
    box.innerHTML = `
      <div class="empty">
        No messages yet. Start the conversation below.
      </div>
    `;
    return;
  }

  box.innerHTML = "";

  messages.forEach(msg => {
    const isMine =
      String(msg.sender_id) === String(currentUser.id) ||
      String(msg.sender_id) === String(currentWorkerId);

    const div = document.createElement("div");
    div.className =
      isMine ? "message mine" : "message theirs";

    div.innerHTML = `
      <div class="message-label">
        ${isMine ? "You" : "Customer"}
      </div>

      <div class="message-text">
        ${escapeHTML(msg.message || "")}
      </div>

      ${msg.image_url ? `<img src="${escapeHTML(msg.image_url)}">` : ""}

      <div class="small">
        ${new Date(msg.created_at).toLocaleString()}
      </div>
    `;

    box.appendChild(div);
  });

  await supabaseClient
    .from("task_messages")
    .update({ is_read: true })
    .eq("conversation_id", currentConversationId)
    .neq("sender_id", currentUser.id);
}

async function uploadImage(file, userId) {
  const fileName =
    `${userId}-${Date.now()}-${file.name}`;

  const { error } =
    await supabaseClient.storage
      .from("message-images")
      .upload(fileName, file);

  if (error) {
    throw error;
  }

  const { data } =
    supabaseClient.storage
      .from("message-images")
      .getPublicUrl(fileName);

  return data.publicUrl;
}

async function sendMessage() {
  const message =
    document.getElementById("messageInput").value.trim();

  const imageFile =
    document.getElementById("imageInput").files[0];

  setStatus("");

  if (!currentUser) {
    currentUser = await getCurrentUser();
  }

  if (!currentUser) {
    return;
  }

  await loadTask();

  const conversation =
    await ensureConversation(currentUser);

  if (!conversation || !currentConversationId) {
    setStatus("Conversation could not be created.", "error");
    return;
  }

  if (!message && !imageFile) {
    setStatus("Enter a message or attach a job-related image.", "error");
    return;
  }

  if (containsBlockedWords(message)) {
    setStatus("Message contains prohibited language. Please revise before sending.", "error");
    return;
  }

  let imageUrl = null;

  try {
    if (imageFile) {
      imageUrl = await uploadImage(imageFile, currentUser.id);
    }

    const { error } = await supabaseClient
      .from("task_messages")
      .insert({
        conversation_id: currentConversationId,
        task_id: currentTaskId,
        sender_id: currentWorkerId,
        sender_type: "worker",
        message: message,
        image_url: imageUrl,
        is_read: false
      });

    if (error) {
      setStatus(error.message, "error");
      return;
    }

    await supabaseClient
      .from("task_conversations")
      .update({
        updated_at: new Date().toISOString()
      })
      .eq("id", currentConversationId);

    await supabaseClient
      .from("worker_inbox_items")
      .insert({
        worker_id: currentWorkerId,
        customer_id: currentCustomerId,
        conversation_id: currentConversationId,
        task_id: currentTaskId,
        item_type: "task_message",
        title: "Task Message Reply",
        preview: message || "Image attachment",
        is_read: true
      });

    document.getElementById("messageInput").value = "";
    document.getElementById("imageInput").value = "";

    setStatus("Message sent.", "success");

    await loadMessages();

  } catch (err) {
    setStatus(err.message, "error");
  }
}

function goToQuote() {
  localStorage.setItem("selectedQuoteTaskId", currentTaskId || "");
  localStorage.setItem("selectedTaskId", currentTaskId || "");
  localStorage.setItem("selectedCustomerId", currentCustomerId || "");
  localStorage.setItem("selectedConversationId", currentConversationId || "");

  window.location.href = "send-quote.html";
}

async function loadPage() {
  currentUser = await getCurrentUser();

  if (!currentUser) {
    return;
  }

  await loadTask();

  if (currentTaskId && currentCustomerId) {
    await ensureConversation(currentUser);
  }

  await loadMessages();
}
  async function refreshTaskMessages() {
  setStatus("Refreshing...", "");

  await loadTask();

  if (currentTaskId && currentCustomerId && currentUser) {
    await ensureConversation(currentUser);
  }

  await loadMessages();

  setStatus("Messages refreshed.", "success");
}

loadPage();
</script>

</body>
</html>
